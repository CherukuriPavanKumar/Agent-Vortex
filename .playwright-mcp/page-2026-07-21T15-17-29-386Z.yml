                  - generic [ref=f18e6254]:
                    - text: Lerner, Hanna (2016).
                    - 'link "\"The Indian Founding: A Comparative Perspective\"" [ref=f18e6255] [cursor=pointer]':
                      - /url: https://books.google.com/books?id=d0knDAAAQBAJ&pg=PA64
                    - text: . In Choudhry, Sujit; Khosla, Madhav; Mehta, Pratap Bhanu (eds.). The Oxford Handbook of the Indian Constitution. Oxford University Press. pp. 63–64.
                    - link "ISBN" [ref=f18e6256] [cursor=pointer]:
                      - /url: https://en.wikipedia.org/wiki/ISBN_(identifier)
                    - link "978-0-19-870489-8" [ref=f18e6257] [cursor=pointer]:
                      - /url: https://en.wikipedia.org/wiki/Special:BookSources/978-0-19-870489-8
                    - text: . Ultimately, it was the pragmatic consensus-seeking approach that triumphed. On 14 September 1949, after three years of debate, the assembly overwhelmingly approved a compromise resolution, known as the Munshi—Ayyangar formula, which later became Articles 343-51 of the Indian Constitution. Instead of declaring a 'national language', Hindi was labelled the 'official language of the Union', while English was to continue to be used 'for all official purposes'. It was decided that this arrangement would apply for a period of fifteen years, during which time Hindi was to be progressively introduced into official use. What would happen at the end of this interim period was left undetermined, with the Constitution providing for the establishment of a parliamentary committee to examine the issue in the future. In addition, the Constitution recognised fourteen other languages for official use (listed in the Eighth Schedule of the Constitution). ... Fifteen years after the enactment of the Constitution, Hindi was still not widely used by the Union government. Following a series of violent riots in non-Hindi-speaking States in the 1960s, Parliament renounced the ideal of an Indian national language. In 1965, when the fifteen-year interim period prescribed by the Constitution elapsed, the government announced that English would remain the de facto formal language of India.
