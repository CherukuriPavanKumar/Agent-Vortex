                    - text: . Idli is an acid-leavened and steamed cake made by bacterial fermentation of a thick batter made from coarsely ground rice and dehulled black gram. Idli cakes are soft, moist and spongy, have desirable sour flavour, and is eaten as breakfast in South India. Dosa batter is very similar to idli batter, except that both the rice and black gram are finely grounded. The batter is thinner than that of idli and is fried as a thin, crisp pancake and eaten directly in South India.
