                  - /url: https://en.wikipedia.org/wiki/Climate_of_India
              - paragraph [ref=f18e1525]:
                - text: The Indian climate is strongly influenced by the Himalayas and the Thar Desert, both of which drive the economically and culturally pivotal summer and winter
                - link "monsoons" [ref=f18e1526] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Monsoon
                - text: .
                - superscript [ref=f18e1527]:
                  - link "[181]" [ref=f18e1528] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEChang1967391–394-200"
                - text: The Himalayas prevent cold Central Asian
                - link "katabatic winds" [ref=f18e1529] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Katabatic_wind
                - text: from blowing in, keeping the bulk of the Indian subcontinent warmer than most locations at similar latitudes.
                - superscript [ref=f18e1530]:
                  - link "[182]" [ref=f18e1531] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEPosey1994118-201"
                - superscript [ref=f18e1532]:
                  - link "[183]" [ref=f18e1533] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEWolpert20034-202"
                - text: The Thar Desert plays a crucial role in attracting the moisture-laden south-west summer monsoon winds that, between June and October, provide the majority of India's rainfall.
                - superscript [ref=f18e1534]:
                  - link "[181]" [ref=f18e1535] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEChang1967391–394-200"
