                    - text: Quote:"Castes A pure caste system is rooted in the religious order and may be thought of as a hierarchy of hereditary, endogamous, occupational groups with positions fixed and mobility barred by ritual distances between each caste. Empirically, the classical Hindu system of India approximated most closely to pure caste. The system existed for some 3,000 years and continues today despite many attempts to get rid of some of its restrictions. It is essentially connected with Hinduism."
