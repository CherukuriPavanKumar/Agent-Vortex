                    - text: .
                    - generic [ref=f18e6604]: "Mayer's (1960: 219) observation for central India would not be inaccurate for most communities in the subcontinent: \"A man's tie with his sister is accounted very close. The two have grown up together, at an age when there is no distinction made between the sexes. And later, when the sister marries, the brother is seen as her main protector, for when her father has died to whom else can she turn if there is trouble in her conjugal household.(Adrian C. Mayer, Caste and kinship in Central India (1960)\" The parental home, and after the parents' death the brother's home, often offers the only possibility of temporary or longer-term support in case of divorce, desertion, and even widowhood, especially for a woman without adult sons. Her dependence on this support is directly related to economic and social vulnerability."
                  - generic "ctx_ver=Z39.88-2004&rft_val_fmt=info%3Aofi%2Ffmt%3Akev%3Amtx%3Abook&rft.genre=book&rft.btitle=A+Field+of+One%27s+Own%3A+Gender+and+Land+Rights+in+South+Asia&rft.pages=264&rft.pub=Cambridge+University+Press&rft.date=1994&rft.isbn=978-0-521-42926-9&rft.aulast=Agarwal&rft.aufirst=Bina&rft_id=https%3A%2F%2Fbooks.google.com%2Fbooks%3Fid%3DZ3pdP30OnEUC%26pg%3DPA264&rfr_id=info%3Asid%2Fen.wikipedia.org%3AIndia"
