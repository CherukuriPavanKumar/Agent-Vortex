                    - /url: https://books.google.com/books?id=Qm9GfjNlnRwC&pg=PA10
                  - text: ": \"Y-Chromosome and Mt-DNA data support the colonization of South Asia by modern humans originating in Africa. [...] Coalescence dates for most non-European populations average to between 73 and 55 ka.\""
              - listitem [ref=f18e4167]:
                - generic [ref=f18e4168]:
                  - text: ^
                  - link "Jump up to:" [ref=f18e4169] [cursor=pointer]:
                    - /url: "#cite_ref-Dyson2018p1_37-0"
                  - link [ref=f18e4171] [cursor=pointer]:
                    - /url: "#cite_ref-Dyson2018p1_37-1"
                  - link [ref=f18e4172] [cursor=pointer]:
                    - /url: "#cite_ref-Dyson2018p1_37-2"
                - generic [ref=f18e4173]:
                  - link "Dyson 2018" [ref=f18e4174] [cursor=pointer]:
                    - /url: "#CITEREFDyson2018"
                  - text: ", p."
                  - link "1" [ref=f18e4175] [cursor=pointer]:
                    - /url: https://books.google.com/books?id=3TRtDwAAQBAJ&pg=PA1
                  - text: ": \"Modern human beings—Homo sapiens—originated in Africa. Then, intermittently, sometime between 60,000 and 80,000 years ago, tiny groups of them began to enter the north-west of the Indian subcontinent. It seems likely that initially they came by way of the coast. [...] it is virtually certain that there were Homo sapiens in the subcontinent 55,000 years ago, even though the earliest fossils that have been found of them date to only about 30,000 years before the present.\""
              - listitem [ref=f18e4176]:
                - generic [ref=f18e4177]:
                  - text: ^
                  - link "Jump up to:" [ref=f18e4178] [cursor=pointer]:
                    - /url: "#cite_ref-Fisher2018p23_38-0"
                  - link [ref=f18e4180] [cursor=pointer]:
                    - /url: "#cite_ref-Fisher2018p23_38-1"
                - generic [ref=f18e4181]:
                  - link "Fisher 2018" [ref=f18e4182] [cursor=pointer]:
                    - /url: "#CITEREFFisher2018"
                  - text: ", p."
                  - link "23" [ref=f18e4183] [cursor=pointer]:
                    - /url: https://books.google.com/books?id=kZVuDwAAQBAJ&pg=PA23
                  - text: ": \"Scholars estimate that the first successful expansion of the Homo sapiens range beyond Africa and across the Arabian Peninsula occurred from as early as 80,000 years ago to as late as 40,000 years ago, although there may have been prior unsuccessful emigrations. Some of their descendants extended the human range ever further in each generation, spreading into each habitable land they encountered. One human channel was along the warm and productive coastal lands of the Persian Gulf and northern Indian Ocean. Eventually, various bands entered India between 75,000 years ago and 35,000 years ago.\""
