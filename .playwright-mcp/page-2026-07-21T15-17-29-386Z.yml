                  - link "Bourbaki 1998" [ref=f18e6809] [cursor=pointer]:
                    - /url: "#CITEREFBourbaki1998"
                  - text: ", p. 46: \"...our decimal system, which (by the agency of the Arabs) is derived from Hindu mathematics, where its use is attested already from the first centuries of our era. It must be noted moreover that the conception of zero as a number and not as a simple symbol of separation) and its introduction into calculations, also count amongst the original contribution of the Hindus.\""
