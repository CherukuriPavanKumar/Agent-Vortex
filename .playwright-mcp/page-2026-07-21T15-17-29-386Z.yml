                - text: forest of eastern India, and the dry deciduous
                - link "teak" [ref=f18e1636] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Teak
                - text: forest of central and southern India.
                - superscript [ref=f18e1637]:
                  - link "[196]" [ref=f18e1638] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTETritsch200111–12-216"
                - text: India has two natural zones of
                - link "thorn forest" [ref=f18e1639] [cursor=pointer]:
