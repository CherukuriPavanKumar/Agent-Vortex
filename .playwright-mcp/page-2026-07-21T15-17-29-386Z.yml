            - region [ref=f18e3095]:
              - heading "Music" [level=3] [ref=f18e3097]
              - note [ref=f18e3098]:
                - text: "Main article:"
                - link "Music of India" [ref=f18e3099] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Music_of_India
              - paragraph [ref=f18e3100]:
                - text: India contains a wide array of musical practices, including many different
                - link "folk musics" [ref=f18e3101] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Indian_folk_music
                - text: from different regions.
                - link "Indian classical music" [ref=f18e3102] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Indian_classical_music
                - text: has Vedic origins, and split in the 13th century into the two main traditions of
                - link "Hindustani" [ref=f18e3103] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Hindustani_classical_music
                - text: and
                - link "Carnatic" [ref=f18e3104] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Carnatic_music
                - text: music. Hindustani is associated with North India and is more
                - link "improvisational" [ref=f18e3105] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Musical_improvisation
                - text: ", featuring instruments such as the"
                - link "sitar" [ref=f18e3106] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Sitar
                - text: and
                - link "tabla" [ref=f18e3107] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Tabla
                - text: ", and Carnatic is South Indian and more focused on written"
                - link "compositions" [ref=f18e3108] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Musical_composition
                - text: such as the
                - link "kriti" [ref=f18e3110] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Kriti_(music)
                - text: ", while both styles contain common elements such as the"
                - link "raga" [ref=f18e3111] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Raga
                - text: melodic framework and
                - link "tala" [ref=f18e3112] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Tala_(music)
                - text: rhythmic meter.
                - superscript [ref=f18e3113]:
                  - link "[403]" [ref=f18e3114] [cursor=pointer]:
                    - /url: "#cite_note-429"
                - text: Indian music has influenced western genres, including
                - link "rock" [ref=f18e3115] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Rock_music
                - text: and
                - link "jazz" [ref=f18e3116] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Jazz
                - text: musicians during the
                - link "1960s counterculture" [ref=f18e3117] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Counterculture_of_the_1960s
                - text: .
                - superscript [ref=f18e3118]:
                  - link "[404]" [ref=f18e3119] [cursor=pointer]:
                    - /url: "#cite_note-430"
              - paragraph [ref=f18e3120]:
                - link "Indian film music" [ref=f18e3121] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Indian_film_music
                - text: is music written for
                - link "Indian cinema" [ref=f18e3122] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Cinema_of_India
                - text: ", generally composed by"
                - link "music directors" [ref=f18e3123] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/List_of_Indian_film_music_directors
                - text: and sung by
                - link "playback singers" [ref=f18e3124] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Playback_singers
                - text: . Modern
                - link "Indian pop" [ref=f18e3125] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Indian_pop
                - text: takes influences from classical, folk, and western pop music.
                - superscript [ref=f18e3126]:
