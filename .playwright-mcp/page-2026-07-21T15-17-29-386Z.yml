                - text: ","
                - link "Punjabi" [ref=f18e2564] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Punjabi_language
                - text: ", Sanskrit,"
                - link "Tamil" [ref=f18e2565] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Tamil_language
                - text: ","
                - link "Telugu" [ref=f18e2566] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Telugu_language
                - text: and Urdu.
                - superscript [ref=f18e2567]:
                  - link "[315]" [ref=f18e2568] [cursor=pointer]:
                    - /url: "#cite_note-jolad-agarwal-337"
                - text: "In the following decades constitutional amendments added others:"
                - link "Sindhi" [ref=f18e2569] [cursor=pointer]:
