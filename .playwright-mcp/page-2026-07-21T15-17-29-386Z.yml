                    - generic "ctx_ver=Z39.88-2004&rft_val_fmt=info%3Aofi%2Ffmt%3Akev%3Amtx%3Abook&rft.genre=book&rft.btitle=caste&rft.pub=Encyclop%C3%A6dia+Britannica+Online&rft.date=2012&rft.aulast=Madan&rft.aufirst=T.+N.&rft_id=https%3A%2F%2Fwww.britannica.com%2FEBchecked%2Ftopic%2F98395%2Fcaste&rfr_id=info%3Asid%2Fen.wikipedia.org%3AIndia"
                    - text: "Quote: \"caste, any of the ranked, hereditary, endogamous social groups, often linked with occupation, that together constitute traditional societies in South Asia, particularly among Hindus in India. Although sometimes used to designate similar groups in other societies, the \"caste system\" is uniquely developed in Hindu societies.\""
                  - listitem [ref=f18e6516]:
