            - region [ref=f18e2078]:
              - heading "Foreign relations" [level=3] [ref=f18e2080]
              - note [ref=f18e2081]:
                - text: "Main article:"
                - link "Foreign relations of India" [ref=f18e2082] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Foreign_relations_of_India
              - figure [ref=f18e2083]:
                - link [ref=f18e2084] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/File:Jawaharlal_Nehru,_Nasser_and_Tito_at_the_Conference_of_Non-Aligned_Nations_held_in_Belgrade.jpg
                - generic [ref=f18e2086]:
                  - text: In the 1950s and 60s, India played a pivotal role in the
                  - link "Non-Aligned Movement" [ref=f18e2087] [cursor=pointer]:
                    - /url: https://en.wikipedia.org/wiki/Non-Aligned_Movement
                  - text: .
                  - superscript [ref=f18e2088]:
                    - link "[243]" [ref=f18e2089] [cursor=pointer]:
                      - /url: "#cite_note-Dinkel2018-265"
                  - text: "From left to right:"
                  - link "Gamal Abdel Nasser" [ref=f18e2090] [cursor=pointer]:
                    - /url: https://en.wikipedia.org/wiki/Gamal_Abdel_Nasser
                  - text: of
                  - link "United Arab Republic" [ref=f18e2091] [cursor=pointer]:
                    - /url: https://en.wikipedia.org/wiki/United_Arab_Republic
                  - text: (now Egypt),
                  - link "Josip Broz Tito" [ref=f18e2092] [cursor=pointer]:
                    - /url: https://en.wikipedia.org/wiki/Josip_Broz_Tito
                  - text: of
                  - link "Yugoslavia" [ref=f18e2093] [cursor=pointer]:
                    - /url: https://en.wikipedia.org/wiki/Socialist_Federal_Republic_of_Yugoslavia
                  - text: and
                  - link "Jawaharlal Nehru" [ref=f18e2094] [cursor=pointer]:
                    - /url: https://en.wikipedia.org/wiki/Jawaharlal_Nehru
                  - text: in Belgrade, September 1961.
              - paragraph [ref=f18e2095]:
                - text: India remained a member of the
                - link "Commonwealth of Nations" [ref=f18e2096] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Commonwealth_of_Nations
                - text: after becoming a republic in 1950.
                - superscript [ref=f18e2097]:
                  - link "[244]" [ref=f18e2098] [cursor=pointer]:
                    - /url: "#cite_note-storm-india-commonwealth-266"
                - superscript [ref=f18e2099]:
                  - link "[245]" [ref=f18e2100] [cursor=pointer]:
                    - /url: "#cite_note-267"
                - text: It strongly supported decolonisation in Africa and Asia in the 1950s, and played a leading role in the Non-Aligned Movement.
                - superscript [ref=f18e2101]:
                  - link "[246]" [ref=f18e2102] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTERothermund200048,_227-268"
                - text: After cordial relations with China during the greater part of the 1950s, India and China went to
                - link "war in 1962" [ref=f18e2103] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Sino-Indian_War
                - text: ; India was widely thought to have been decisively defeated.
                - superscript [ref=f18e2104]:
                  - link "[247]" [ref=f18e2105] [cursor=pointer]:
                    - /url: "#cite_note-62-humiliation-269"
                - text: By 1967, however, India was able to fend off
                - link "Chinese excursions into Sikkim" [ref=f18e2106] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Sino-Indian_War_of_1967
                - text: .
                - superscript [ref=f18e2107]:
                  - link "[248]" [ref=f18e2108] [cursor=pointer]:
                    - /url: "#cite_note-270"
              - paragraph [ref=f18e2109]:
                - text: India has had
                - link "uneasy relations" [ref=f18e2110] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Indo-Pakistani_relations
                - text: with its western neighbour, Pakistan. The two went to war in
                - link "1947" [ref=f18e2111] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Indo-Pakistani_War_of_1947
                - text: ","
                - link "1965" [ref=f18e2112] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Indo-Pakistani_War_of_1965
                - text: ","
                - link "1971" [ref=f18e2113] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Indo-Pakistani_War_of_1971
                - text: ", and"
                - link "1999" [ref=f18e2114] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Kargil_War
                - text: . Three wars were fought over the
                - link "disputed territory of Kashmir" [ref=f18e2115] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Kashmir_conflict
                - text: .
                - superscript [ref=f18e2116]:
                  - link "[249]" [ref=f18e2117] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEGilbert2002486–487-271"
                - text: After the 1965 war, India began to pursue close military and economic
                - link "ties with the Soviet Union" [ref=f18e2118] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/India-Soviet_Union_relations
                - text: . By the late 1960s, the Soviet Union was India's largest arms supplier.
                - superscript [ref=f18e2119]:
                  - link "[250]" [ref=f18e2120] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTESharma199956-272"
                - text: China's
                - link "nuclear test of 596" [ref=f18e2121] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/596_(nuclear_test)
                - text: and threats to intervene in support of Pakistan in the 1965 war caused India to produce nuclear weapons.
                - superscript [ref=f18e2122]:
                  - link "[251]" [ref=f18e2123] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEPerkovich200160–86,_106–125-273"
                - text: India conducted its
                - link "first nuclear weapons test" [ref=f18e2124] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Smiling_Buddha
                - text: in 1974 and carried out
                - link "additional underground testing" [ref=f18e2125] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Pokhran-II
                - text: in 1998. India has signed neither the
                - link "Comprehensive Nuclear-Test-Ban Treaty" [ref=f18e2126] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Comprehensive_Nuclear-Test-Ban_Treaty
                - text: nor the
                - link "Nuclear Non-Proliferation Treaty" [ref=f18e2127] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Nuclear_Non-Proliferation_Treaty
                - text: ", considering both to be flawed and discriminatory."
                - superscript [ref=f18e2128]:
                  - link "[252]" [ref=f18e2129] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEKumar2010-274"
                - text: India maintains a "
                - link "no first use" [ref=f18e2130] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/No_first_use
                - text: "\" nuclear policy and is developing a"
                - link "nuclear triad" [ref=f18e2131] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Nuclear_triad
                - text: capability as a part of its "
                - link "Minimum Credible Deterrence" [ref=f18e2132] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Minimum_Credible_Deterrence
                - text: "\" doctrine."
                - superscript [ref=f18e2133]:
                  - link "[253]" [ref=f18e2134] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTENair2007-275"
                - superscript [ref=f18e2135]:
                  - link "[254]" [ref=f18e2136] [cursor=pointer]:
                    - /url: "#cite_note-276"
              - paragraph [ref=f18e2137]:
                - text: Since the end of the
                - link "Cold War" [ref=f18e2138] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Cold_War
                - text: ", India has increased its economic, strategic, and military cooperation with the"
                - link "United States" [ref=f18e2139] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/India–United_States_relations
                - text: and the
                - link "European Union" [ref=f18e2140] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/India–European_Union_relations
                - text: .
                - superscript [ref=f18e2141]:
                  - link "[255]" [ref=f18e2142] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEEuropean_Union_2008-277"
                - text: In 2008, a
                - link "civilian nuclear agreement" [ref=f18e2143] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/U.S.–India_Civil_Nuclear_Agreement
                - text: was signed between India and the United States. Although India possessed nuclear weapons at the time and was not a party to the Nuclear Non-Proliferation Treaty, it received waivers from the
                - link "International Atomic Energy Agency" [ref=f18e2144] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/International_Atomic_Energy_Agency
                - text: and the
                - link "Nuclear Suppliers Group" [ref=f18e2145] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Nuclear_Suppliers_Group
                - text: ", ending earlier restrictions on India's nuclear technology and commerce; India subsequently signed co-operation agreements involving"
                - link "civilian nuclear energy" [ref=f18e2146] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Nuclear_power_in_India
                - text: with Russia,
                - superscript [ref=f18e2147]:
                  - link "[256]" [ref=f18e2148] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEBritish_Broadcasting_Corporation_2009-278"
                - text: France,
                - superscript [ref=f18e2149]:
                  - link "[257]" [ref=f18e2150] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTERediff_2008_a-279"
                - text: the
                - link "United Kingdom" [ref=f18e2151] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/India–United_Kingdom_relations
                - text: ","
                - superscript [ref=f18e2152]:
                  - link "[258]" [ref=f18e2153] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEReuters2010-280"
                - text: and
                - link "Canada" [ref=f18e2154] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Canada–India_relations
                - text: .
                - superscript [ref=f18e2155]:
                  - link "[259]" [ref=f18e2156] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTECurry2010-281"
          - region [ref=f18e2157]:
            - heading "Economy" [level=2] [ref=f18e2159]
            - note [ref=f18e2160]:
              - text: "Main article:"
              - link "Economy of India" [ref=f18e2161] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Economy_of_India
            - paragraph [ref=f18e2162]:
              - text: The Indian economy has been among the ten
              - link "largest in the world" [ref=f18e2163] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/List_of_countries_by_largest_historical_GDP
              - text: since 2010. As of 2026, India's nominal gross domestic output (GDP) is the
              - link "6th largest in the world" [ref=f18e2164] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/List_of_countries_by_GDP_(nominal)
              - text: .
              - superscript [ref=f18e2165]:
                - link "[260]" [ref=f18e2166] [cursor=pointer]:
                  - /url: "#cite_note-ID-282"
              - superscript [ref=f18e2167]:
                - link "[261]" [ref=f18e2168] [cursor=pointer]:
                  - /url: "#cite_note-283"
              - text: Measured by
              - link "purchasing power parity" [ref=f18e2169] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Purchasing_power_parity
              - text: (PPP), India is the
              - link "third-largest" [ref=f18e2170] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/List_of_countries_by_GDP_(PPP)
              - text: economy.
              - superscript [ref=f18e2171]:
                - link "[16]" [ref=f18e2172] [cursor=pointer]:
                  - /url: "#cite_note-IMFWEO.IN-24"
              - text: It is one of the
              - link "world's fastest-growing economies" [ref=f18e2173] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/List_of_countries_by_real_GDP_growth_rate
              - text: with an average annual growth rate exceeding 5% from 1990 to 2010.
              - superscript [ref=f18e2174]:
                - link "[262]" [ref=f18e2175] [cursor=pointer]:
                  - /url: "#cite_note-FOOTNOTENayakGoldarAgrawal2010xxv-284"
              - superscript [ref=f18e2176]:
                - link "[263]" [ref=f18e2177] [cursor=pointer]:
                  - /url: "#cite_note-FOOTNOTEInternational_Monetary_Fund_20112-285"
              - text: Demographics strain its economy, with the nation historically maintaining
              - link "low GDP per capita" [ref=f18e2178] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/List_of_countries_by_GDP_(nominal)_per_capita
              - text: both regionally and as measured by globally.
              - superscript [ref=f18e2179]:
                - link "[16]" [ref=f18e2180] [cursor=pointer]:
                  - /url: "#cite_note-IMFWEO.IN-24"
              - text: The vast majority of Indians fall into the global low-income group based on average daily income.
              - superscript [ref=f18e2181]:
                - link "[264]" [ref=f18e2182] [cursor=pointer]:
                  - /url: "#cite_note-286"
            - paragraph [ref=f18e2183]:
              - text: Until 1991, all Indian governments followed
              - link "protectionist" [ref=f18e2184] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Protectionism
              - text: policies that were influenced by socialist economics. Widespread
              - link "state intervention and regulation" [ref=f18e2185] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Licence_Raj
              - text: largely walled the economy off from the outside world. An acute
              - link "balance of payments crisis in 1991" [ref=f18e2186] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/1991_Indian_economic_crisis
              - text: forced the nation to
              - link "liberalise its economy" [ref=f18e2187] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Economic_liberalisation_in_India
              - text: ;
              - superscript [ref=f18e2188]:
                - link "[265]" [ref=f18e2189] [cursor=pointer]:
                  - /url: "#cite_note-FOOTNOTEWolpert2003xiv-287"
              - text: since then, it has moved increasingly towards a free-market system
              - superscript [ref=f18e2190]:
                - link "[266]" [ref=f18e2191] [cursor=pointer]:
                  - /url: "#cite_note-FOOTNOTEOrganisation_for_Economic_Co-operation_and_Development_2007-288"
              - superscript [ref=f18e2192]:
                - link "[267]" [ref=f18e2193] [cursor=pointer]:
                  - /url: "#cite_note-FOOTNOTEGargan1992-289"
              - text: by emphasising both foreign trade and direct investment inflows.
              - superscript [ref=f18e2194]:
                - link "[268]" [ref=f18e2195] [cursor=pointer]:
                  - /url: "#cite_note-FOOTNOTEAlamgir200823,_97-290"
              - text: India has been a member of
              - link "World Trade Organization" [ref=f18e2196] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/World_Trade_Organization
              - text: since 1 January 1995.
              - superscript [ref=f18e2197]:
                - link "[269]" [ref=f18e2198] [cursor=pointer]:
                  - /url: "#cite_note-FOOTNOTEWorld_Trade_Organization_1995-291"
            - paragraph [ref=f18e2199]:
              - text: The 522-million-worker
              - link "Indian labour force" [ref=f18e2200] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Labour_in_India
              - text: is the
              - link "world's second largest" [ref=f18e2201] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/List_of_countries_by_labour_force
              - text: ", as of 2017 ."
              - superscript [ref=f18e2202]:
                - link "[270]" [ref=f18e2203] [cursor=pointer]:
                  - /url: "#cite_note-FOOTNOTECentral_Intelligence_Agency-292"
              - text: The service sector makes up 55.6% of GDP, the industrial sector 26.3% and the agricultural sector 18.1%. India's
              - link "foreign exchange remittances" [ref=f18e2204] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Remittance
              - text: of US$100 billion in 2022,
              - superscript [ref=f18e2205]:
                - link "[271]" [ref=f18e2206] [cursor=pointer]:
                  - /url: "#cite_note-293"
              - text: the highest in the world, were contributed to its economy by 32 million Indians working in foreign countries.
              - superscript [ref=f18e2207]:
                - link "[272]" [ref=f18e2208] [cursor=pointer]:
                  - /url: "#cite_note-294"
              - text: In 2006, the share of external trade in India's GDP stood at 24%, up from 6% in 1985.
              - superscript [ref=f18e2209]:
                - link "[266]" [ref=f18e2210] [cursor=pointer]:
                  - /url: "#cite_note-FOOTNOTEOrganisation_for_Economic_Co-operation_and_Development_2007-288"
              - text: In 2008, India's share of world trade was 1.6%;
              - superscript [ref=f18e2211]:
                - link "[273]" [ref=f18e2212] [cursor=pointer]:
                  - /url: "#cite_note-295"
              - text: in 2021, it was the
              - link "world's ninth-largest importer" [ref=f18e2213] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/List_of_countries_by_imports
              - text: and the
              - link "sixteenth-largest exporter" [ref=f18e2214] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/List_of_countries_by_exports
              - text: .
              - superscript [ref=f18e2215]:
                - link "[274]" [ref=f18e2216] [cursor=pointer]:
                  - /url: "#cite_note-296"
              - text: Between 2001 and 2011, the contribution of petrochemical and engineering goods to total exports grew from 14% to 42%.
              - superscript [ref=f18e2217]:
                - link "[275]" [ref=f18e2218] [cursor=pointer]:
                  - /url: "#cite_note-FOOTNOTEEconomist_2011-297"
              - text: India was the
              - link "world's second-largest textile exporter" [ref=f18e2219] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/List_of_countries_by_textile_exports
              - text: after
              - link "China" [ref=f18e2220] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/China
              - text: in the 2013 calendar year.
              - superscript [ref=f18e2221]:
                - link "[276]" [ref=f18e2222] [cursor=pointer]:
                  - /url: "#cite_note-FOOTNOTEEconomic_Times_2014-298"
            - paragraph [ref=f18e2223]:
              - text: Averaging an economic growth rate of 7.5% for several years before 2007,
              - superscript [ref=f18e2224]:
                - link "[266]" [ref=f18e2225] [cursor=pointer]:
                  - /url: "#cite_note-FOOTNOTEOrganisation_for_Economic_Co-operation_and_Development_2007-288"
              - text: India has more than doubled its hourly wage rates during the first decade of the 21st century.
              - superscript [ref=f18e2226]:
                - link "[277]" [ref=f18e2227] [cursor=pointer]:
                  - /url: "#cite_note-FOOTNOTEBonner2010-299"
              - text: Some 431 million Indians have left poverty since 1985; India's middle classes are projected to number around 580 million by 2030.
              - superscript [ref=f18e2228]:
                - link "[278]" [ref=f18e2229] [cursor=pointer]:
                  - /url: "#cite_note-FOOTNOTEFarrellBeinhocker2007-300"
              - text: In 2024, India's consumer market was the
              - link "world's third largest" [ref=f18e2230] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/List_of_largest_consumer_markets
              - text: .
              - superscript [ref=f18e2231]:
                - link "[279]" [ref=f18e2232] [cursor=pointer]:
                  - /url: "#cite_note-301"
              - text: India's nominal
              - link "GDP per capita" [ref=f18e2233] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/GDP_per_capita
              - text: increased steadily from US$308 in 1991, when economic liberalisation began, to US$1,380 in 2010, to an estimated US$2,731 in 2024. It is expected to grow to US$3,264 by 2026.
              - superscript [ref=f18e2234]:
                - link "[16]" [ref=f18e2235] [cursor=pointer]:
                  - /url: "#cite_note-IMFWEO.IN-24"
            - list [ref=f18e2236]:
              - listitem [ref=f18e2237]:
