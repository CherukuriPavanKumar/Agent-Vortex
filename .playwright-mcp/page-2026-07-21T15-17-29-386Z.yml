                - text: to have sought enlightenment.
                - superscript [ref=f18e1658]:
                  - link "[201]" [ref=f18e1659] [cursor=pointer]:
                    - /url: "#cite_note-Gwynne2011-221"
              - paragraph [ref=f18e1660]:
                - text: Many Indian species have descended from those of
                - link "Gondwana" [ref=f18e1661] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Gondwana
