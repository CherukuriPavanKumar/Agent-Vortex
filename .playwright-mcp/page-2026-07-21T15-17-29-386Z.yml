                - generic [ref=f18e5144]:
                  - link "Prasad 1974" [ref=f18e5145] [cursor=pointer]:
                    - /url: "#CITEREFPrasad1974"
                  - text: ", p. 372, \" The topography of the Indian Desert is dominated by the Aravalli Ranges on its eastern border, which consist largely of tightly folded and highly metamorphosed Archaean rocks.\""
              - listitem [ref=f18e5146]:
