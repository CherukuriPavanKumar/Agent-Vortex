            - paragraph [ref=f18e647]:
              - text: India, officially the Republic of India,
              - superscript [ref=f18e648]:
                - link "[j]" [ref=f18e649] [cursor=pointer]:
                  - /url: "#cite_note-28"
              - superscript [ref=f18e650]:
                - link "[19]" [ref=f18e651] [cursor=pointer]:
                  - /url: "#cite_note-29"
              - text: is a country in
              - link "South Asia" [ref=f18e652] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/South_Asia
              - text: . It is the
              - link "seventh-largest country by area" [ref=f18e653] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/List_of_countries_and_dependencies_by_area
              - text: ", the"
              - link "most populous country" [ref=f18e654] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/List_of_countries_and_dependencies_by_population
              - text: in the world
              - superscript [ref=f18e655]:
                - link "[20]" [ref=f18e656] [cursor=pointer]:
                  - /url: "#cite_note-30"
              - text: and, since its independence in 1947, the world's most populous democracy.
              - superscript [ref=f18e657]:
                - link "[21]" [ref=f18e658] [cursor=pointer]:
                  - /url: "#cite_note-31"
              - superscript [ref=f18e659]:
                - link "[22]" [ref=f18e660] [cursor=pointer]:
                  - /url: "#cite_note-stein-arnold-32"
              - superscript [ref=f18e661]:
                - link "[23]" [ref=f18e662] [cursor=pointer]:
                  - /url: "#cite_note-FOOTNOTEFisher2018184–185-33"
              - text: Bounded by the
              - link "Indian Ocean" [ref=f18e663] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Indian_Ocean
              - text: on the south, the
              - link "Arabian Sea" [ref=f18e664] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Arabian_Sea
              - text: on the southwest, and the
              - link "Bay of Bengal" [ref=f18e665] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Bay_of_Bengal
              - text: on the southeast, it shares land borders with
              - link "Pakistan" [ref=f18e666] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Pakistan
              - text: to the west;
              - superscript [ref=f18e667]:
                - link "[k]" [ref=f18e668] [cursor=pointer]:
                  - /url: "#cite_note-35"
              - link "China" [ref=f18e669] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/China
              - text: ","
              - link "Nepal" [ref=f18e670] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Nepal
              - text: and
              - link "Bhutan" [ref=f18e671] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Bhutan
              - text: to the north;
              - link "Bangladesh" [ref=f18e672] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Bangladesh
              - text: and
              - link "Myanmar" [ref=f18e673] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Myanmar
              - text: to the east. In the Indian Ocean, India is near
              - link "Sri Lanka" [ref=f18e674] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Sri_Lanka
              - text: and the
              - link "Maldives" [ref=f18e675] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Maldives
              - text: . Its
              - link "Andaman and Nicobar Islands" [ref=f18e676] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Andaman_and_Nicobar_Islands
              - text: share a
              - link "maritime border" [ref=f18e677] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Maritime_boundary
              - text: with Myanmar,
              - link "Thailand" [ref=f18e678] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Thailand
              - text: and
              - link "Indonesia" [ref=f18e679] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Indonesia
              - text: .
            - paragraph [ref=f18e680]:
              - link "Modern humans" [ref=f18e681] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Modern_humans
              - text: arrived on the
              - link "Indian subcontinent" [ref=f18e682] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Indian_subcontinent
              - text: from
              - link "Africa" [ref=f18e683] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Africa
              - text: no later than 55,000 years ago.
              - superscript [ref=f18e684]:
                - link "[25]" [ref=f18e685] [cursor=pointer]:
                  - /url: "#cite_note-PetragliaAllchin-36"
              - superscript [ref=f18e686]:
                - link "[26]" [ref=f18e687] [cursor=pointer]:
                  - /url: "#cite_note-Dyson2018p1-37"
              - superscript [ref=f18e688]:
                - link "[27]" [ref=f18e689] [cursor=pointer]:
                  - /url: "#cite_note-Fisher2018p23-38"
              - text: Their long occupation, predominantly in isolation as hunter-gatherers, has made the region highly diverse.
              - superscript [ref=f18e690]:
                - link "[28]" [ref=f18e691] [cursor=pointer]:
                  - /url: "#cite_note-Dyson2018-28a-39"
              - link "Settled life" [ref=f18e692] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Neolithic
              - text: emerged on the subcontinent in the western margins of the
              - link "Indus" [ref=f18e693] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Indus_River
              - link "river basin" [ref=f18e694] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/River_basin
              - text: 9,000 years ago, evolving gradually into the
              - link "Indus Valley Civilisation" [ref=f18e695] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Indus_Valley_Civilisation
              - text: of the third millennium BCE.
              - superscript [ref=f18e696]:
                - link "[29]" [ref=f18e697] [cursor=pointer]:
                  - /url: "#cite_note-Combined-2-40"
              - text: By 1200 BCE, an
              - link "archaic form" [ref=f18e698] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Proto-language
              - text: of
              - link "Sanskrit" [ref=f18e699] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Sanskrit
              - text: ", an"
              - link "Indo-European language" [ref=f18e700] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Indo-European_language
              - text: ", had"
              - link "diffused" [ref=f18e701] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Trans-cultural_diffusion
              - text: into India from the northwest.
              - superscript [ref=f18e702]:
                - link "[30]" [ref=f18e703] [cursor=pointer]:
                  - /url: "#cite_note-lowe1-41"
              - superscript [ref=f18e704]:
                - link "[31]" [ref=f18e705] [cursor=pointer]:
                  - /url: "#cite_note-Combined-4-Rigveda-42"
              - link "Its hymns" [ref=f18e706] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Rig_Veda
              - text: recorded the
              - link "early dawnings" [ref=f18e707] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Historical_Vedic_religion
              - text: of
              - link "Hinduism" [ref=f18e708] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Hinduism
              - text: in India.
              - superscript [ref=f18e709]:
                - link "[32]" [ref=f18e710] [cursor=pointer]:
                  - /url: "#cite_note-Combined-3-43"
              - text: India's pre-existing
              - link "Dravidian languages" [ref=f18e711] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Dravidian_languages
              - text: were supplanted in the northern regions.
              - superscript [ref=f18e712]:
                - link "[33]" [ref=f18e713] [cursor=pointer]:
                  - /url: "#cite_note-Combined-4-44"
              - text: By 400 BCE,
              - link "caste" [ref=f18e714] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Caste
              - text: had emerged within Hinduism,
              - superscript [ref=f18e715]:
                - link "[34]" [ref=f18e716] [cursor=pointer]:
                  - /url: "#cite_note-Dyson2018-16a-45"
              - text: and
              - link "Buddhism" [ref=f18e717] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/History_of_Buddhism_in_India
              - text: and
              - link "Jainism" [ref=f18e718] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/History_of_Jainism
              - text: had arisen, proclaiming
              - link "social orders" [ref=f18e719] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Social_order
              - text: unlinked to heredity.
              - superscript [ref=f18e720]:
                - link "[35]" [ref=f18e721] [cursor=pointer]:
                  - /url: "#cite_note-Fisher2018-59-46"
              - text: Early political consolidations gave rise to the loose-knit
              - link "Maurya" [ref=f18e722] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Maurya_Empire
              - text: and
              - link "Gupta Empires" [ref=f18e723] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Gupta_Empire
              - text: .
              - superscript [ref=f18e724]:
                - link "[36]" [ref=f18e725] [cursor=pointer]:
                  - /url: "#cite_note-Combined-5-47"
              - text: During this era, there was a flourishing of creativity in art, architecture, and writing,
              - superscript [ref=f18e726]:
                - link "[37]" [ref=f18e727] [cursor=pointer]:
                  - /url: "#cite_note-Combined-6-48"
              - text: the status of women declined,
              - superscript [ref=f18e728]:
                - link "[38]" [ref=f18e729] [cursor=pointer]:
                  - /url: "#cite_note-Combined-7-49"
              - text: and
              - link "untouchability" [ref=f18e730] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Untouchability
              - text: became an organised belief.
              - superscript [ref=f18e731]:
                - link "[l]" [ref=f18e732] [cursor=pointer]:
                  - /url: "#cite_note-51"
              - superscript [ref=f18e733]:
                - link "[39]" [ref=f18e734] [cursor=pointer]:
                  - /url: "#cite_note-FOOTNOTEKulkeRothermund2016122–123-50"
              - text: In
              - link "South India" [ref=f18e735] [cursor=pointer]:
