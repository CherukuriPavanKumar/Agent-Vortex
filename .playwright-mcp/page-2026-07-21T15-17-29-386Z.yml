                  - text: "]"
              - paragraph [ref=f18e1540]:
                - text: "Four major climatic groupings predominate in India:"
                - link "tropical wet" [ref=f18e1541] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Climate_of_India#Tropical_wet
                - text: ","
                - link "tropical dry" [ref=f18e1542] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Climate_of_India#Arid_and_semi-arid_regions
                - text: ","
                - link "subtropical humid" [ref=f18e1543] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Climate_of_India#Subtropical_humid
                - text: ", and"
                - link "montane" [ref=f18e1544] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Climate_of_India#Mountain
                - text: .
                - superscript [ref=f18e1545]:
                  - link "[184]" [ref=f18e1546] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEHeitzmanWorden199697-203"
                - text: Temperatures in India have risen by 0.7 °C (1.3 °F) between 1901 and 2018.
                - superscript [ref=f18e1547]:
                  - link "[185]" [ref=f18e1548] [cursor=pointer]:
                    - /url: "#cite_note-204"
                - link "Climate change in India" [ref=f18e1549] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Climate_change_in_India
                - text: is often thought to be the cause. The
                - link "retreat of Himalayan glaciers" [ref=f18e1550] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Retreat_of_glaciers_since_1850
                - text: has adversely affected the
                - link "flow rate" [ref=f18e1551] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Volumetric_flow_rate
                - text: of the major Himalayan rivers, including the
                - link "Ganges" [ref=f18e1552] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Ganges
                - text: and the
                - link "Brahmaputra" [ref=f18e1553] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Brahmaputra
                - text: .
                - superscript [ref=f18e1554]:
                  - link "[186]" [ref=f18e1555] [cursor=pointer]:
                    - /url: "#cite_note-205"
                - text: According to some current projections, the number and severity of droughts in India will have markedly increased by the end of the present century.
                - superscript [ref=f18e1556]:
