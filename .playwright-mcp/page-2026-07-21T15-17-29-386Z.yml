                - superscript [ref=f18e1630]:
                  - link "[195]" [ref=f18e1631] [cursor=pointer]:
                    - /url: "#cite_note-indiaforest-215"
                - text: It predominates in the
                - link "temperate coniferous forest" [ref=f18e1632] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Temperate_coniferous_forest
                - text: of the
                - link "Himalayas" [ref=f18e1633] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Himalaya
                - text: ", the moist deciduous"
                - link "sal" [ref=f18e1635] [cursor=pointer]:
