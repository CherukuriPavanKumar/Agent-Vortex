                    - /url: "#cite_note-208"
                - superscript [ref=f18e1608]:
                  - link "[190]" [ref=f18e1609] [cursor=pointer]:
                    - /url: "#cite_note-Puri-209"
                - text: Fully a third of Indian plant species are endemic.
                - superscript [ref=f18e1610]:
                  - link "[191]" [ref=f18e1611] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEBasak198324-210"
                - text: India also overlaps four of the world's 34
                - link "biodiversity hotspots" [ref=f18e1612] [cursor=pointer]:
