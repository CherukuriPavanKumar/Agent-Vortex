                  - text: 29 September 2007 at the
                  - link "Wayback Machine" [ref=f18e6825] [cursor=pointer]:
                    - /url: https://en.wikipedia.org/wiki/Wayback_Machine
                  - text: ". Encyclopædia Britannica Online. 16 May 2007. Quote: \"A full-fledged decimal, positional system certainly existed in India by the 9th century (AD), yet many of its central ideas had been transmitted well before that time to China and the Islamic world. Indian arithmetic, moreover, developed consistent and correct rules for operating with positive and negative numbers and for treating zero like any other number, even in problematic contexts such as division. Several hundred years passed before European mathematicians fully integrated such ideas into the developing discipline of algebra.\""
