                  - text: ^
                - generic [ref=f18e5139]:
                  - link "Kaul 1970" [ref=f18e5140] [cursor=pointer]:
                    - /url: "#CITEREFKaul1970"
                  - text: ", p. 160, \" The Aravalli range boldy defines the eastern limit of the arid and semi-arid zone. Probably the more humid conditions that prevail near the Aravallis prevented the extension of aridity towards the east and the Ganges Valley. It is noteworthy that, wherever there are gaps in this range, sand has advanced to the east of it.\""
              - listitem [ref=f18e5141]:
