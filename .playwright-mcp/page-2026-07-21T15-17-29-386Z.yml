                  - img "The child mortality rate in India from 1960 to 2023" [ref=f18e2428]
                - generic [ref=f18e2429]: The child mortality rate in India from 1960 to 2023
            - region [ref=f18e2430]:
              - heading "Languages" [level=3] [ref=f18e2432]
              - note [ref=f18e2433]:
                - text: "Main article:"
                - link "Languages of India" [ref=f18e2434] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Languages_of_India
              - paragraph [ref=f18e2435]:
                - text: Languages of India belong to several
                - link "language families" [ref=f18e2436] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Language_family
                - text: . The
                - link "2011 Census of India" [ref=f18e2437] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/2011_Census_of_India
                - text: ", the last conducted by the Indian government, gives the following breakdown:"
                - superscript [ref=f18e2438]:
                  - link "[315]" [ref=f18e2439] [cursor=pointer]:
                    - /url: "#cite_note-jolad-agarwal-337"
              - table [ref=f18e2440]:
                - rowgroup [ref=f18e2441]:
                  - row [ref=f18e2442]:
