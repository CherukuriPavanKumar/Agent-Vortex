              - heading "Religion" [level=3] [ref=f18e2603]
              - note [ref=f18e2604]:
                - text: "Main article:"
                - link "Religion in India" [ref=f18e2605] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Religion_in_India
              - paragraph [ref=f18e2606]:
                - link "Religion" [ref=f18e2607] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Religion
                - text: in India is characterised by a diversity of beliefs and practices. Throughout India's history, religion has been an important part of its culture. The
                - link "Indian subcontinent" [ref=f18e2608] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Indian_subcontinent
                - text: is the birthplace of four
                - link "major world religions" [ref=f18e2609] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Major_religious_groups
                - text: ":"
                - link "Buddhism" [ref=f18e2610] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Buddhism
                - text: ","
                - link "Hinduism" [ref=f18e2611] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Hinduism
                - text: ","
                - link "Jainism" [ref=f18e2612] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Jainism
                - text: ", and"
                - link "Sikhism" [ref=f18e2613] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Sikhism
                - text: . India has the largest population of Hindus, Sikhs, and Jains, the third-largest population of Muslims (after
                - link "Indonesia" [ref=f18e2614] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Indonesia
                - text: and
                - link "Pakistan" [ref=f18e2615] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Pakistan
                - text: ) and the ninth largest of Buddhists.
                - superscript [ref=f18e2616]:
                  - link "[325]" [ref=f18e2617] [cursor=pointer]:
                    - /url: "#cite_note-Firstpost_Aug2016-348"
                - text: India also has the largest population of people adhering to both
                - link "Zoroastrianism" [ref=f18e2618] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Zoroastrianism
                - text: (
                - link "Parsis" [ref=f18e2619] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Parsi
                - text: and
                - link "Iranis" [ref=f18e2620] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Irani_(India)
                - text: ) and the
                - link "Bahá'í Faith" [ref=f18e2621] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Baháʼí_Faith_in_India
                - text: .
                - superscript [ref=f18e2622]:
                  - link "[326]" [ref=f18e2623] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTESmith200894-349"
              - paragraph [ref=f18e2624]:
                - text: The
                - link "Preamble to the Constitution of India" [ref=f18e2625] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Preamble_to_the_Constitution_of_India
                - text: declares India to be a
                - link "secular state" [ref=f18e2626] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Secular_state
                - text: ","
                - superscript [ref=f18e2627]:
                  - link "[327]" [ref=f18e2628] [cursor=pointer]:
                    - /url: "#cite_note-350"
                - superscript [ref=f18e2629]:
                  - link "[328]" [ref=f18e2630] [cursor=pointer]:
                    - /url: "#cite_note-351"
                - text: and
                - link "freedom of religion" [ref=f18e2631] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Freedom_of_religion
                - text: to be a
                - link "fundamental right" [ref=f18e2632] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Fundamental_Rights_in_India
                - text: ("... liberty of thought, expression, belief, faith, and worship.")
                - superscript [ref=f18e2633]:
                  - link "[329]" [ref=f18e2634] [cursor=pointer]:
                    - /url: "#cite_note-352"
                - text: According to the 2011 census of India, 79.8% of the
                - link "population of India" [ref=f18e2635] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Demographics_of_India
                - text: follows
                - link "Hinduism" [ref=f18e2636] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Hinduism_in_India
                - text: ", 14.2%"
                - link "Islam" [ref=f18e2637] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Islam_in_India
                - text: ", 2.3%"
                - link "Christianity" [ref=f18e2638] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Christianity_in_India
                - text: ", 1.7%"
                - link "Sikhism" [ref=f18e2639] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Sikhism_in_India
                - text: ", 0.7%"
                - link "Buddhism" [ref=f18e2640] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Buddhism_in_India
                - text: and 0.4%
                - link "Jainism" [ref=f18e2641] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Jainism_in_India
                - text: . Several tribal religions are also present in India, such as
                - link "Donyi-Polo" [ref=f18e2642] [cursor=pointer]:
