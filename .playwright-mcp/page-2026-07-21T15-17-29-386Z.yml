                - text: "-treated cattle."
                - superscript [ref=f18e1697]:
                  - link "[210]" [ref=f18e1698] [cursor=pointer]:
                    - /url: "#cite_note-LovetteFitzpatrick2016-230"
                - text: Before they were extensively used for agriculture and cleared for human settlement, the thorn forests of Punjab were mingled at intervals with open grasslands that were grazed by large herds of
                - link "blackbuck" [ref=f18e1699] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Blackbuck_Conservation_Area
                - text: preyed on by the
                - link "Asiatic cheetah" [ref=f18e1700] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Asiatic_cheetah
                - text: ; the blackbuck, no longer extant in Punjab, is now severely endangered in India, and the cheetah is extinct.
                - superscript [ref=f18e1701]:
                  - link "[211]" [ref=f18e1702] [cursor=pointer]:
                    - /url: "#cite_note-231"
                - text: The pervasive and ecologically devastating human encroachment of recent decades has critically endangered Indian wildlife. In response, the system of
                - link "national parks" [ref=f18e1703] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/National_parks_of_India
                - text: and
                - link "protected areas" [ref=f18e1704] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Protected_areas_of_India
                - text: ", first established in 1935, was expanded substantially. In 1972, India enacted the"
                - link "Wildlife Protection Act" [ref=f18e1705] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Wildlife_Protection_Act_of_1972
                - superscript [ref=f18e1706]:
                  - link "[212]" [ref=f18e1707] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEMinistry_of_Environment_and_Forests_1972-232"
                - text: and
                - link "Project Tiger" [ref=f18e1708] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Project_Tiger
                - text: to safeguard crucial wilderness; the Forest Conservation Act was enacted in 1980 and amendments added in 1988.
                - superscript [ref=f18e1709]:
                  - link "[213]" [ref=f18e1710] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEDepartment_of_Environment_and_Forests1988-233"
                - text: India hosts
                - link "more than five hundred wildlife sanctuaries" [ref=f18e1711] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Wildlife_sanctuaries_of_India
                - text: and
                - link "eighteen biosphere reserves" [ref=f18e1712] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Biosphere_reserves_of_India
                  - text: eighteenbiosphere reserves
                - text: ","
                - superscript [ref=f18e1714]:
                  - link "[214]" [ref=f18e1715] [cursor=pointer]:
                    - /url: "#cite_note-234"
                - text: four of which are part of the
                - link "World Network of Biosphere Reserves" [ref=f18e1716] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/World_Network_of_Biosphere_Reserves
                - text: ; its
                - link "eighty-nine wetlands" [ref=f18e1717] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/List_of_Ramsar_sites_in_India
                - text: are registered under the
                - link "Ramsar Convention" [ref=f18e1718] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Ramsar_Convention
                - text: .
                - superscript [ref=f18e1719]:
                  - link "[215]" [ref=f18e1720] [cursor=pointer]:
                    - /url: "#cite_note-235"
