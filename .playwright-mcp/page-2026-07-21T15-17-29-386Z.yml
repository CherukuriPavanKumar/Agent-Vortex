          - region [ref=f18e1769]:
            - heading "Government and politics" [level=2] [ref=f18e1771]
            - region [ref=f18e1772]:
              - heading "Politics" [level=3] [ref=f18e1774]
              - note [ref=f18e1775]:
                - text: "Main article:"
                - link "Politics of India" [ref=f18e1776] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Politics_of_India
              - note [ref=f18e1777]:
                - text: "See also:"
                - link "Democracy in India" [ref=f18e1778] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Democracy_in_India
              - figure [ref=f18e1779]:
                - link [ref=f18e1780] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/File:The_Prime_Minister,_Shri_Narendra_Modi_addressing_the_inaugural_function_of_the_WCIT_India_2018_at_Hyderabad_via_video_conferencing_from_Misuru,_on_February_19,_2018_(1).jpg
                - generic [ref=f18e1782]:
                  - link "Narendra Modi" [ref=f18e1783] [cursor=pointer]:
                    - /url: https://en.wikipedia.org/wiki/Narendra_Modi
                  - text: has been India's Prime Minister since 2014.
              - paragraph [ref=f18e1784]:
                - text: India is a
                - link "parliamentary republic" [ref=f18e1785] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Parliamentary_republic
                - text: with a
                - link "multi-party system" [ref=f18e1786] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Multi-party_system
                - text: .
                - superscript [ref=f18e1787]:
                  - link "[217]" [ref=f18e1788] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEBurnellCalvert1999125-237"
                - text: There are sixrecognised
                - link "national parties" [ref=f18e1790] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/List_of_political_parties_in_India#National_parties
                - text: in the country, including the
                - link "Indian National Congress" [ref=f18e1791] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Indian_National_Congress
                - text: (generally, "the Congress") and the
                - link "Bharatiya Janata Party" [ref=f18e1792] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Bharatiya_Janata_Party
                - text: (BJP); there are over 50
                - link "regional parties" [ref=f18e1794] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/List_of_political_parties_in_India#State_parties
                - text: .
                - superscript [ref=f18e1795]:
                  - link "[218]" [ref=f18e1796] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEElection_Commission_of_India-238"
                - text: The Congress is considered the
                - link "ideological centre" [ref=f18e1797] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Centrism
                - text: in Indian
                - link "political culture" [ref=f18e1798] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Political_culture
                - text: ;
                - superscript [ref=f18e1799]:
                  - link "[219]" [ref=f18e1800] [cursor=pointer]:
                    - /url: "#cite_note-239"
                - text: the BJP is
                - link "right-wing" [ref=f18e1801] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Right-wing_politics
                - text: to
                - link "far-right" [ref=f18e1802] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Far-right_politics
                - text: .
              - paragraph [ref=f18e1803]:
                - text: After India's independence on August 15, 1947,
                - link "Jawaharlal Nehru" [ref=f18e1804] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Jawaharlal_Nehru
                - text: became prime minister of the
                - link "Dominion of India" [ref=f18e1805] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Dominion_of_India
                - text: ", an office he held until January 26, 1950, when India became a republic; Nehru remained the caretaker prime minister until the following year."
                - superscript [ref=f18e1806]:
                  - link "[u]" [ref=f18e1807] [cursor=pointer]:
                    - /url: "#cite_note-243"
                - text: In the general elections in
                - link "1951" [ref=f18e1808] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/1951_Indian_general_election
                - text: ","
                - link "1957" [ref=f18e1809] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/1957_Indian_general_election
                - text: ", and"
                - link "1962" [ref=f18e1810] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/1962_Indian_general_election
                - text: ", the Congress, led by Nehru, won by comfortable margins. After Nehru"
                - link "died" [ref=f18e1811] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Death_and_state_funeral_of_Jawaharlal_Nehru
                - text: in office in May 1964,
                - link "Lal Bahadur Shastri" [ref=f18e1812] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Lal_Bahadur_Shastri
                - text: was unanimously chosen by the Congress to be parliamentary leader, and thus prime minister. After the
                - link "India–Pakistan war of 1965" [ref=f18e1813] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/India–Pakistan_war_of_1965
                - text: ", Shastri"
                - link "died" [ref=f18e1814] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Death_and_state_funeral_of_Lal_Bahadur_Shastri
                - text: in January 1966, soon after signing the
                - link "Tashkent Peace Declaration" [ref=f18e1815] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Tashkent_Declaration
                - text: . The Congress chose
                - link "Indira Gandhi" [ref=f18e1816] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Indira_Gandhi
                - text: to be prime minister. She led the party to election victories in
                - link "1967" [ref=f18e1817] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/1967_Indian_general_election
                - text: and
                - link "1971" [ref=f18e1818] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/1971_Indian_general_election
                - text: ", the latter a"
                - link "landslide" [ref=f18e1819] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Landslide_victory
                - text: after Pakistan's defeat in the
                - link "Bangladesh Liberation War" [ref=f18e1820] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Bangladesh_Liberation_War
                - text: . In 1975, Indira Gandhi declared a
                - link "state of emergency" [ref=f18e1821] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/The_Emergency_(India)
                - text: ", suspending many civil liberties. Following public discontent with the Emergency, the Congress was voted out of power in"
                - link "1977" [ref=f18e1822] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/1977_Indian_general_election
                - text: ;
                - link "Janata Party" [ref=f18e1823] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Janata_Party
                - text: ", which had opposed the Emergency, was voted in. Its government lasted two years;"
                - link "Morarji Desai" [ref=f18e1824] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Morarji_Desai
                - text: and
                - link "Charan Singh" [ref=f18e1825] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Charan_Singh
                - text: served as prime ministers. The Congress returned to power in 1980. After a
                - link "military operation" [ref=f18e1826] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Operation_Blue_Star
                - text: against
                - link "Sikh" [ref=f18e1827] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Sikhs
                - text: militants occupying the
                - link "Golden Temple" [ref=f18e1828] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Golden_Temple
                - text: in
                - link "Amritsar" [ref=f18e1829] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Amritsar
                - text: ", Indira Gandhi was"
                - link "assassinated" [ref=f18e1830] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Assassination_of_Indira_Gandhi
                - text: by a Sikh bodyguard on October 31, 1984. She was succeeded as prime minister by
                - link "Rajiv Gandhi" [ref=f18e1831] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Rajiv_Gandhi
                - text: ", who led Congress to a comfortable victory in the"
                - link "elections" [ref=f18e1832] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/1984_Indian_general_election
                - text: at the end of the year. In 1989, a
                - link "National Front" [ref=f18e1833] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/National_Front_(India)
                - text: coalition, led by the
                - link "Janata Dal" [ref=f18e1834] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Janata_Dal
                - text: ", in alliance with the"
                - link "Left Front" [ref=f18e1835] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Communist_Party_of_India_(Marxist)
                - text: ", won the"
                - link "general elections" [ref=f18e1836] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/1989_Indian_general_election
                - text: . The subsequent government lasted just under two years;
                - link "V. P. Singh" [ref=f18e1837] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/V._P._Singh
                - text: and
                - link "Chandra Shekhar" [ref=f18e1838] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Chandra_Shekhar
                - text: served as prime ministers.
                - superscript [ref=f18e1839]:
                  - link "[223]" [ref=f18e1840] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEBhambhri1992118,_143-244"
                - text: In 1991, soon after the first round of polling in the
                - link "general election" [ref=f18e1841] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/1991_Indian_general_election
                - text: ", Congress leader Rajiv Gandhi"
                - link "was assassinated" [ref=f18e1842] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Assassination_of_Rajiv_Gandhi
                - text: by a member of a
                - link "Sri Lankan Tamil" [ref=f18e1843] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Sri_Lankan_Tamils
                - link "separatist organisation" [ref=f18e1844] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Liberation_Tigers_of_Tamil_Eelam
                - text: who was seeking to avenge
                - link "Indian intervention in the Sri Lankan civil war" [ref=f18e1845] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Indian_intervention_in_the_Sri_Lankan_civil_war
                - text: . After the elections, Congress emerged as the largest single party; a new Congress leader,
                - link "P. V. Narasimha Rao" [ref=f18e1846] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/P._V._Narasimha_Rao
                - text: ", formed a"
                - link "minority government" [ref=f18e1847] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Minority_government
                - text: which served a full five-year term.
                - superscript [ref=f18e1848]:
                  - link "[224]" [ref=f18e1849] [cursor=pointer]:
                    - /url: "#cite_note-245"
              - paragraph [ref=f18e1850]:
                - text: In 1996, the BJP briefly formed a government after winning the
                - link "general election" [ref=f18e1851] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/1996_Indian_general_election
                - text: .
                - link "United Front" [ref=f18e1852] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/United_Front_(India,_1996)
                - text: coalition governments followed, which relied on external political support,
                - link "H. D. Deve Gowda" [ref=f18e1853] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/H._D._Deve_Gowda
                - text: and
                - link "I. K. Gujral" [ref=f18e1854] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/I._K._Gujral
                - text: serving as prime ministers. After the
                - link "1998 Indian general election" [ref=f18e1855] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/1998_Indian_general_election
                - text: ","
                - link "Atal Bihari Vajpayee" [ref=f18e1856] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Atal_Bihari_Vajpayee
                - text: of the BJP became prime minister; his government was short-lived due to the lack of a continued mandate. Elections were held again in
                - link "1999" [ref=f18e1857] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/1999_Indian_general_election
                - text: . The BJP, now a part of the
                - link "National Democratic Alliance" [ref=f18e1858] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/National_Democratic_Alliance
                - text: (NDA), formed a coalition government led by Vajpayee, who became the first non-Congress prime minister to complete a five-year term.
                - superscript [ref=f18e1859]:
                  - link "[225]" [ref=f18e1860] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEDunleavyDiwakarDunleavy2007-246"
                - text: In the
                - link "2004 general election" [ref=f18e1861] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/2004_Indian_general_election
                - text: ", the NDA was defeated. Congress emerged as the largest single party and formed a coalition, the"
                - link "United Progressive Alliance" [ref=f18e1862] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/United_Progressive_Alliance
                - text: (UPA).
                - link "Manmohan Singh" [ref=f18e1863] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Manmohan_Singh
                - text: ", a Sikh, who was proposed by Congress President"
                - link "Sonia Gandhi" [ref=f18e1864] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Sonia_Gandhi
                - text: to be parliamentary leader, served as prime minister of the UPA government, but with some external support.
                - superscript [ref=f18e1865]:
                  - link "[v]" [ref=f18e1866] [cursor=pointer]:
                    - /url: "#cite_note-247"
                - text: The UPA returned to power in the
                - link "2009 general election" [ref=f18e1867] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/2009_Indian_general_election
                - text: with increased numbers, no longer dependent on external support.
                - superscript [ref=f18e1868]:
                  - link "[226]" [ref=f18e1869] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEKulkeRothermund2004384-248"
                - text: Singh became the first prime minister to be re-elected after Jawaharlal Nehru in 1962.
                - superscript [ref=f18e1870]:
                  - link "[227]" [ref=f18e1871] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEBusiness_Standard2009-249"
                - text: In the
                - link "2014 general election" [ref=f18e1872] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/2014_Indian_general_election
                - text: ", the BJP under"
                - link "Narendra Modi" [ref=f18e1873] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Narendra_Modi
                - text: became the first political party since 1984 to win an absolute majority.
                - superscript [ref=f18e1874]:
                  - link "[228]" [ref=f18e1875] [cursor=pointer]:
                    - /url: "#cite_note-250"
                - text: The party won a larger majority in the
                - link "2019 general election" [ref=f18e1876] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/2019_Indian_general_election
                - text: . After losing its majority in the
                - link "2024 general election" [ref=f18e1877] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/2024_Indian_general_election
                - text: ", the BJP formed a coalition government with its NDA partners. Modi is the longest-serving non-Congress prime minister."
                - superscript [ref=f18e1878]:
                  - link "[229]" [ref=f18e1879] [cursor=pointer]:
                    - /url: "#cite_note-251"
                - link "Democratic backsliding" [ref=f18e1880] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Democratic_backsliding
                - text: was found by the 2026
                - link "V-Dem Democracy Report" [ref=f18e1881] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/V-Dem_Institute#Democracy_Report
                - text: .
                - superscript [ref=f18e1882]:
                  - link "[230]" [ref=f18e1883] [cursor=pointer]:
                    - /url: "#cite_note-j496-252"
            - region [ref=f18e1884]:
              - heading "Government" [level=3] [ref=f18e1886]
              - note [ref=f18e1887]:
                - text: "Main articles:"
                - link "Government of India" [ref=f18e1888] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Government_of_India
                - text: ","
                - link "State governments of India" [ref=f18e1889] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/State_governments_of_India
                - text: ", and"
                - link "Local government in India" [ref=f18e1890] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Local_government_in_India
              - note [ref=f18e1891]:
                - text: "See also:"
                - link "Constitution of India" [ref=f18e1892] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Constitution_of_India
              - figure [ref=f18e1893]:
                - link [ref=f18e1894] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/File:Constitution_of_India.jpg
                - generic [ref=f18e1896]:
                  - text: The original preamble of the
                  - link "Constitution of India" [ref=f18e1897] [cursor=pointer]:
                    - /url: https://en.wikipedia.org/wiki/Constitution_of_India
                  - text: in 1950. In 1976, during the tenure of Indian prime minister
                  - link "Indira Gandhi" [ref=f18e1898] [cursor=pointer]:
                    - /url: https://en.wikipedia.org/wiki/Indira_Gandhi
                  - text: ", the first sentence was changed to \"Sovereign Socialist Secular Democratic Republic\"."
              - paragraph [ref=f18e1899]:
                - text: The Constitution of India was drafted by the
                - link "Constituent Assembly of India" [ref=f18e1900] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Constituent_Assembly_of_India
                - text: with uncommon speed and absence of irregularities between 1946 and 1949.
                - superscript [ref=f18e1901]:
                  - link "[231]" [ref=f18e1902] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTESpear1990242-253"
                - text: The
                - link "Government of India Act 1935" [ref=f18e1903] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Government_of_India_Act_1935
                - text: was used as a model and framework.
                - superscript [ref=f18e1904]:
                  - link "[231]" [ref=f18e1905] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTESpear1990242-253"
                - text: Long passages from the Act were included. The constitution describes a federal state with a parliamentary system of democracy.
                - superscript [ref=f18e1906]:
                  - link "[231]" [ref=f18e1907] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTESpear1990242-253"
                - text: The federal structure was conspicuous for the strength of the central government, which exclusively exercised control of defence, foreign affairs, railways, ports, and currency.
                - superscript [ref=f18e1908]:
                  - link "[231]" [ref=f18e1909] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTESpear1990242-253"
                - text: The President, the constitutional head of state, has reserve powers for taking over the administration of a state.
                - superscript [ref=f18e1910]:
                  - link "[231]" [ref=f18e1911] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTESpear1990242-253"
                - text: "The central legislature has two houses: the"
                - link "Lok Sabha" [ref=f18e1913] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Lok_Sabha
                - text: ", whose delegates are directly elected by the people in general elections every five years, and the"
                - link "Rajya Sabha" [ref=f18e1915] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Rajya_Sabha
                - text: ", whose members are nominated by the elected representatives in the states."
                - superscript [ref=f18e1916]:
                  - link "[231]" [ref=f18e1917] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTESpear1990242-253"
                - text: There are also features not to be found in the Act of 1935. The definition of fundamental rights is based on the
                - link "Constitution of the United States" [ref=f18e1918] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Constitution_of_the_United_States
                - text: ", and the constitutional directives, or goals of endeavor, are based on the"
                - link "Constitution of Ireland" [ref=f18e1919] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Constitution_of_Ireland
                - text: .
                - superscript [ref=f18e1920]:
                  - link "[232]" [ref=f18e1921] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTESpear1990243-254"
                - text: An Indian institution recommended by the constitution is the
                - link "panchayat" [ref=f18e1923] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Panchayati_raj_in_India
                - text: or village committees.
                - superscript [ref=f18e1924]:
                  - link "[232]" [ref=f18e1925] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTESpear1990243-254"
                - link "Untouchability" [ref=f18e1926] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Untouchability
                - text: is illegal (Article 17) and caste distinctions are derecognized (Articles 15(2) and 16(2)).
                - superscript [ref=f18e1927]:
                  - link "[232]" [ref=f18e1928] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTESpear1990243-254"
                - text: The promulgation of the Indian constitution transformed India into a republic within the Commonwealth.
                - superscript [ref=f18e1929]:
                  - link "[232]" [ref=f18e1930] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTESpear1990243-254"
              - paragraph [ref=f18e1931]:
                - text: The
                - link "prime minister of India" [ref=f18e1932] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Prime_Minister_of_India
                - text: is the
                - link "head of government" [ref=f18e1933] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Head_of_government
                - text: and exercises most
                - link "executive power" [ref=f18e1934] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Executive_(government)
                - text: .
                - superscript [ref=f18e1935]:
                  - link "[233]" [ref=f18e1936] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTESharma1950-255"
                - text: Appointed by the president,
                - superscript [ref=f18e1937]:
                  - link "[234]" [ref=f18e1938] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTESharma2007162-256"
                - text: the prime minister is supported by the
                - link "party" [ref=f18e1939] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Political_party
                - text: or
                - link "political alliance" [ref=f18e1940] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Political_alliance
                - text: with a majority of seats in the lower house of parliament.
                - superscript [ref=f18e1941]:
                  - link "[233]" [ref=f18e1942] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTESharma1950-255"
                - text: The executive of the Indian government consists of the president, the
                - link "vice-president" [ref=f18e1943] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Vice_President_of_India
                - text: ", and the"
                - link "Union Council of Ministers" [ref=f18e1944] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Union_Council_of_Ministers
                - text: —with the
                - link "cabinet" [ref=f18e1945] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Cabinet_(government)
                - text: being its executive committee—headed by the prime minister. Any minister holding a portfolio must be a member of one of the houses of parliament.
                - superscript [ref=f18e1946]:
                  - link "[235]" [ref=f18e1947] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTESharma200731-257"
                - text: In the Indian parliamentary system, the executive is subordinate to the legislature; the prime minister and their council are directly responsible to the lower house of the parliament.
                - link "Civil servants" [ref=f18e1948] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Civil_Services_of_India
                - text: act as permanent executives and all decisions of the executive are implemented by them.
                - superscript [ref=f18e1949]:
                  - link "[236]" [ref=f18e1950] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEMathew2003524-258"
              - paragraph [ref=f18e1951]:
                - text: India has a three-tierunitary
                - link "independent judiciary" [ref=f18e1953] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Judicial_independence
                - superscript [ref=f18e1954]:
                  - link "[237]" [ref=f18e1955] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTENeuborne2003478-259"
                - text: comprising the
                - link "supreme court" [ref=f18e1956] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Supreme_Court_of_India
                - text: ", headed by the"
                - link "Chief Justice of India" [ref=f18e1957] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Chief_Justice_of_India
                - text: ", 25"
                - link "high courts" [ref=f18e1959] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/High_courts_of_India
                - text: ", and a large number of trial courts."
                - superscript [ref=f18e1960]:
                  - link "[237]" [ref=f18e1961] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTENeuborne2003478-259"
                - text: The supreme court has
                - link "original jurisdiction" [ref=f18e1962] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Original_jurisdiction
                - text: over cases involving
                - link "fundamental rights" [ref=f18e1963] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Fundamental_rights_in_India
                - text: and over disputes between states and the centre and has
                - link "appellate jurisdiction" [ref=f18e1964] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Appellate_jurisdiction
                - text: over the high courts.
                - superscript [ref=f18e1965]:
                  - link "[238]" [ref=f18e1966] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTESharma2007238,_255-260"
                - text: It has the power to both strike down union or state laws which contravene the constitution
                - superscript [ref=f18e1967]:
                  - link "[239]" [ref=f18e1968] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTESripati1998423–424-261"
                - text: and invalidate any government action it deems unconstitutional.
                - superscript [ref=f18e1969]:
                  - link "[240]" [ref=f18e1970] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEPylee2003b314-262"
