                - text: data, it is thought that the earliest extant
                - link "lineages" [ref=f18e948] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Lineage_(evolution)
                - text: of anatomically modern humans or
                - link "Homo sapiens" [ref=f18e950] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Homo_sapiens
                - text: on the Indian subcontinent had reached there from Africa between 80,000 and 50,000 years ago, and with high likelihood by 55,000 years ago.
                - superscript [ref=f18e951]:
                  - link "[25]" [ref=f18e952] [cursor=pointer]:
                    - /url: "#cite_note-PetragliaAllchin-36"
                - superscript [ref=f18e953]:
                  - link "[26]" [ref=f18e954] [cursor=pointer]:
                    - /url: "#cite_note-Dyson2018p1-37"
                - superscript [ref=f18e955]:
                  - link "[27]" [ref=f18e956] [cursor=pointer]:
                    - /url: "#cite_note-Fisher2018p23-38"
                - superscript [ref=f18e957]:
                  - link "[76]" [ref=f18e958] [cursor=pointer]:
                    - /url: "#cite_note-mattern-slow-moon-non-african-migration-88"
                - text: Their long occupation, initially in varying forms of isolation as hunter-gatherers, has made the region highly diverse, second only to Africa in human
                - link "genetic diversity" [ref=f18e959] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Genetic_diversity
                - text: .
                - superscript [ref=f18e960]:
                  - link "[28]" [ref=f18e961] [cursor=pointer]:
                    - /url: "#cite_note-Dyson2018-28a-39"
                - text: However, the earliest known modern human fossils in South Asia date to about 30,000 years ago.
                - superscript [ref=f18e962]:
                  - link "[26]" [ref=f18e963] [cursor=pointer]:
                    - /url: "#cite_note-Dyson2018p1-37"
                - text: Evidence for the
                - link "neolithic period" [ref=f18e964] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Neolithic_period
                - text: in the western margins of the
                - link "Indus" [ref=f18e965] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Indus_River
                - link "river basin" [ref=f18e966] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/River_basin
                - text: ", at"
                - link "Mehrgarh" [ref=f18e967] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Mehrgarh
                - text: in
                - link "Balochistan, Pakistan" [ref=f18e968] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Balochistan,_Pakistan
                - text: ", dates to after 7000 BCE. Domestication of grain-producing plants (including"
                - link "barley" [ref=f18e969] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Barley
                - text: ) and animals (including
                - link "humped zebu" [ref=f18e970] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Zebu
                - text: cattle) occurred here. These cultures gradually evolved into the
                - link "Indus Valley Civilisation" [ref=f18e971] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Indus_Valley_Civilisation
                - text: ", which flourished during 2500–1900 BCE in Pakistan and western India."
                - superscript [ref=f18e972]:
                  - link "[77]" [ref=f18e973] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEWright201045–51-89"
                - superscript [ref=f18e974]:
                  - link "[29]" [ref=f18e975] [cursor=pointer]:
                    - /url: "#cite_note-Combined-2-40"
                - text: Centred around cities such as
                - link "Mohenjo-daro" [ref=f18e976] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Mohenjo-daro
                - text: ","
                - link "Harappa" [ref=f18e977] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Harappa
                - text: ","
                - link "Dholavira" [ref=f18e978] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Dholavira
                - text: ","
                - link "Ganweriwala" [ref=f18e979] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Ganweriwala
                - text: ", and"
                - link "Rakhigarhi" [ref=f18e980] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Rakhigarhi
                - text: ","
                - superscript [ref=f18e981]:
                  - link "[78]" [ref=f18e982] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEWright2010107-90"
                - text: its characteristic features included standardised weights,
                - link "steatite" [ref=f18e983] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Soapstone
                - link "seals" [ref=f18e984] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Indus_Valley_Civilisation#Seals
                - text: ", a written script, urban planning, public works, and arts and crafts including pottery styles, terracotta human figures and animal statuettes."
                - superscript [ref=f18e985]:
                  - link "[78]" [ref=f18e986] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEWright2010107-90"
                - text: Networks of towns and villages grew around the cities in a new
                - link "agro" [ref=f18e987] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Agriculture
                - text: "-"
                - link "pastoral" [ref=f18e988] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Animal_husbandry
                - text: economy.
                - superscript [ref=f18e989]:
                  - link "[79]" [ref=f18e990] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEWright2010145–146-91"
              - paragraph [ref=f18e991]:
                - text: Between 1500 BCE and 1200 BCE, an
                - link "archaic form" [ref=f18e992] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Proto-language
                - text: of
                - link "Sanskrit" [ref=f18e993] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Sanskrit
                - text: ", an"
                - link "Indo-European language" [ref=f18e994] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Indo-European_language
                - text: ","
                - link "diffused" [ref=f18e995] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Trans-cultural_diffusion
                - text: into India from the northwest. Its evidence today is found in the
                - link "Rig Veda" [ref=f18e996] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Rig_Veda
                - text: —the oldest scripture associated with what later became
                - link "Hinduism" [ref=f18e997] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Hinduism
                - text: —which was composed by
                - link "Indo-Aryan" [ref=f18e998] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Indo-Aryan_languages
                - text: "-speaking tribes migrating east from what is today northern"
                - link "Afghanistan" [ref=f18e999] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Afghanistan
                - text: and across the
                - link "Punjab region" [ref=f18e1000] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Punjab_region
                - text: .
                - superscript [ref=f18e1001]:
                  - link "[30]" [ref=f18e1002] [cursor=pointer]:
                    - /url: "#cite_note-lowe1-41"
                - superscript [ref=f18e1003]:
                  - link "[31]" [ref=f18e1004] [cursor=pointer]:
                    - /url: "#cite_note-Combined-4-Rigveda-42"
                - text: The settling of the
                - link "Ganges" [ref=f18e1005] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Ganges_river
                - link "river plain" [ref=f18e1006] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/River_plain
                - text: took place during the next millennium, when large swathes of the river system's adjoining regions were deforested, at times by setting fires, or later by employing iron implements, and prepared for agriculture. The settlement may have involved driving the preexisting people out or enslaving them.
                - superscript [ref=f18e1007]:
                  - link "[80]" [ref=f18e1008] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEDyson201816,_25-92"
                - text: The
                - link "Dravidian languages" [ref=f18e1009] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Dravidian_languages
                - text: of India were supplanted in the north, creating a broad
                - link "language family" [ref=f18e1010] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Language_family
                - text: "-divide, with the Indo-Aryan languages being spoken mainly in the"
                - link "north" [ref=f18e1011] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/North_India
                - text: and
                - link "west" [ref=f18e1012] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/West_India
                - text: ", and the Dravidian in some parts of"
                - link "east India" [ref=f18e1013] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/East_India
                - text: and most of the
                - link "south" [ref=f18e1014] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/South_India
                - text: .
                - superscript [ref=f18e1015]:
                  - link "[33]" [ref=f18e1016] [cursor=pointer]:
                    - /url: "#cite_note-Combined-4-44"
                - link "Classical Sanskrit" [ref=f18e1017] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Classical_Sanskrit
                - text: ", a refined and standardised grammatical form would emerge in the mid-1st millennium BCE and was codified in the"
                - link "Aṣṭādhyāyī" [ref=f18e1019] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Aṣṭādhyāyī
                - text: ('Eight chapters') of
                - link "Pāṇini" [ref=f18e1020] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Pāṇini
                - text: .
                - superscript [ref=f18e1021]:
                  - link "[m]" [ref=f18e1022] [cursor=pointer]:
                    - /url: "#cite_note-94"
                - text: The two major Sanskrit epics, the
                - link "Mahābhārata" [ref=f18e1023] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Mahābhārata
                - text: and the
                - link "Rāmāyaṇa" [ref=f18e1024] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Rāmāyaṇa
                - text: ", however, were composed in a range of oral storytelling registers called"
                - link "Epic Sanskrit" [ref=f18e1025] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Epic_Sanskrit
                - text: which was used in northern India between 400 BCE and 300 CE, and roughly contemporary with classical Sanskrit.
                - superscript [ref=f18e1026]:
                  - link "[82]" [ref=f18e1027] [cursor=pointer]:
                    - /url: "#cite_note-Lowe2017-epic-95"
              - paragraph [ref=f18e1028]:
                - text: A second
                - link "urbanisation" [ref=f18e1029] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Urbanisation
                - text: had taken place in
                - link "South Asia" [ref=f18e1030] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/South_Asia
                - text: by 400 BCE, this time on the Ganges plain. In fortified cities,
                - link "social differentiation" [ref=f18e1031] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Social_differentiation
                - text: by
                - link "caste" [ref=f18e1032] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Caste
                - text: ", or"
                - link "varna" [ref=f18e1033] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Varna_(Hinduism)
                - text: ", had emerged."
                - superscript [ref=f18e1034]:
                  - link "[34]" [ref=f18e1035] [cursor=pointer]:
                    - /url: "#cite_note-Dyson2018-16a-45"
                - text: "By the mid-millennium two new ethical and social systems had arisen:"
                - link "Jainism" [ref=f18e1036] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/History_of_Jainism
                - text: based on the teachings of
                - link "Mahavira" [ref=f18e1037] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Mahavira
                - text: and
                - link "Buddhism" [ref=f18e1038] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/History_of_Buddhism_in_India
                - text: on those of
                - link "the Buddha" [ref=f18e1039] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/The_Buddha
                - text: . Both religions stressed non-violence and abjured animal sacrifices conducted in
                - link "Brahmanism" [ref=f18e1040] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Historical_Vedic_religion#Brahmanism
                - text: ","
                - superscript [ref=f18e1041]:
                  - link "[n]" [ref=f18e1042] [cursor=pointer]:
                    - /url: "#cite_note-96"
                - text: and birth into a fixed hereditary varna. By living ethically, lay people could rise socially and morally in these religions.
                - superscript [ref=f18e1043]:
                  - link "[35]" [ref=f18e1044] [cursor=pointer]:
                    - /url: "#cite_note-Fisher2018-59-46"
                - text: Chronicling the life of the Buddha was central to the beginnings of recorded history in India.
                - superscript [ref=f18e1045]:
                  - link "[83]" [ref=f18e1046] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEStein201021,_61–62-97"
                - text: The rise of the two religions was a backdrop to the emergence of the first loose-knit geographically extensive power in South Asia, the
                - link "Maurya Empire" [ref=f18e1047] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Maurya_Empire
                - text: . During the rule of the founder's grandson,
                - link "Ashoka" [ref=f18e1048] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Ashoka
                - text: (ca. 268–232 BCE), the empire briefly controlled the major urban hubs and arteries of the subcontinent, except in the deep south.
                - superscript [ref=f18e1049]:
                  - link "[84]" [ref=f18e1050] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEDyson201816–17-98"
                - superscript [ref=f18e1051]:
                  - link "[o]" [ref=f18e1052] [cursor=pointer]:
                    - /url: "#cite_note-100"
                - superscript [ref=f18e1053]:
                  - link "[p]" [ref=f18e1054] [cursor=pointer]:
                    - /url: "#cite_note-102"
                - text: The empire's period was notable for creativity in art, architecture, inscriptions, and produced texts,
                - superscript [ref=f18e1055]:
                  - link "[87]" [ref=f18e1056] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTELudden201428–29-103"
                - text: but also for the declining rights of women in the mainstream
                - link "Indo-Aryan speaking" [ref=f18e1057] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Indo-Aryan_languages
                - text: regions.
                - superscript [ref=f18e1058]:
                  - link "[88]" [ref=f18e1059] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEDyson201819-104"
                - text: Following his
                - link "conquest of Kalinga" [ref=f18e1060] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Kalinga_War
                - text: ", in which his forces caused immense loss of life, Ashoka adopted"
                - link "Buddhism" [ref=f18e1061] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Buddhism
                - text: ", subsequently adopting a policy of dhamma and commissioning numerous"
                - link "rock and pillar edicts" [ref=f18e1062] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Edicts_of_Ashoka
                - text: throughout the Maurya Empire to promote ethical conduct, non-violence, and social welfare.
                - superscript [ref=f18e1063]:
                  - link "[89]" [ref=f18e1064] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEStein201073-105"
                - text: As the edicts forbade both the killing of wild animals and the destruction of forests, Ashoka is seen by some modern environmental historians as an early embodiment of that ethos.
                - superscript [ref=f18e1065]:
                  - link "[90]" [ref=f18e1066] [cursor=pointer]:
                    - /url: "#cite_note-elverskog-2020-lead-1-106"
                - superscript [ref=f18e1067]:
                  - link "[91]" [ref=f18e1068] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEFisher201872-107"
              - paragraph [ref=f18e1069]:
                - text: By the 4th and 5th centuries, the
                - link "Gupta Empire" [ref=f18e1070] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Gupta_Empire
                - text: had created a complex system of administration and taxation in the greater Ganges Plain;
                - superscript [ref=f18e1071]:
                  - link "[92]" [ref=f18e1072] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEKulkeRothermund2016118,_126-108"
                - text: this system became a model for later Indian kingdoms.
                - superscript [ref=f18e1073]:
                  - link "[93]" [ref=f18e1074] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTERobb201168–69-109"
                - text: Under the Guptas, a renewed Hinduism based on devotion, rather than the management of ritual, began to assert itself.
                - superscript [ref=f18e1075]:
                  - link "[94]" [ref=f18e1076] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEStein201093–94-110"
                - text: The renewal was reflected in a flowering of art, literature, and science.
                - superscript [ref=f18e1077]:
                  - link "[95]" [ref=f18e1078] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEGilbert201754–55-111"
                - superscript [ref=f18e1079]:
                  - link "[39]" [ref=f18e1080] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEKulkeRothermund2016122–123-50"
                - text: In South India, the
                - link "Sangam literature" [ref=f18e1081] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Sangam_literature
                - text: of the
                - link "Tamil language" [ref=f18e1082] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Tamil_language
                - text: reveals that, between 200 BCE and 200 CE, the southern peninsula was ruled by the
                - link "Cheras" [ref=f18e1083] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Chera_dynasty
                - text: and the
                - link "Cholas" [ref=f18e1084] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Chola_dynasty
                - text: ", along the western and eastern plains, respectively, of the"
                - link "Kaveri river" [ref=f18e1085] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Kaveri_river
                - text: valley, and the
                - link "Pandyas" [ref=f18e1086] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Pandya
                - text: farther south along the
                - link "Vaigai river" [ref=f18e1087] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Vaigai_river
                - text: valley.
                - superscript [ref=f18e1088]:
                  - link "[96]" [ref=f18e1089] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEStein201098-112"
                - text: By the sixth century, the
                - link "Pallavas" [ref=f18e1090] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Pallava
                - text: had grown into a regional power. Simultaneously, Buddhism and Jainism, which had favoured a conservative
                - link "transactionalism" [ref=f18e1091] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Transactionalism
                - text: ", were replaced by kingly devotion to the gods of particular places, which became a characteristic of the"
                - link "Bhakti movement" [ref=f18e1092] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Bhakti_movement
                - text: .
                - superscript [ref=f18e1093]:
                  - link "[97]" [ref=f18e1094] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEStein2010100–101-113"
                - text: The Pallavas, in particular,
                - link "traded extensively with the Roman Empire" [ref=f18e1095] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Indo-Roman_trade_relations
                - text: and with
                - link "West" [ref=f18e1096] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Western_Asia
                - text: and
                - link "Southeast Asia" [ref=f18e1097] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Southeast_Asia
                - text: .
                - superscript [ref=f18e1098]:
                  - link "[98]" [ref=f18e1099] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEStein201099-114"
            - region [ref=f18e1100]:
              - heading "Medieval India" [level=3] [ref=f18e1102]
              - note [ref=f18e1103]:
                - text: "Main article:"
                - link "Medieval India" [ref=f18e1104] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Medieval_India
              - figure [ref=f18e1105]:
                - link [ref=f18e1106] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/File:Brihadisvara_Temple_during_Maha_Shivaratri-WUS03611_(edit).jpg
                - generic [ref=f18e1108]:
                  - link "Brihadisvara Temple" [ref=f18e1109] [cursor=pointer]:
                    - /url: https://en.wikipedia.org/wiki/Brihadisvara_Temple
                  - text: ", built by"
                  - link "Chola" [ref=f18e1110] [cursor=pointer]:
                    - /url: https://en.wikipedia.org/wiki/Chola_Empire
                  - link "Rajaraja I" [ref=f18e1111] [cursor=pointer]:
                    - /url: https://en.wikipedia.org/wiki/Rajaraja_I
                  - text: between 1003 and 1010 CE
              - figure [ref=f18e1112]:
                - link [ref=f18e1113] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/File:Close_view_and_art_work_of_Qutb_Minar.jpg
                - generic [ref=f18e1115]:
                  - text: Calligraphy on the
                  - link "Qutb Minar" [ref=f18e1116] [cursor=pointer]:
                    - /url: https://en.wikipedia.org/wiki/Qutb_Minar
                  - text: ", built in the"
                  - link "Delhi sultanate" [ref=f18e1117] [cursor=pointer]:
                    - /url: https://en.wikipedia.org/wiki/Delhi_sultanate
                  - text: from 1199 CE to 1220 CE
              - paragraph [ref=f18e1118]:
                - text: The Indian early medieval age, from 600 to 1200 CE, was defined by regional kingdoms and cultural diversity.
                - superscript [ref=f18e1119]:
                  - link "[99]" [ref=f18e1120] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEStein2010116-115"
                - text: No ruler of this period was able to create an empire and consistently control lands much beyond their core region.
                - superscript [ref=f18e1121]:
                  - link "[q]" [ref=f18e1122] [cursor=pointer]:
                    - /url: "#cite_note-117"
                - superscript [ref=f18e1123]:
                  - link "[100]" [ref=f18e1124] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEStein2010115–116-116"
                - text: During this time, pastoral peoples, whose land had been cleared to make way for the growing agricultural economy, were accommodated within caste society, as were new non-traditional ruling classes.
                - superscript [ref=f18e1125]:
                  - link "[101]" [ref=f18e1126] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEStein2010116–117-118"
                - text: The caste system consequently began to show regional differences.
                - superscript [ref=f18e1127]:
                  - link "[101]" [ref=f18e1128] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEStein2010116–117-118"
              - paragraph [ref=f18e1129]:
                - text: In the 6th and 7th centuries, the first
                - link "devotional hymns" [ref=f18e1130] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Bhakti
                - text: were composed in Tamil.
                - superscript [ref=f18e1131]:
                  - link "[102]" [ref=f18e1132] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEStein2010118-119"
                - text: They were imitated all over India and led to both the resurgence of Hinduism and the development of all
                - link "modern languages of the subcontinent" [ref=f18e1133] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Languages_of_India
                - text: .
                - superscript [ref=f18e1134]:
                  - link "[102]" [ref=f18e1135] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEStein2010118-119"
                - text: Indian royalty, big and small, and the temples they patronised drew citizens in significant numbers to the capital cities, which became economic hubs as well.
                - superscript [ref=f18e1136]:
                  - link "[103]" [ref=f18e1137] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEStein2010118–119-120"
                - text: Temple towns of various sizes began to appear everywhere as India underwent another urbanisation.
                - superscript [ref=f18e1138]:
                  - link "[103]" [ref=f18e1139] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEStein2010118–119-120"
                - text: By the 8th and 9th centuries, the effects were felt in Southeast Asia, as South Indian culture and political systems were exported to lands that became part of modern-day
                - link "Myanmar" [ref=f18e1140] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Myanmar
                - text: ","
                - link "Thailand" [ref=f18e1141] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Thailand
                - text: ","
                - link "Laos" [ref=f18e1142] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Laos
                - text: ","
                - link "Brunei" [ref=f18e1143] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Brunei
                - text: ","
                - link "Cambodia" [ref=f18e1144] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Cambodia
                - text: ","
                - link "Vietnam" [ref=f18e1145] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Vietnam
                - text: ","
                - link "Philippines" [ref=f18e1146] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Philippines
                - text: ","
                - link "Malaysia" [ref=f18e1147] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Malaysia
                - text: ", and"
                - link "Indonesia" [ref=f18e1148] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Indonesia
                - text: .
                - superscript [ref=f18e1149]:
                  - link "[104]" [ref=f18e1150] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEStein2010121–123-121"
                - text: Indian merchants, scholars, and sometimes armies were involved in this transmission; Southeast Asians took the initiative as well, with many sojourning in Indian seminaries and translating Buddhist and Hindu texts into their languages.
                - superscript [ref=f18e1151]:
                  - link "[104]" [ref=f18e1152] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEStein2010121–123-121"
              - paragraph [ref=f18e1153]:
                - text: After the 10th century, Muslim Central Asian nomadic clans, using
                - link "swift-horse" [ref=f18e1154] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Courser_(horse)
                - text: cavalry and raising vast armies united by ethnicity, repeatedly overran South Asia's north-western plains,
                - superscript [ref=f18e1155]:
                  - link "[r]" [ref=f18e1156] [cursor=pointer]:
                    - /url: "#cite_note-123"
                - text: leading eventually to the establishment of the Islamic
                - link "Delhi Sultanate" [ref=f18e1157] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Delhi_Sultanate
                - text: in 1206.
                - superscript [ref=f18e1158]:
                  - link "[106]" [ref=f18e1159] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTELudden201485-124"
                - text: The sultanate was to control much of North India and to make many forays into South India. Although at first disruptive for the Indian elites, the sultanate largely left its vast non-Muslim subject population to its own laws and customs.
                - superscript [ref=f18e1160]:
                  - link "[107]" [ref=f18e1161] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEAsherTalbot202254-125"
                - superscript [ref=f18e1162]:
                  - link "[108]" [ref=f18e1163] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEMetcalfMetcalf201241-126"
              - paragraph [ref=f18e1164]:
                - text: By repeatedly repulsing
                - link "Mongol raiders" [ref=f18e1165] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Mongol_Empire
                - text: in the 13th century, the sultanate saved India from the devastation visited on West and Central Asia,
                - superscript [ref=f18e1166]:
                  - link "[106]" [ref=f18e1167] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTELudden201485-124"
                - text: setting the scene for centuries of
                - link "migration" [ref=f18e1168] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Human_migration
                - text: of fleeing soldiers, learned men, mystics, traders, artists, and artisans from that region into the subcontinent, thereby creating a syncretic Indo-Islamic culture in the north.
                - superscript [ref=f18e1169]:
                  - link "[109]" [ref=f18e1170] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEAsherTalbot200850–51-127"
                - text: The sultanate's raiding and weakening of the regional kingdoms of South India paved the way for the indigenous
                - link "Vijayanagara Empire" [ref=f18e1171] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Vijayanagara_Empire
                - text: .
                - superscript [ref=f18e1172]:
                  - link "[110]" [ref=f18e1173] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEAsherTalbot200853-128"
                - text: Embracing a strong
                - link "Shaivite" [ref=f18e1174] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Shaivism
                - text: tradition and building upon the military technology of the sultanate, the empire came to control a large portion of peninsular India,
                - superscript [ref=f18e1175]:
                  - link "[111]" [ref=f18e1176] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEMetcalfMetcalf201247-129"
                - text: and was to influence South Indian society for long afterwards.
                - superscript [ref=f18e1177]:
                  - link "[110]" [ref=f18e1178] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEAsherTalbot200853-128"
            - region [ref=f18e1179]:
              - heading "Early modern India" [level=3] [ref=f18e1181]
              - figure [ref=f18e1182]:
                - link [ref=f18e1183] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/File:Shaikh_Salim_Chishti_Ka_Maqbara.jpg
                - generic [ref=f18e1185]:
                  - text: The
                  - link "dargah" [ref=f18e1187] [cursor=pointer]:
                    - /url: https://en.wikipedia.org/wiki/Dargah
                  - text: of
                  - link "Sufi" [ref=f18e1188] [cursor=pointer]:
                    - /url: https://en.wikipedia.org/wiki/Sufi
                  - link "Salim Chisti" [ref=f18e1189] [cursor=pointer]:
                    - /url: https://en.wikipedia.org/wiki/Salim_Chisti
                  - text: ", built by"
                  - link "Mughal emperor" [ref=f18e1190] [cursor=pointer]:
                    - /url: https://en.wikipedia.org/wiki/Mughal_Empire
                  - text: ","
                  - link "Akbar" [ref=f18e1191] [cursor=pointer]:
                    - /url: https://en.wikipedia.org/wiki/Akbar
                  - text: ", early 17th century"
              - figure [ref=f18e1192]:
                - link [ref=f18e1193] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/File:India_1835_2_Mohurs.jpg
                - generic [ref=f18e1195]:
                  - text: An
                  - link "East India Company rule" [ref=f18e1196] [cursor=pointer]:
                    - /url: https://en.wikipedia.org/wiki/Company_rule_in_India
                  - text: gold
                  - link "mohur" [ref=f18e1197] [cursor=pointer]:
                    - /url: https://en.wikipedia.org/wiki/Mohur
                  - text: ", issued during the reign of"
                  - link "William IIII" [ref=f18e1198] [cursor=pointer]:
                    - /url: https://en.wikipedia.org/wiki/William_IV
              - paragraph [ref=f18e1199]:
                - text: In the early 16th century, northern India, then under mainly Muslim rulers,
                - superscript [ref=f18e1200]:
                  - link "[112]" [ref=f18e1201] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTERobb201197&ndash;98-130"
                - text: fell again to the superior mobility and firepower of a new generation of Central Asian warriors.
                - superscript [ref=f18e1202]:
                  - link "[113]" [ref=f18e1203] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEStein2010159-131"
                - text: The resulting
                - link "Mughal Empire" [ref=f18e1204] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Mughal_Empire
                - text: did not stamp out the local societies it came to rule. Instead, it balanced and pacified them through new administrative practices
                - superscript [ref=f18e1205]:
                  - link "[114]" [ref=f18e1206] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEAsherTalbot2022136-132"
                - superscript [ref=f18e1207]:
                  - link "[115]" [ref=f18e1208] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTERobb2011108–109-133"
                - text: and diverse and inclusive ruling elites,
                - superscript [ref=f18e1209]:
                  - link "[116]" [ref=f18e1210] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEMetcalfMetcalf201215-134"
                - text: leading to more systematic, centralised, and uniform rule.
                - superscript [ref=f18e1211]:
                  - link "[117]" [ref=f18e1212] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEAsherTalbot2022136,_151–152-135"
                - text: Eschewing tribal bonds and Islamic identity, especially under
                - link "Akbar" [ref=f18e1213] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Akbar
                - text: ", the Mughals united their far-flung realms through loyalty—expressed through a Persianised culture—to an emperor who had near-divine status."
                - superscript [ref=f18e1214]:
                  - link "[118]" [ref=f18e1215] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEMetcalfMetcalf201217-136"
              - paragraph [ref=f18e1216]:
                - text: The Mughal state's economic policies, deriving most revenues from agriculture
                - superscript [ref=f18e1217]:
                  - link "[119]" [ref=f18e1218] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEAsherTalbot2008158-137"
                - text: and mandating that taxes be paid in the well-regulated silver currency,
                - superscript [ref=f18e1219]:
                  - link "[120]" [ref=f18e1220] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEStein2010164-138"
                - text: caused peasants and artisans to enter larger markets.
                - superscript [ref=f18e1221]:
                  - link "[121]" [ref=f18e1222] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEAsherTalbot2022187-139"
                - text: The relative peace maintained by the empire during much of the 17th century was a factor in India's economic expansion,
                - superscript [ref=f18e1223]:
                  - link "[121]" [ref=f18e1224] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEAsherTalbot2022187-139"
                - text: resulting in greater patronage of
                - link "painting" [ref=f18e1225] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Mughal_painting
                - text: ", literary forms, textiles, and"
                - link "architecture" [ref=f18e1226] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Mughal_architecture
                - text: .
                - superscript [ref=f18e1227]:
                  - link "[122]" [ref=f18e1228] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEAsherTalbot2008186-140"
                - text: Newly coherent social groups in northern and western India, such as the
                - link "Marathas" [ref=f18e1229] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Maratha_Empire
                - text: ", the"
                - link "Rajputs" [ref=f18e1230] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Rajput
                - text: ", and the"
                - link "Sikhs" [ref=f18e1231] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Sikh_Empire
                - text: ", gained military and governing ambitions during Mughal rule, which, through collaboration or adversity, gave them both recognition and military experience."
                - superscript [ref=f18e1232]:
                  - link "[123]" [ref=f18e1233] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEMetcalfMetcalf200623–24-141"
                - text: Expanding commerce during Mughal rule gave rise to new Indian commercial and political elites along the coasts of southern and eastern India.
                - superscript [ref=f18e1234]:
                  - link "[123]" [ref=f18e1235] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEMetcalfMetcalf200623–24-141"
                - text: The incremental fragmentation of imperial authority during the late 17th and 18th centuries facilitated a process of decentralisation, enabling provincial elites to assert localised autonomy and consolidate control over their own affairs.
                - superscript [ref=f18e1236]:
                  - link "[124]" [ref=f18e1237] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEAsherTalbot2008256-142"
              - paragraph [ref=f18e1238]:
                - text: By the early 18th century, with the lines between commercial enterprise and political sovereignty increasingly blurred, European chartered companies—notably the
                - link "English East India Company" [ref=f18e1239] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/East_India_Company
                - text: —solidified their presence through fortified coastal outposts.
                - superscript [ref=f18e1240]:
                  - link "[125]" [ref=f18e1241] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEAsherTalbot2008286-143"
                - superscript [ref=f18e1242]:
                  - link "[126]" [ref=f18e1243] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEMetcalfMetcalf200644–49-144"
                - text: The East India Company's control of the seas, greater resources, and more advanced military training and technology led it to assert its military strength increasingly and caused it to become attractive to a portion of the Indian elite; these factors were crucial in allowing the company to gain control over the
                - link "Bengal" [ref=f18e1244] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Bengal
                - text: region by 1765 and sideline the other European companies.
                - superscript [ref=f18e1245]:
                  - link "[127]" [ref=f18e1246] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTERobb2011115–117-145"
                - superscript [ref=f18e1247]:
                  - link "[125]" [ref=f18e1248] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEAsherTalbot2008286-143"
                - superscript [ref=f18e1249]:
                  - link "[128]" [ref=f18e1250] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTELudden2002128–132-146"
                - superscript [ref=f18e1251]:
                  - link "[129]" [ref=f18e1252] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEMetcalfMetcalf200651–55-147"
                - text: Its further access to the riches of Bengal and the subsequent increased strength and size of its army enabled it to annexe or subdue most of India by the 1820s.
                - superscript [ref=f18e1253]:
                  - link "[130]" [ref=f18e1254] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEMetcalfMetcalf200668–71-148"
                - text: India was no longer exporting manufactured goods as it long had, but instead supplying the
                - link "British Empire" [ref=f18e1255] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/British_Empire
                - text: with raw materials. Many historians consider this to be the onset of India's colonial period.
                - superscript [ref=f18e1256]:
                  - link "[125]" [ref=f18e1257] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEAsherTalbot2008286-143"
                - text: By this time, with its economic power severely curtailed by the British parliament and having effectively been made an arm of British administration, the East India Company began more consciously to enter non-economic arenas, including education, social reform, and culture.
                - superscript [ref=f18e1258]:
                  - link "[131]" [ref=f18e1259] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEAsherTalbot2008289-149"
            - region [ref=f18e1260]:
              - heading "Modern India" [level=3] [ref=f18e1262]
              - note [ref=f18e1263]:
                - text: "Main article:"
                - link "History of India (1947–present)" [ref=f18e1264] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/History_of_India_(1947–present)
              - figure [ref=f18e1265]:
                - link [ref=f18e1266] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/File:Mahatma_Gandhi_leaves_Presidency_Jail_in_Calcutta.jpg
                - generic [ref=f18e1268]:
                  - text: Mahatma Gandhi after a visit to the Presidency Jail,
                  - link "Calcutta" [ref=f18e1269] [cursor=pointer]:
                    - /url: https://en.wikipedia.org/wiki/Calcutta
                  - text: ", April 1938"
              - figure [ref=f18e1270]:
                - link [ref=f18e1271] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/File:Palace_of_Assembly_Chandigarh_2006.jpg
                - generic [ref=f18e1273]:
                  - text: The
                  - link "Capitol Complex" [ref=f18e1274] [cursor=pointer]:
                    - /url: https://en.wikipedia.org/wiki/Chandigarh_Capitol_Complex
                  - text: in
                  - link "Chandigarh" [ref=f18e1275] [cursor=pointer]:
                    - /url: https://en.wikipedia.org/wiki/Chandigarh
                  - text: ", commissioned after India's"
                  - link "1947 partition" [ref=f18e1276] [cursor=pointer]:
                    - /url: https://en.wikipedia.org/wiki/Partition_of_India
              - paragraph [ref=f18e1277]:
                - text: The appointment in 1848 of
                - link "Lord Dalhousie" [ref=f18e1278] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/James_Broun-Ramsay,_1st_Marquess_of_Dalhousie
                - text: "as Governor General of the East India Company set the stage for changes essential to a modern state: the consolidation and demarcation of sovereignty, the surveillance of the population, and the education of citizens. Technological changes—among them, railways, canals, and the telegraph—were introduced not long after their introduction in"
                - link "Europe" [ref=f18e1279] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Europe
                - text: .
                - superscript [ref=f18e1280]:
                  - link "[132]" [ref=f18e1281] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTERobb2011169–171-150"
                - superscript [ref=f18e1282]:
                  - link "[133]" [ref=f18e1283] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEMetcalfMetcalf200694–99-151"
                - superscript [ref=f18e1284]:
                  - link "[134]" [ref=f18e1285] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEBrown199483-152"
                - superscript [ref=f18e1286]:
                  - link "[135]" [ref=f18e1287] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEPeers200650-153"
                - text: Disaffection with the company also grew during this time and set off the
                - link "Indian Rebellion of 1857" [ref=f18e1288] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Indian_Rebellion_of_1857
                - text: . Fed by diverse resentments and perceptions, including invasive British-style social reforms, harsh land taxes, and summary treatment of some wealthy landowners and princes, the rebellion rocked many regions of northern and central India and shook the foundations of Company rule.
                - superscript [ref=f18e1289]:
                  - link "[136]" [ref=f18e1290] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEMetcalfMetcalf2006100–103-154"
                - superscript [ref=f18e1291]:
                  - link "[137]" [ref=f18e1292] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEBrown199485–86-155"
                - text: After the rebellion was suppressed in 1858, the East India Company was disbanded, and the British government began to
                - link "directly administer India" [ref=f18e1293] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/British_Raj
                - text: . Proclaiming a
                - link "unitary state" [ref=f18e1294] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Unitary_state
                - text: and a gradual but limited British-style parliamentary system,
                - superscript [ref=f18e1295]:
                  - link "[138]" [ref=f18e1296] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEStein2010227-156"
                - text: the new rulers also protected princes and landed gentry as a feudal safeguard against future unrest.
                - superscript [ref=f18e1297]:
                  - link "[139]" [ref=f18e1298] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEMetcalfMetcalf2006103–108-157"
                - text: In the decades following, public life gradually emerged across India, eventually leading to the founding of the
                - link "Indian National Congress" [ref=f18e1299] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Indian_National_Congress
                - text: in 1885.
                - superscript [ref=f18e1300]:
                  - link "[140]" [ref=f18e1301] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTERobb2001183-158"
                - superscript [ref=f18e1302]:
                  - link "[141]" [ref=f18e1303] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTESarkar19831–4-159"
                - superscript [ref=f18e1304]:
                  - link "[142]" [ref=f18e1305] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTECopland2001ix–x-160"
                - superscript [ref=f18e1306]:
                  - link "[143]" [ref=f18e1307] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEMetcalfMetcalf2006123-161"
              - paragraph [ref=f18e1308]:
                - text: The rush of technology and the commercialisation of agriculture in the second half of the 19th century was marked by economic setbacks, and many small farmers became dependent on the whims of faraway markets.
                - superscript [ref=f18e1309]:
                  - link "[144]" [ref=f18e1310] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEStein2010249-162"
                - text: There was an increase in the number of large-scale
                - link "famines" [ref=f18e1311] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Famine_in_India
                - text: ","
                - superscript [ref=f18e1312]:
                  - link "[145]" [ref=f18e1313] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEStein2010245-163"
                - text: and, despite the risks of infrastructure development borne by Indian taxpayers, little industrial employment was generated for Indians.
                - superscript [ref=f18e1314]:
                  - link "[146]" [ref=f18e1315] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEStein2010247–248-164"
                - text: However, commercial cropping, especially in the newly canalled Punjab, led to increased food production for internal consumption.
                - superscript [ref=f18e1316]:
                  - link "[147]" [ref=f18e1317] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEMetcalfMetcalf2006126-165"
                - text: The railway network provided critical famine relief,
                - superscript [ref=f18e1318]:
                  - link "[148]" [ref=f18e1319] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEMetcalfMetcalf200697-166"
                - text: notably reduced the cost of moving goods,
                - superscript [ref=f18e1320]:
                  - link "[148]" [ref=f18e1321] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEMetcalfMetcalf200697-166"
                - text: and helped nascent Indian-owned industry.
                - superscript [ref=f18e1322]:
                  - link "[147]" [ref=f18e1323] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEMetcalfMetcalf2006126-165"
              - paragraph [ref=f18e1324]:
                - text: After
                - link "World War I" [ref=f18e1325] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/World_War_I
                - text: ", in which more than"
                - link "1.3 million Indians served" [ref=f18e1326] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Indian_Army_during_World_War_I
                - text: ","
                - superscript [ref=f18e1327]:
                  - link "[149]" [ref=f18e1328] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEMetcalfMetcalf2006163-167"
                - text: a new period began. It was marked by
                - link "British reforms" [ref=f18e1329] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Montagu–Chelmsford_Reforms
                - text: but also
                - link "repressive legislation" [ref=f18e1330] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Rowlatt_act
                - text: ", by more strident Indian calls for self-rule, and by the beginnings of a"
                - link "nonviolent" [ref=f18e1331] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Nonviolent
                - text: movement of non-co-operation led by
                - link "Mahatma Gandhi" [ref=f18e1332] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Mahatma_Gandhi
                - text: .
                - superscript [ref=f18e1333]:
                  - link "[150]" [ref=f18e1334] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEMetcalfMetcalf2006167-168"
                - text: During the 1930s, the British enacted slow legislative reform; the Indian National Congress won victories in the resulting elections.
                - superscript [ref=f18e1335]:
                  - link "[151]" [ref=f18e1336] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEMetcalfMetcalf2006195–197-169"
                - text: "The next decade was beset with crises:"
                - link "Indian participation in World War II" [ref=f18e1337] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/India_in_World_War_II
                - text: ", the Congress's final push for non-co-operation, and an upsurge of"
                - link "Muslim nationalism" [ref=f18e1338] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Muslim_nationalism_in_South_Asia
                - text: . All were capped by the advent of independence in 1947, but tempered by the
                - link "partition of India" [ref=f18e1339] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Partition_of_India
                - text: "into two states: India and Pakistan."
                - superscript [ref=f18e1340]:
                  - link "[152]" [ref=f18e1341] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEMetcalfMetcalf2006203-170"
              - paragraph [ref=f18e1342]:
                - text: India's constitution was adopted in 1950 and established a secular, democratic republic.
                - superscript [ref=f18e1343]:
                  - link "[153]" [ref=f18e1344] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEMetcalfMetcalf2006231-171"
                - text: Economic liberalisation has created a large urban middle class and transformed India into a
                - link "fast growing economy" [ref=f18e1345] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/List_of_countries_by_GDP_(real)_growth_rate
                - text: .
                - superscript [ref=f18e1346]:
                  - link "[154]" [ref=f18e1347] [cursor=pointer]:
                    - /url: "#cite_note-exp-middle-class-172"
                - superscript [ref=f18e1348]:
                  - link "[60]" [ref=f18e1349] [cursor=pointer]:
                    - /url: "#cite_note-MetcalfMetcalf2012-265-72"
                - text: However, India has been hamstrung by persistent poverty, both rural and urban;
                - superscript [ref=f18e1350]:
                  - link "[155]" [ref=f18e1351] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEMetcalfMetcalf2006265–266-173"
                - link "religious" [ref=f18e1352] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Religious_violence_in_India
                - text: "- and"
                - link "caste-related violence" [ref=f18e1353] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Caste-related_violence_in_India
                - text: ;
                - superscript [ref=f18e1354]:
                  - link "[156]" [ref=f18e1355] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEMetcalfMetcalf2006266–270-174"
                - link "Maoist-inspired Naxalite insurgencies" [ref=f18e1356] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Naxalite–Maoist_insurgency
                - text: ;
                - superscript [ref=f18e1357]:
                  - link "[157]" [ref=f18e1358] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEMetcalfMetcalf2006253-175"
                - text: and
                - link "separatism in Jammu and Kashmir" [ref=f18e1359] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Insurgency_in_Jammu_and_Kashmir
                - text: and
                - link "in Northeast India" [ref=f18e1360] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Insurgency_in_Northeast_India
                - text: .
                - superscript [ref=f18e1361]:
                  - link "[158]" [ref=f18e1362] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEMetcalfMetcalf2006274-176"
                - text: India has unresolved territorial disputes with
                - link "China" [ref=f18e1363] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/China–India_relations#1960s
                - text: and with
                - link "Pakistan" [ref=f18e1364] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Indo-Pakistani_wars_and_conflicts
                - text: .
                - superscript [ref=f18e1365]:
                  - link "[159]" [ref=f18e1366] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEMetcalfMetcalf2006247–248-177"
          - region [ref=f18e1367]:
            - heading "Geography" [level=2] [ref=f18e1369]
            - note [ref=f18e1370]:
              - text: "See also:"
              - link "Geography of India" [ref=f18e1371] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Geography_of_India
            - paragraph [ref=f18e1372]:
              - text: India accounts for the bulk of the Indian subcontinent, lying atop the
              - link "Indian tectonic plate" [ref=f18e1373] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Indian_Plate
              - text: ", and a part of the"
              - link "Indo-Australian Plate" [ref=f18e1374] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Indo-Australian_Plate
              - text: .
              - superscript [ref=f18e1375]:
                - link "[160]" [ref=f18e1376] [cursor=pointer]:
                  - /url: "#cite_note-FOOTNOTEAliAitchison2005-178"
              - text: India's defining geologic processes began approximately 70 million years ago, when the Indian Plate, then part of the southern supercontinent
              - link "Gondwana" [ref=f18e1377] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Gondwana
              - text: ", began a north-eastward"
              - link "drift" [ref=f18e1378] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Plate_tectonics
              - text: caused by
              - link "seafloor spreading" [ref=f18e1379] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Seafloor_spreading
              - text: to its south-west, and later, south and south-east.
              - superscript [ref=f18e1380]:
                - link "[160]" [ref=f18e1381] [cursor=pointer]:
                  - /url: "#cite_note-FOOTNOTEAliAitchison2005-178"
              - text: Simultaneously, the vast
              - link "Tethyan" [ref=f18e1382] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Tethys_Ocean
              - link "oceanic crust" [ref=f18e1383] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Oceanic_crust
              - text: ", to its northeast, began to"
              - link "subduct" [ref=f18e1384] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Subduction
              - text: under the
              - link "Eurasian Plate" [ref=f18e1385] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Eurasian_Plate
              - text: .
              - superscript [ref=f18e1386]:
                - link "[160]" [ref=f18e1387] [cursor=pointer]:
                  - /url: "#cite_note-FOOTNOTEAliAitchison2005-178"
              - text: The
              - link "Indian continental crust" [ref=f18e1388] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Indian_plate
              - text: ", however, was obstructed and was sheared horizontally. Its lower crust and mantle slid under, but the upper layer piled up in sheets (or"
              - link "nappes" [ref=f18e1389] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Nappe
              - text: ) ahead of the subduction zone.
              - superscript [ref=f18e1390]:
                - link "[161]" [ref=f18e1391] [cursor=pointer]:
                  - /url: "#cite_note-FOOTNOTEMolnar2015117-179"
              - text: This created the
              - link "orogeny" [ref=f18e1392] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Orogeny
              - text: ", or process of mountain building, of the Himalayas."
              - superscript [ref=f18e1393]:
                - link "[162]" [ref=f18e1394] [cursor=pointer]:
                  - /url: "#cite_note-FOOTNOTEMolnar2015118-180"
              - text: The middle and stiffer layer continued to push into Tibet, causing
              - link "crustal thickening" [ref=f18e1395] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Thrust_tectonics
              - text: of the
              - link "Tibetan Plateau" [ref=f18e1396] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Tibetan_Plateau
              - text: .
              - superscript [ref=f18e1397]:
                - link "[163]" [ref=f18e1398] [cursor=pointer]:
                  - /url: "#cite_note-FOOTNOTEMolnar2015128-181"
              - text: Immediately south of the emerging Himalayas, plate movement created a vast crescent-shaped
              - link "trough" [ref=f18e1399] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Trough_(geology)
              - text: that rapidly filled with river-borne sediment
              - superscript [ref=f18e1400]:
                - link "[164]" [ref=f18e1401] [cursor=pointer]:
                  - /url: "#cite_note-FOOTNOTEDikshitSchwartzberg20237-182"
              - text: and now constitutes the
              - link "Indo-Gangetic Plain" [ref=f18e1402] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Indo-Gangetic_Plain
              - text: .
              - superscript [ref=f18e1403]:
                - link "[165]" [ref=f18e1404] [cursor=pointer]:
                  - /url: "#cite_note-FOOTNOTEPrakash_et_al.2000-183"
              - text: The original Indian plate makes its first appearance above the sediment in the ancient
              - link "Aravalli range" [ref=f18e1405] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Aravalli_range
              - text: ", which extends from the"
              - link "Delhi Ridge" [ref=f18e1406] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Delhi_Ridge
              - text: in a southwesterly direction. To the west lies the
              - link "Thar Desert" [ref=f18e1407] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Thar_Desert
              - text: ", the eastern spread of which is checked by the Aravallis."
              - superscript [ref=f18e1408]:
                - link "[166]" [ref=f18e1409] [cursor=pointer]:
                  - /url: "#cite_note-aravalli-184"
              - superscript [ref=f18e1410]:
                - link "[167]" [ref=f18e1411] [cursor=pointer]:
                  - /url: "#cite_note-prasad-aravalli-185"
              - superscript [ref=f18e1412]:
                - link "[168]" [ref=f18e1413] [cursor=pointer]:
                  - /url: "#cite_note-fisher-aravalli-186"
            - paragraph [ref=f18e1414]:
              - text: The remaining Indian Plate survives as
              - link "peninsular India" [ref=f18e1415] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/South_India
              - text: ", the oldest and geologically most stable part of India. It extends as far north as the"
              - link "Satpura" [ref=f18e1416] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Satpura_Range
              - text: and
              - link "Vindhya" [ref=f18e1417] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Vindhya_Range
              - text: ranges in central India. These parallel chains run from the Arabian Sea coast in Gujarat in the west to the coal-rich
              - link "Chota Nagpur Plateau" [ref=f18e1418] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Chota_Nagpur_Plateau
              - text: in Jharkhand in the east.
              - superscript [ref=f18e1419]:
                - link "[169]" [ref=f18e1420] [cursor=pointer]:
                  - /url: "#cite_note-FOOTNOTEDikshitSchwartzberg20238-187"
              - text: To the south, the remaining peninsular landmass, the
              - link "Deccan Plateau" [ref=f18e1421] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Deccan_Plateau
              - text: ", is flanked on the west and east by coastal ranges known as the"
              - link "Western" [ref=f18e1422] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Western_Ghats
              - text: and
              - link "Eastern Ghats" [ref=f18e1423] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Eastern_Ghats
              - text: ;
              - superscript [ref=f18e1424]:
                - link "[170]" [ref=f18e1425] [cursor=pointer]:
                  - /url: "#cite_note-FOOTNOTEDikshitSchwartzberg20239–10-188"
              - text: the plateau contains the country's oldest rock formations, some over one billion years old. Constituted in such fashion, India lies to the north of the equator between 6° 44′ and 35° 30′ north latitude
              - superscript [ref=f18e1426]:
                - link "[s]" [ref=f18e1427] [cursor=pointer]:
                  - /url: "#cite_note-189"
              - text: and 68° 7′ and 97° 25′ east longitude.
              - superscript [ref=f18e1428]:
                - link "[171]" [ref=f18e1429] [cursor=pointer]:
                  - /url: "#cite_note-FOOTNOTEMinistry_of_Information_and_Broadcasting20071-190"
            - paragraph [ref=f18e1430]:
              - text: Major Himalayan-origin rivers that substantially flow through India include the
              - link "Ganges" [ref=f18e1431] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Ganges
              - text: and the
              - link "Brahmaputra" [ref=f18e1432] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Brahmaputra_River
              - text: ", both of which drain into the"
              - link "Bay of Bengal" [ref=f18e1433] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Bay_of_Bengal
              - text: .
              - superscript [ref=f18e1434]:
                - link "[172]" [ref=f18e1435] [cursor=pointer]:
                  - /url: "#cite_note-FOOTNOTEDikshitSchwartzberg202315-191"
              - text: Important tributaries of the Ganges include the
              - link "Yamuna" [ref=f18e1436] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Yamuna
              - text: and the
              - link "Kosi" [ref=f18e1437] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Kosi_River
              - text: . The Kosi's extremely low gradient, caused by long-term silt deposition, leads to severe floods and course changes.
              - superscript [ref=f18e1438]:
                - link "[173]" [ref=f18e1439] [cursor=pointer]:
                  - /url: "#cite_note-FOOTNOTEDuff1993353-192"
              - superscript [ref=f18e1440]:
                - link "[174]" [ref=f18e1441] [cursor=pointer]:
                  - /url: "#cite_note-FOOTNOTEBasuXavier2017[httpsbooksgooglecombooksidnXmLDgAAQBAJpgPA78_78]-193"
              - text: Major peninsular rivers, whose steeper gradients prevent their waters from flooding, include the
              - link "Godavari" [ref=f18e1442] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Godavari_River
              - text: ", the"
              - link "Mahanadi" [ref=f18e1443] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Mahanadi_River
              - text: ", the"
              - link "Kaveri" [ref=f18e1444] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Kaveri_River
              - text: ", and the"
              - link "Krishna" [ref=f18e1445] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Krishna_River
              - text: ", which also drain into the Bay of Bengal;"
              - superscript [ref=f18e1446]:
                - link "[175]" [ref=f18e1447] [cursor=pointer]:
                  - /url: "#cite_note-FOOTNOTEDikshitSchwartzberg202316-194"
              - text: and the
              - link "Narmada" [ref=f18e1448] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Narmada_River
              - text: and the
              - link "Tapti" [ref=f18e1449] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Tapti_River
              - text: ", which drain into the"
              - link "Arabian Sea" [ref=f18e1450] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Arabian_Sea
              - text: .
              - superscript [ref=f18e1451]:
                - link "[176]" [ref=f18e1452] [cursor=pointer]:
                  - /url: "#cite_note-FOOTNOTEDikshitSchwartzberg202317-195"
            - paragraph [ref=f18e1453]:
              - text: India's coastline measures 7,517 kilometres (4,700 mi) in length; of this distance, 5,423 kilometres (3,400 mi) belong to peninsular India and 2,094 kilometres (1,300 mi) to the Andaman, Nicobar, and Lakshadweep island chains.
              - superscript [ref=f18e1454]:
                - link "[177]" [ref=f18e1455] [cursor=pointer]:
                  - /url: "#cite_note-FOOTNOTEKumarPathakPednekarRaju2006-196"
              - text: According to the Indian naval hydrographic charts, the
              - link "mainland coastline" [ref=f18e1456] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Coastal_India
              - text: "consists of the following: 43% sandy beaches; 11% rocky shores, including cliffs; and 46%"
              - link "mudflats" [ref=f18e1457] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Mudflat
              - text: or marshy shores.
              - superscript [ref=f18e1458]:
                - link "[177]" [ref=f18e1459] [cursor=pointer]:
                  - /url: "#cite_note-FOOTNOTEKumarPathakPednekarRaju2006-196"
              - text: Coastal features include the marshy
              - link "Rann of Kutch" [ref=f18e1460] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Rann_of_Kutch
              - text: of western India and the alluvial
              - link "Sundarbans" [ref=f18e1461] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Sundarbans
              - text: delta of eastern India; the latter is shared with Bangladesh.
              - superscript [ref=f18e1462]:
                - link "[178]" [ref=f18e1463] [cursor=pointer]:
                  - /url: "#cite_note-FOOTNOTEDikshitSchwartzberg202312-197"
              - text: India has two
              - link "archipelagos" [ref=f18e1464] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Archipelago
              - text: ": the"
              - link "Lakshadweep" [ref=f18e1465] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Lakshadweep
              - link "coral atolls" [ref=f18e1466] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Atoll
              - text: off India's south-western coast; and the Andaman and Nicobar Islands, a volcanic chain in the
              - link "Andaman Sea" [ref=f18e1467] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Andaman_Sea
              - text: .
              - superscript [ref=f18e1468]:
                - link "[179]" [ref=f18e1469] [cursor=pointer]:
                  - /url: "#cite_note-FOOTNOTEDikshitSchwartzberg202313-198"
            - paragraph [ref=f18e1470]:
              - text: India has
              - link "28 states and 8 union territories" [ref=f18e1471] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/List_of_Indian_states_and_union_territories_by_Human_Development_Index
              - text: .
            - list [ref=f18e1472]:
              - listitem [ref=f18e1473]:
                - link [ref=f18e1476] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/File:Panorama_of_Himalayas_from_Ranikhet,_Uttarakhand,_India.jpg
                  - img "A panoramic view of the Garhwal and Kumaon Himalayas. Peaks rising above their surroundings are, among others, Trisul, Nanda Devi, the highest peak entirely within India's borders, and Nanda Kot. The Tibetan Plateau lies behind these mountains, as does the part of the Indus-Yarlung suture zone, the contour along which the Indian Plate has welded to the Eurasian plate. Mount Kailash and Lake Manasarovar in the Tibet Trans-Himalaya—sacred in Hindu and Buddhist mythology—lie immediately behind to the right. The Indus and Yarlung Tsangpo (the upper Brahmaputra river), which mark the western and eastern limits of the Himalaya range, rise near the lake." [ref=f18e1477]
