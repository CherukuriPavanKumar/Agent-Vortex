                    - generic "ctx_ver=Z39.88-2004&rft_val_fmt=info%3Aofi%2Ffmt%3Akev%3Amtx%3Abook&rft.genre=bookitem&rft.atitle=Caste&rft.btitle=Encyclopedia+of+Race%2C+Ethnicity%2C+and+Society&rft.place=Thousand+Oaks&rft.pages=246-250&rft.pub=SAGE&rft.date=2008&rft.isbn=978-1-4129-2694-2&rft.aulast=Gupta&rft.aufirst=Dipankar&rft_id=https%3A%2F%2Fbooks.google.com%2Fbooks%3Fid%3DYMUola6pDnkC%26pg%3DPA246&rfr_id=info%3Asid%2Fen.wikipedia.org%3AIndia"
                    - text: "Quote: \"Caste: What makes Indian society unique is the phenomenon of caste. Economic, religious, and linguistic differentiations, even race-based discrimination, are known elsewhere, but nowhere else does one see caste but in India.\""
                  - listitem [ref=f18e6522]:
                    - link "Béteille 2002" [ref=f18e6523] [cursor=pointer]:
                      - /url: "#CITEREFBéteille2002"
                    - text: ", pp. 136–137. Quote: \"Caste: Caste has been described as the fundamental social institution of India. Sometimes the term is used metaphorically to refer to rigid social distinctions or extreme social exclusiveness wherever found, and some authorities have used the term 'colour-caste system' to describe the stratification based on race in the United States and elsewhere. But it is among the Hindus in India that we find the system in its most fully developed form although analogous forms exist among Muslims, Christians. Sikhs and other religious groups in South Asia. It is an ancient institution, having existed for at least 2,000 years among the Hindus who developed not only elaborate caste practices hut also a complex theory to explain and justify those practices (Dumont 1970). The theory has now lost much of its force although many of the practices continue.\""
