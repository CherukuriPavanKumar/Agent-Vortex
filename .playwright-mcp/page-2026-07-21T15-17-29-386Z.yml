                - text: ", one in the"
                - link "Deccan Plateau" [ref=f18e1640] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Deccan_Plateau
                - text: ", immediately east of the Western Ghats, and the other in the western part of the Indo-Gangetic plain, now turned into rich agricultural land by irrigation, its features no longer visible."
                - superscript [ref=f18e1641]:
                  - link "[197]" [ref=f18e1642] [cursor=pointer]:
                    - /url: "#cite_note-217"
                - text: Among the Indian subcontinent's notable indigenous trees are the
                - link "astringent" [ref=f18e1643] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Astringent
                - link "Azadirachta indica" [ref=f18e1645] [cursor=pointer]:
