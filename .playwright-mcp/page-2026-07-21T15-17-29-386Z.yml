                - generic [ref=f18e5149]:
                  - link "Fisher 2018" [ref=f18e5150] [cursor=pointer]:
                    - /url: "#CITEREFFisher2018"
                  - text: ", p. 83, \" East of the lower Indus lay the inhospitable Rann of Kutch and Thar Desert. East of the upper Indus lay the more promising but narrow corridor between the Himalayan foothills on the north and the Thar Desert and Aravalli Mountains on the south. At the strategic choke point, just before reaching the fertile, well-watered Gangetic plain, sat Delhi. On this site, where life giving streams running off the most northern spur of the rocky Aravalli ridge flowed into the Jumna river, and where the war-horse and war-elephant trade intersected, a series of dynasties built fortified capitals.\""
