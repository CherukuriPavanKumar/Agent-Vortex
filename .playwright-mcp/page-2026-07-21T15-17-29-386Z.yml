                    - /url: https://en.wikipedia.org/wiki/File:Magen_David_Synagogue_Interiors_after_restoration.jpg
                    - img "Interior of the Magen David Synagogue, Kolkata" [ref=f18e2681]
                  - generic [ref=f18e2682]:
                    - text: Interior of the
                    - link "Magen David Synagogue" [ref=f18e2683] [cursor=pointer]:
