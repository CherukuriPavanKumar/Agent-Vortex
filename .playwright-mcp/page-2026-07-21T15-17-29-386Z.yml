                    - generic [ref=f18e4622]: The actual term Hindu first occurs as a Persian geographical term for the people who lived beyond the Indus River. The term Hindu originated as a geographical term and did not refer to a religion. Later, Hindu was taken by European languages from the Arabic term al-Hind, which referred to the people who lived across the Indus River. This Arabic term was itself taken from the Persian term Hindū, which refers to all Indians. By the 13th century, Hindustan emerged as a popular alternative name for India, meaning the "land of Hindus."
