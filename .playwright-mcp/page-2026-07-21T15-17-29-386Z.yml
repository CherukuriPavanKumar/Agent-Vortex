            - region [ref=f18e3360]:
              - heading "Clothing" [level=3] [ref=f18e3362]
              - note [ref=f18e3363]:
                - text: "Main article:"
                - link "Clothing in India" [ref=f18e3364] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Clothing_in_India
              - figure [ref=f18e3365]:
                - link [ref=f18e3366] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/File:India_School.jpg
                - generic [ref=f18e3368]:
                  - text: Women in
                  - link "sari" [ref=f18e3369] [cursor=pointer]:
                    - /url: https://en.wikipedia.org/wiki/Sari
                  - text: at an adult literacy class in
                  - link "Tamil Nadu" [ref=f18e3370] [cursor=pointer]:
                    - /url: https://en.wikipedia.org/wiki/Tamil_Nadu
              - paragraph [ref=f18e3371]:
                - text: From ancient times until the advent of the modern, the most widely worn traditional dress in India was
                - link "draped" [ref=f18e3372] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Draped_garment
                - text: .
                - superscript [ref=f18e3373]:
                  - link "[409]" [ref=f18e3374] [cursor=pointer]:
                    - /url: "#cite_note-Tarlo1996-26-439"
                - text: For women it took the form of a
                - link "sari" [ref=f18e3375] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Sari
                - text: ", a single piece of cloth many yards long."
                - superscript [ref=f18e3376]:
                  - link "[409]" [ref=f18e3377] [cursor=pointer]:
                    - /url: "#cite_note-Tarlo1996-26-439"
                - text: The sari was traditionally wrapped around the lower body and the shoulder.
                - superscript [ref=f18e3378]:
                  - link "[409]" [ref=f18e3379] [cursor=pointer]:
                    - /url: "#cite_note-Tarlo1996-26-439"
                - text: In its modern form, it is combined with an underskirt, or Indian
                - link "petticoat" [ref=f18e3380] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Petticoat#Asian_petticoats
                - text: ", and tucked in along the waist band for more secure fastening. It is also commonly worn with an Indian"
                - link "blouse" [ref=f18e3381] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Blouse
                - text: ", or"
                - link "choli" [ref=f18e3382] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Choli
                - text: ", which serves as the primary upper-body garment, the sari's end—passing over the shoulder—covering the midriff and obscuring the upper body's contours."
                - superscript [ref=f18e3383]:
                  - link "[409]" [ref=f18e3384] [cursor=pointer]:
                    - /url: "#cite_note-Tarlo1996-26-439"
                - text: For men, a similar but shorter length of cloth, the
                - link "dhoti" [ref=f18e3385] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Dhoti
                - text: ", has served as a lower-body garment."
                - superscript [ref=f18e3386]:
                  - link "[410]" [ref=f18e3387] [cursor=pointer]:
                    - /url: "#cite_note-Tarlo1996-26-28-440"
              - paragraph [ref=f18e3388]:
                - text: The use of stitched clothes became widespread after Muslim rule was established by the
                - link "Delhi sultanate" [ref=f18e3389] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Delhi_sultanate
                - text: (c.
                - generic [ref=f18e3390]: 1300 CE
                - text: ) and continued by the
                - link "Mughal Empire" [ref=f18e3391] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Mughal_Empire
                - text: (c.
                - generic [ref=f18e3392]: 1525 CE
                - text: ).
                - superscript [ref=f18e3393]:
                  - link "[411]" [ref=f18e3394] [cursor=pointer]:
                    - /url: "#cite_note-Rahman-Alkazi2002-441"
                - text: "Among the garments introduced during this time and still commonly worn are: the"
                - link "shalwars" [ref=f18e3395] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Shalwar_kameez
                - text: and
                - link "pyjamas" [ref=f18e3396] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Pyjama
                - text: ", both styles of trousers, and the tunics"
                - link "kurta" [ref=f18e3397] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Kurta
                - text: and
                - link "kameez" [ref=f18e3398] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Kameez
                - text: .
                - superscript [ref=f18e3399]:
                  - link "[411]" [ref=f18e3400] [cursor=pointer]:
                    - /url: "#cite_note-Rahman-Alkazi2002-441"
                - text: Shalwars are atypically wide at the waist but narrow to a cuffed bottom. They are held up by a drawstring, which causes them to become pleated around the waist.
                - superscript [ref=f18e3401]:
                  - link "[412]" [ref=f18e3402] [cursor=pointer]:
                    - /url: "#cite_note-StevensonWaite2011-442"
                - text: When the pants are cut quite narrow, on the
                - link "bias" [ref=f18e3403] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Grain_(textile)#Bias
                - text: ", they are called"
                - link "churidars" [ref=f18e3404] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Churidar
                - text: . The kameez is a long shirt or tunic.
                - superscript [ref=f18e3405]:
                  - link "[413]" [ref=f18e3406] [cursor=pointer]:
                    - /url: "#cite_note-StevensonWaite2011-b-443"
                - text: Its side seams left open below the waistline.
                - superscript [ref=f18e3407]:
                  - link "[414]" [ref=f18e3408] [cursor=pointer]:
                    - /url: "#cite_note-444"
                - text: The kurta is traditionally collarless and made of cotton or silk; it is worn plain or with embroidered decoration, such as
                - link "chikankari" [ref=f18e3409] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Chikankari
                - text: ; and typically falls to either just above or just below the wearer's knees.
                - superscript [ref=f18e3410]:
                  - link "[415]" [ref=f18e3411] [cursor=pointer]:
                    - /url: "#cite_note-Shukla2015-445"
              - paragraph [ref=f18e3412]:
                - text: In the last 50 years, fashions have changed a great deal in India. Increasingly, in urban northern India, the sari is no longer the apparel of everyday wear, though they remain popular on formal occasions. The traditional shalwar kameez is rarely worn by younger urban women, who favour churidars or jeans. In office settings, ubiquitous air conditioning allows men to wear sports jackets year-round. For weddings and formal occasions, men in the middle and upper classes often wear bandhgala, or short
                - link "Nehru jackets" [ref=f18e3413] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Nehru_jackets
                - text: ", with pants, with the groom and his"
                - link "groomsmen" [ref=f18e3414] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Groomsmen
                - text: sporting
                - link "sherwanis" [ref=f18e3415] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Sherwani
                - text: and churidars.
                - superscript [ref=f18e3416]:
                  - link "[416]" [ref=f18e3417] [cursor=pointer]:
                    - /url: "#cite_note-Dwyer2014-446"
              - list [ref=f18e3418]:
