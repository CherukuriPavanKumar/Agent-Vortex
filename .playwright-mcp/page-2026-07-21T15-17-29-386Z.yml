                - generic [ref=f18e4210]:
                  - link "Lowe 2015" [ref=f18e4211] [cursor=pointer]:
                    - /url: "#CITEREFLowe2015"
                  - text: ", pp. 1–2: \""
                  - link "It" [ref=f18e4212] [cursor=pointer]:
                    - /url: https://en.wikipedia.org/wiki/Rigveda
                  - text: consists of 1,028 hymns (sūktas), highly crafted poetic compositions originally intended for recital during rituals and for the invocation of and communication with the Indo-Aryan gods. Modern scholarly opinion largely agrees that these hymns were composed between around 1500 BCE and 1200 BCE, during the eastward migration of the Indo-Aryan tribes from the mountains of what is today northern Afghanistan across the Punjab into north India."
              - listitem [ref=f18e4213]:
                - generic [ref=f18e4214]:
                  - text: ^
                  - link "Jump up to:" [ref=f18e4215] [cursor=pointer]:
                    - /url: "#cite_ref-Combined-4-Rigveda_42-0"
                  - link [ref=f18e4217] [cursor=pointer]:
                    - /url: "#cite_ref-Combined-4-Rigveda_42-1"
                - list [ref=f18e4219]:
                  - listitem [ref=f18e4220]:
                    - link "Witzel 2003" [ref=f18e4221] [cursor=pointer]:
                      - /url: "#CITEREFWitzel2003"
                    - text: ", pp. 68–70: \"It is known from internal evidence that the Vedic texts were orally composed in northern India, at first in the Greater Punjab and later on also in more eastern areas, including northern Bihar, between ca. 1500 BCE and ca. 500–400 BCE. The oldest text, the Rgveda, must have been more or less contemporary with the Mitanni texts of northern Syria/Iraq (1450–1350 BCE); [...] The Vedic texts were orally composed and transmitted, without the use of script, in an unbroken line of transmission from teacher to student that was formalised early on. This ensured an impeccable textual transmission superior to the classical texts of other cultures; it is in fact something of a tape-recording of ca. 1500–500 BCE. Not just the actual words, but even the long-lost musical (tonal) accent (as in old Greek or in Japanese) has been preserved up to the present. [...] The RV text was composed before the introduction and massive use of iron, that is before ca. 1200–1000 BCE.\""
                  - listitem [ref=f18e4222]:
                    - link "Doniger 2014" [ref=f18e4223] [cursor=pointer]:
                      - /url: "#CITEREFDoniger2014"
                    - text: ", pp. xviii, 10: \"A Chronology of Hinduism: ca. 1500–1000 BCE Rig Veda; ca. 1200–900 BCE Yajur Veda, Sama Veda and Atharva Veda [...] Hindu texts began with the Rig Veda ('Knowledge of Verses'), composed in northwest India around 1500 BCE; the first of the three Vedas, it is the earliest extant text composed in Sanskrit, the language of ancient India.\""
                  - listitem [ref=f18e4224]:
                    - link "Ludden 2014" [ref=f18e4225] [cursor=pointer]:
                      - /url: "#CITEREFLudden2014"
                    - text: ", p."
                    - link "19" [ref=f18e4226] [cursor=pointer]:
                      - /url: https://books.google.com/books?id=pBq9DwAAQBAJ&pg=PA19
                  - listitem [ref=f18e4227]:
                    - link "Dyson 2018" [ref=f18e4228] [cursor=pointer]:
                      - /url: "#CITEREFDyson2018"
                    - text: ", pp."
                    - link "14–15" [ref=f18e4229] [cursor=pointer]:
                      - /url: https://books.google.com/books?id=3TRtDwAAQBAJ&pg=PA14
                  - listitem [ref=f18e4230]:
                    - link "Robb 2011" [ref=f18e4231] [cursor=pointer]:
                      - /url: "#CITEREFRobb2011"
                    - text: ", pp."
                    - link "46–" [ref=f18e4232] [cursor=pointer]:
                      - /url: https://books.google.com/books?id=GQ-2VH1LO_EC&pg=PA46
              - listitem [ref=f18e4233]:
                - link "Jump up" [ref=f18e4235] [cursor=pointer]:
                  - /url: "#cite_ref-Combined-3_43-0"
                  - text: ^
                - list [ref=f18e4237]:
                  - listitem [ref=f18e4238]:
                    - link "Jamison & Brereton 2020" [ref=f18e4239] [cursor=pointer]:
                      - /url: "#CITEREFJamisonBrereton2020"
                    - text: ", pp. 2, 4–5: \"The Ṛgveda is one of the four Vedas, which together constitute the oldest texts in Sanskrit and the earliest evidence for what will become Hinduism. [...] Although Vedic religion is very different in many regards from what is known as Classical Hinduism, the seeds are there. Gods like Viṣṇu and Śiva (under the name Rudra), who will become so dominant later, are already present in the Ṛgveda, though in roles both lesser than and different from those they will later play, and the principal Ṛgvedic gods like Indra remain in later Hinduism, though in diminished capacity.\""
                  - listitem [ref=f18e4240]:
                    - link "Flood 2020" [ref=f18e4241] [cursor=pointer]:
                      - /url: "#CITEREFFlood2020"
                    - text: ", p. 4, see note 4: \"I take the term 'Hinduism' to meaningfully denote a range and history of practice characterised by a number of features, particularly reference to Vedic textual and sacrificial origins, belonging to endogamous social units (jāti/varṇa), participating in practices that involve making an offering to a deity and receiving a blessing (pūjā), and a first-level cultural polytheism (although many Hindus adhere to a second-level monotheism in which many gods are regarded as emanations or manifestations of the one, supreme being).\""
                  - listitem [ref=f18e4242]:
                    - link "Michaels 2017" [ref=f18e4243] [cursor=pointer]:
                      - /url: "#CITEREFMichaels2017"
                    - text: ", p. 86: \"Almost all traditional Hindu families observe until today at least three samskaras (initiation, marriage, and death ritual). Most other rituals have lost their popularity, are combined with other rites of passage, or are drastically shortened. Although samskaras vary from region to region, from class (varna) to class, and from caste to caste, their core elements remain the same owing to the common source, the Veda, and a common priestly tradition preserved by the Brahmin priests.\""
                  - listitem [ref=f18e4244]:
                    - link "Flood 1996" [ref=f18e4245] [cursor=pointer]:
                      - /url: "#CITEREFFlood1996"
                    - text: ", p. 35: \"It is this Sanskrit, vedic, tradition which has maintained a continuity into modern times and which has provided the most important resource and inspiration for Hindu traditions and individuals. The Veda is the foundation for most later developments in what is known as Hinduism.\""
