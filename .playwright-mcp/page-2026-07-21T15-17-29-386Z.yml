                    - /url: "#cite_note-SivaperumanVenkataraman2018-212"
              - paragraph [ref=f18e1619]:
                - text: India's most dense forests, such as the
                - link "tropical moist forest" [ref=f18e1620] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Tropical_and_subtropical_moist_broadleaf_forest
                - text: of the
                - link "Andaman Islands" [ref=f18e1621] [cursor=pointer]:
