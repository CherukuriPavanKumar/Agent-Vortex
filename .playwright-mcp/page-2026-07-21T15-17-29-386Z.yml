            - region [ref=f18e3446]:
              - heading "Cuisine" [level=3] [ref=f18e3448]
              - note [ref=f18e3449]:
                - text: "Main article:"
                - link "Indian cuisine" [ref=f18e3450] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Indian_cuisine
              - figure [ref=f18e3451]:
                - generic [ref=f18e3453]:
                  - button "Play video" [ref=f18e3455] [cursor=pointer]
                  - generic [ref=f18e3457] [cursor=pointer]:
                    - generic [ref=f18e3458]: "Duration: 14 seconds."
                    - text: 0:14
                - link:
                  - /url: https://en.wikipedia.org/wiki/File:Making_Khameeri_Roti_in_Tandoor_in_Turkman_Gate_Old_Delhi.webm
                - generic [ref=f18e3459]:
                  - text: A tandoor chef in
                  - link "Turkman Gate" [ref=f18e3460] [cursor=pointer]:
