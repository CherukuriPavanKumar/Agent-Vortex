                  - text: "Quote: \"More than 63 million women are \"missing\" statistically across India, and more than 21 million girls are unwanted by their families, government officials say. The skewed ratio of men to women is largely the result of sex-selective abortions, and better nutrition and medical care for boys, according to the government's annual economic survey, which was released on Monday. In addition, the survey found that \"families where a son is born are more likely to stop having children than families where a girl is born\"."
