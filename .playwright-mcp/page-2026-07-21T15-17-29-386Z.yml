              - paragraph [ref=f18e2514]:
                - text: There are also small numbers of speakers of
                - link "Tai–Kadai" [ref=f18e2515] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Kra–Dai_languages
                - text: ","
                - link "Andamanese" [ref=f18e2516] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Andamanese_languages
                - text: ", and minor language families and"
                - link "isolates" [ref=f18e2517] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Language_isolate
                - text: .
                - superscript [ref=f18e2518]:
                  - link "[316]" [ref=f18e2519] [cursor=pointer]:
                    - /url: "#cite_note-Moseley2008-339"
                - superscript [ref=f18e2520]:
                  - 'generic "Page / location: 283" [ref=f18e2521]': ": 283"
              - paragraph [ref=f18e2522]:
                - text: The official language of India's federal government was chosen by the
                - link "Constituent Assembly of India" [ref=f18e2523] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Constituent_Assembly_of_India
                - text: in September 1949 after three years of debate between two opposing camps.
                - link "Hindi language" [ref=f18e2524] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Hindi_language
                - text: protagonists wanted Hindi in the
                - link "Devanagari script" [ref=f18e2525] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Devanagari_script
                - text: to be the sole "national language" of India whereas delegates from South India preferred English to have a place in the Constitution.
                - superscript [ref=f18e2526]:
                  - link "[317]" [ref=f18e2527] [cursor=pointer]:
                    - /url: "#cite_note-lerner-Hindi-340"
                - superscript [ref=f18e2528]:
                  - link "[318]" [ref=f18e2529] [cursor=pointer]:
                    - /url: "#cite_note-isaka-Hindi-341"
                - text: The compromise reached declared (i) Hindi to be the "official language" of India's federal government; (ii) English to be an associate official language for 15 years during which Hindi's formal lexicon would be developed; and (iii) the international form of
                - link "Hindu–Arabic numerals" [ref=f18e2530] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Hindu–Arabic_numeral_system
                - text: to be the official numerals.
                - superscript [ref=f18e2531]:
                  - link "[317]" [ref=f18e2532] [cursor=pointer]:
                    - /url: "#cite_note-lerner-Hindi-340"
                - superscript [ref=f18e2533]:
                  - link "[318]" [ref=f18e2534] [cursor=pointer]:
                    - /url: "#cite_note-isaka-Hindi-341"
                - text: The compromise resolution became articles 343–351 of India's constitution, which came into effect on 26 January 1950.
                - superscript [ref=f18e2535]:
                  - link "[317]" [ref=f18e2536] [cursor=pointer]:
                    - /url: "#cite_note-lerner-Hindi-340"
                - superscript [ref=f18e2537]:
                  - link "[318]" [ref=f18e2538] [cursor=pointer]:
                    - /url: "#cite_note-isaka-Hindi-341"
                - text: In 1965, after bitter opposition from
                - link "South India" [ref=f18e2539] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/South_India
                - text: to Hindi becoming the sole official language, a compromise was reached to where English would continue to be an "associate official language" indefinitely.
                - superscript [ref=f18e2540]:
                  - link "[319]" [ref=f18e2541] [cursor=pointer]:
                    - /url: "#cite_note-342"
                - superscript [ref=f18e2542]:
                  - link "[320]" [ref=f18e2543] [cursor=pointer]:
                    - /url: "#cite_note-343"
              - paragraph [ref=f18e2544]:
                - text: The
                - link "Eighth Schedule of India's Constitution" [ref=f18e2545] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Eighth_Schedule_to_the_Constitution_of_India
                - text: also recognises 22 languages, including Hindi but not English, which the government is obligated to develop. These are sometimes called "scheduled languages". This list includes major regional languages, but also others—such as
                - link "Sanskrit" [ref=f18e2546] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Sanskrit
                - text: ", which no longer has"
                - link "first language" [ref=f18e2547] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/First_language
                - text: speakers in India, and
                - link "Urdu" [ref=f18e2548] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Urdu
                - text: ", which is not region-specific—because of their value to India's cultural heritage."
                - superscript [ref=f18e2549]:
                  - link "[321]" [ref=f18e2550] [cursor=pointer]:
                    - /url: "#cite_note-KachruKachru2008-1-344"
                - superscript [ref=f18e2551]:
