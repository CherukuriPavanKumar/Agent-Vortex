          - region [ref=f18e2356]:
            - heading "Demographics" [level=2] [ref=f18e2358]
            - note [ref=f18e2359]:
              - text: "Main article:"
              - link "Demographics of India" [ref=f18e2360] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Demographics_of_India
            - paragraph [ref=f18e2361]:
              - text: With an estimated 1,428,627,663 residents in 2023, India is the world's most populous country.
              - superscript [ref=f18e2362]:
                - link "[300]" [ref=f18e2363] [cursor=pointer]:
                  - /url: "#cite_note-WPP_UN-322"
              - text: 1,210,193,422 residents were reported in the
              - link "2011 provisional census report" [ref=f18e2364] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/2011_Census_of_India
              - text: .
              - superscript [ref=f18e2365]:
                - link "[301]" [ref=f18e2366] [cursor=pointer]:
                  - /url: "#cite_note-FOOTNOTEProvisional_Population_Totals_Paper_1_of_2011_India160-323"
              - text: The median age was 28.7 in 2020.
              - superscript [ref=f18e2367]:
                - link "[270]" [ref=f18e2368] [cursor=pointer]:
                  - /url: "#cite_note-FOOTNOTECentral_Intelligence_Agency-292"
              - text: Medical advances made in the last 50 years as well as increased agricultural productivity brought about by the "
              - link "Green Revolution" [ref=f18e2369] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Green_Revolution_in_India
              - text: "\" have caused India's population to grow rapidly,"
              - superscript [ref=f18e2370]:
                - link "[302]" [ref=f18e2371] [cursor=pointer]:
                  - /url: "#cite_note-FOOTNOTERorabacher201035–39-324"
              - text: "though India's decennial rates of growth are decreasing: its population grew by 17.64% from 2001 to 2011,"
              - superscript [ref=f18e2372]:
                - link "[303]" [ref=f18e2373] [cursor=pointer]:
                  - /url: "#cite_note-FOOTNOTEProvisional_Population_Totals_Paper_1_of_2011_India165-325"
              - text: compared to 21.54% growth in the previous decade (1991–2001).
              - superscript [ref=f18e2374]:
                - link "[303]" [ref=f18e2375] [cursor=pointer]:
                  - /url: "#cite_note-FOOTNOTEProvisional_Population_Totals_Paper_1_of_2011_India165-325"
              - text: The first post-colonial census, conducted in 1951, counted 361 million people.
              - superscript [ref=f18e2376]:
                - link "[304]" [ref=f18e2377] [cursor=pointer]:
                  - /url: "#cite_note-326"
              - text: The
              - link "life expectancy" [ref=f18e2378] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Life_expectancy
              - text: at birth has increased from 49.7 years in 1970–1975 to 72.0 years in 2023.
              - superscript [ref=f18e2379]:
                - link "[305]" [ref=f18e2380] [cursor=pointer]:
                  - /url: "#cite_note-:5-327"
              - superscript [ref=f18e2381]:
                - link "[306]" [ref=f18e2382] [cursor=pointer]:
                  - /url: "#cite_note-328"
              - text: The under-five
              - link "mortality" [ref=f18e2383] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Infant_mortality
              - text: rate for the country was 113 per 1,000 live births in 1994 whereas in 2018 it reduced to 41.1 per 1,000 live births.
              - superscript [ref=f18e2384]:
                - link "[305]" [ref=f18e2385] [cursor=pointer]:
                  - /url: "#cite_note-:5-327"
            - paragraph [ref=f18e2386]:
              - text: The human sex ratio, according to the 2011 census, is 940 females per 1,000 males.
              - superscript [ref=f18e2387]:
                - link "[301]" [ref=f18e2388] [cursor=pointer]:
                  - /url: "#cite_note-FOOTNOTEProvisional_Population_Totals_Paper_1_of_2011_India160-323"
              - link "Female infanticide in India" [ref=f18e2389] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Female_infanticide_in_India
              - text: ", and lately"
              - link "female foeticide" [ref=f18e2390] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Female_foeticide_in_India
              - text: ", have created lop-sided gender ratios; the number of"
              - link "missing women" [ref=f18e2391] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Missing_women
              - text: in the country quadrupled from 15 million to 63 million during the period 1964–2014, faster than the population growth during the same period.
              - superscript [ref=f18e2392]:
                - link "[307]" [ref=f18e2393] [cursor=pointer]:
                  - /url: "#cite_note-The_Hindu_November_17_2019c-329"
              - text: According to an Indian government study, an additional 21 million girls are unwanted and do not receive adequate care.
              - superscript [ref=f18e2394]:
                - link "[308]" [ref=f18e2395] [cursor=pointer]:
                  - /url: "#cite_note-The_Guardian_November_17_2019c-330"
              - text: Despite a government ban on sex-selective foeticide, the practice has far from stopped.
              - superscript [ref=f18e2396]:
                - link "[309]" [ref=f18e2397] [cursor=pointer]:
                  - /url: "#cite_note-Foreign_Policy_November_17_2019c-331"
            - paragraph [ref=f18e2398]:
              - text: Migration from rural to urban areas has been an important dynamic in India's recent history. The number of people living in urban areas grew by 31.2% between 1991 and 2001.
              - superscript [ref=f18e2399]:
                - link "[310]" [ref=f18e2400] [cursor=pointer]:
                  - /url: "#cite_note-FOOTNOTEGarg2005-332"
              - text: In 2001, over 70% lived in rural areas.
              - superscript [ref=f18e2401]:
                - link "[311]" [ref=f18e2402] [cursor=pointer]:
                  - /url: "#cite_note-FOOTNOTEDysonVisaria2005115–129-333"
              - superscript [ref=f18e2403]:
                - link "[312]" [ref=f18e2404] [cursor=pointer]:
                  - /url: "#cite_note-FOOTNOTERatna2007271–272-334"
              - text: The level of urbanisation increased further from 27.81% in the 2001 census to 31.16% in the 2011 census. The slowing down of the overall population growth rate was due to the sharp decline in the growth rate in rural areas since 1991.
              - superscript [ref=f18e2405]:
                - link "[313]" [ref=f18e2406] [cursor=pointer]:
                  - /url: "#cite_note-FOOTNOTEChandramouli2011-335"
              - text: In the 2011 census, there were 53
              - link "million-plus urban agglomerations in India" [ref=f18e2407] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/List_of_million-plus_urban_agglomerations_in_India
              - text: . Among them
              - link "Mumbai" [ref=f18e2408] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Mumbai
              - text: ","
              - link "Delhi" [ref=f18e2409] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Delhi
              - text: ","
              - link "Kolkata" [ref=f18e2410] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Kolkata
              - text: ","
              - link "Chennai" [ref=f18e2411] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Chennai
              - text: ","
              - link "Bengaluru" [ref=f18e2412] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Bangalore
              - text: ","
              - link "Hyderabad" [ref=f18e2413] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Hyderabad
              - text: and
              - link "Ahmedabad" [ref=f18e2414] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Ahmedabad
              - text: ", in decreasing order by population."
              - superscript [ref=f18e2415]:
                - link "[314]" [ref=f18e2416] [cursor=pointer]:
                  - /url: "#cite_note-censusindia_2011-336"
            - list [ref=f18e2417]:
              - listitem [ref=f18e2418]:
                - link [ref=f18e2421] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/File:Life-expectancy,_1881_to_2023,_IND.svg
                  - img "The historical development of life expectancy in India from 1881 to 2023" [ref=f18e2422]
                - generic [ref=f18e2423]: The historical development of life expectancy in India from 1881 to 2023
              - listitem [ref=f18e2424]:
