                  - text: ","
                  - link "Old Delhi" [ref=f18e3461] [cursor=pointer]:
                    - /url: https://en.wikipedia.org/wiki/Old_Delhi
                  - text: ", makes khameri roti, a Muslim-influenced style of"
                  - link "leavened bread" [ref=f18e3462] [cursor=pointer]:
                    - /url: https://en.wikipedia.org/wiki/Bread#Leavening
                  - text: .
                  - superscript [ref=f18e3463]:
                    - link "[ae]" [ref=f18e3464] [cursor=pointer]:
                      - /url: "#cite_note-449"
                  - superscript [ref=f18e3465]:
                    - link "[419]" [ref=f18e3466] [cursor=pointer]:
                      - /url: "#cite_note-Panjabi1995-450"
              - paragraph [ref=f18e3467]:
                - text: The foundation of a typical Indian meal is a cereal cooked plainly and complemented with savoury dishes.
                - superscript [ref=f18e3468]:
                  - link "[420]" [ref=f18e3469] [cursor=pointer]:
                    - /url: "#cite_note-Davidson2014-p409-451"
                - text: The cooked cereal could be steamed rice;
                - link "chapati" [ref=f18e3470] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Chapati
                - text: ", a thin unleavened bread;"
                - superscript [ref=f18e3471]:
                  - link "[421]" [ref=f18e3472] [cursor=pointer]:
                    - /url: "#cite_note-Davidson2014-p161-452"
                - link "idli" [ref=f18e3473] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Idli
                - text: ", a steamed breakfast cake; or"
                - link "dosa" [ref=f18e3474] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Dosa_(food)
                - text: ", a griddled pancake."
                - superscript [ref=f18e3475]:
                  - link "[422]" [ref=f18e3476] [cursor=pointer]:
                    - /url: "#cite_note-tamang-yeast-idlidosa-453"
                - text: The savoury dishes might include
                - link "lentils" [ref=f18e3477] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Lentil
                - text: ","
                - link "pulses" [ref=f18e3478] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Pulses
                - text: ", vegetables, meat, poultry and fish commonly spiced with"
                - link "ginger" [ref=f18e3479] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Ginger_root
                - text: and
                - link "garlic" [ref=f18e3480] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Garlic
                - text: ", but also"
                - link "coriander" [ref=f18e3481] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Coriander
                - text: ","
                - link "cumin" [ref=f18e3482] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Cumin
                - text: ","
                - link "turmeric" [ref=f18e3483] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Turmeric
                - text: ","
                - link "cinnamon" [ref=f18e3484] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Cinnamon
                - text: ","
                - link "cardamom" [ref=f18e3485] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Cardamom
                - text: and others.
                - superscript [ref=f18e3486]:
                  - link "[420]" [ref=f18e3487] [cursor=pointer]:
                    - /url: "#cite_note-Davidson2014-p409-451"
                - text: In some instances, the ingredients may be mixed during the cooking process.
                - superscript [ref=f18e3488]:
                  - link "[423]" [ref=f18e3489] [cursor=pointer]:
                    - /url: "#cite_note-jhala-princely-biryani-454"
                - text: India has distinctive vegetarian cuisines, each a feature of the geographical and cultural histories of its adherents.
                - superscript [ref=f18e3490]:
                  - link "[424]" [ref=f18e3491] [cursor=pointer]:
                    - /url: "#cite_note-Davidson2014-p410-455"
                - text: About 20% to 39% of India's population consists of vegetarians.
                - superscript [ref=f18e3492]:
                  - link "[425]" [ref=f18e3493] [cursor=pointer]:
                    - /url: "#cite_note-456"
                - superscript [ref=f18e3494]:
                  - link "[426]" [ref=f18e3495] [cursor=pointer]:
                    - /url: "#cite_note-457"
                - text: Although meat is eaten widely, the proportional consumption of meat is low.
                - superscript [ref=f18e3496]:
                  - link "[427]" [ref=f18e3497] [cursor=pointer]:
                    - /url: "#cite_note-SahakianSaloma2016-50-458"
              - paragraph [ref=f18e3498]:
                - text: The most significant import of cooking techniques into India during the last millennium occurred during the
                - link "Mughal Empire" [ref=f18e3499] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Mughal_Empire
                - text: ", spreading into northern India from regions to its northwest,"
                - superscript [ref=f18e3500]:
                  - link "[428]" [ref=f18e3501] [cursor=pointer]:
                    - /url: "#cite_note-CollinghamCollingham2007-459"
                - text: along with dishes such as
                - link "pilaf" [ref=f18e3502] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Pilaf
                - text: .
                - superscript [ref=f18e3503]:
                  - link "[429]" [ref=f18e3504] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTERoger2000-460"
                - superscript [ref=f18e3505]:
                  - link "[430]" [ref=f18e3506] [cursor=pointer]:
                    - /url: "#cite_note-sengupta-74-461"
                - text: Onions, garlic, almonds, and spices were added to the simple yogurt marinade of Persia.
                - superscript [ref=f18e3507]:
                  - link "[428]" [ref=f18e3508] [cursor=pointer]:
                    - /url: "#cite_note-CollinghamCollingham2007-459"
                - text: Rice was partially cooked and layered alternately with sauteed meat, the pot sealed tightly, and slow cooked according to another Persian cooking technique, to produce
                - link "biryani" [ref=f18e3509] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Biryani
                - text: ","
                - superscript [ref=f18e3510]:
                  - link "[428]" [ref=f18e3511] [cursor=pointer]:
                    - /url: "#cite_note-CollinghamCollingham2007-459"
                - text: a feature of festive dining in many parts of India.
                - superscript [ref=f18e3512]:
                  - link "[431]" [ref=f18e3513] [cursor=pointer]:
                    - /url: "#cite_note-nandy2004-462"
              - paragraph [ref=f18e3514]:
                - text: The diversity of Indian food served worldwide has been partially concealed by the dominance of
                - link "Punjabi cuisine" [ref=f18e3515] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Punjabi_cuisine
                - text: . The popularity of
                - link "tandoori chicken" [ref=f18e3516] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Tandoori_chicken
                - text: —cooked in a
                - link "tandoor" [ref=f18e3517] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Tandoor
                - text: oven, which had traditionally been used for baking bread in the rural Punjab and the Delhi region, especially among Muslims, but which is originally from
                - link "Central Asia" [ref=f18e3518] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Central_Asia
                - text: —dates to the 1950s, and was caused in large part by an entrepreneurial response among people from the Punjab who had been displaced by the 1947 partition.
                - superscript [ref=f18e3519]:
                  - link "[424]" [ref=f18e3520] [cursor=pointer]:
                    - /url: "#cite_note-Davidson2014-p410-455"
              - list [ref=f18e3521]:
