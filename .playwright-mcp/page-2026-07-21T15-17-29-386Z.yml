              - paragraph [ref=f18e1982]:
                - text: India is a federal union comprising 28
                - link "states" [ref=f18e1983] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/States_and_union_territories_of_India
                - text: and 8
                - link "union territories" [ref=f18e1984] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Union_territory
                - text: .
                - superscript [ref=f18e1985]:
                  - link "[12]" [ref=f18e1986] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTELibrary_of_Congress2004-19"
                - text: All states, as well as the union territories of
                - link "Jammu and Kashmir" [ref=f18e1987] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Jammu_and_Kashmir_(union_territory)
                - text: ","
                - link "Puducherry" [ref=f18e1988] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Puducherry_(union_territory)
                - text: and the
                - link "National Capital Territory of Delhi" [ref=f18e1989] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Delhi
                - text: ", have elected legislatures and governments following the"
                - link "Westminster system" [ref=f18e1990] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Westminster_system
                - text: . The remaining five union territories are directly ruled by the central government through appointed administrators. In 1956, under the
                - link "States Reorganisation Act" [ref=f18e1991] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/States_Reorganisation_Act,_1956
                - text: ", states were reorganised on a linguistic basis."
                - superscript [ref=f18e1992]:
                  - link "[241]" [ref=f18e1993] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTESharma200749-263"
                - text: There are over a quarter of a million local government bodies at city, town, district, block and village levels.
                - superscript [ref=f18e1994]:
                  - link "[242]" [ref=f18e1995] [cursor=pointer]:
                    - /url: "#cite_note-264"
