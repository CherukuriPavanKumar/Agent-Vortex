                  - text: ", p. 15: \"Before it was so heavily settled and intensively exploited, the Punjab was dominated by thorn forest interspersed by rolling grasslands which were grazed on by millions of Blackbuck, accompanied by their dominant predator, the Cheetah. Always keen hunters, the Moghul princes kept tame cheetahs which were used to chase and bring down the Blackbuck. Today the Cheetah is extinct in India and the severely endangered Blackbuck no longer exists in the Punjab.\""
