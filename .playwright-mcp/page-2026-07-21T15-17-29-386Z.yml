            - region [ref=f18e3165]:
              - heading "Dance" [level=3] [ref=f18e3167]
              - note [ref=f18e3168]:
                - text: "Main article:"
                - link "Dance in India" [ref=f18e3169] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Dance_in_India
              - paragraph [ref=f18e3170]:
                - text: Dance in India has drawn heavily from
                - link "Indian classical dance" [ref=f18e3171] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Indian_classical_dance
                - text: traditions. Many of these in turn arose in temples or other religious contexts. Their sponsorship and promotion, however, has continued in secular, modern India.
                - superscript [ref=f18e3172]:
                  - link "[406]" [ref=f18e3173] [cursor=pointer]:
                    - /url: "#cite_note-vatsyayan-lord-432"
                - superscript [ref=f18e3174]:
                  - link "[aa]" [ref=f18e3175] [cursor=pointer]:
                    - /url: "#cite_note-433"
                - text: India also has local and modern dance traditions.
                - superscript [ref=f18e3176]:
                  - link "[406]" [ref=f18e3177] [cursor=pointer]:
                    - /url: "#cite_note-vatsyayan-lord-432"
                - text: Whether a dance is classical is determined by the
                - link "Sangeet Natak Academi" [ref=f18e3178] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Sangeet_Natak_Academi
                - text: ", the Indian government's organisation for performing arts."
                - superscript [ref=f18e3179]:
                  - link "[ab]" [ref=f18e3180] [cursor=pointer]:
                    - /url: "#cite_note-434"
                - text: Although more dances could perhaps meet the criteria for classical, the Akademi has chosen eight.
                - superscript [ref=f18e3181]:
                  - link "[ac]" [ref=f18e3182] [cursor=pointer]:
                    - /url: "#cite_note-435"
