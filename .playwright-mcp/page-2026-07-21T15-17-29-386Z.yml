                    - text: Isaka, Riho (2021).
                    - 'link "Language, Identity, and Power in Modern India: Gujarat, c. 1850–1960" [ref=f18e6266] [cursor=pointer]':
                      - /url: https://books.google.com/books?id=3F5CEAAAQBAJ&pg=PA127
                    - text: . Routledge New Horizons in South Asian Studies. Routledge. pp. 126–197.
                    - link "ISBN" [ref=f18e6267] [cursor=pointer]:
                      - /url: https://en.wikipedia.org/wiki/ISBN_(identifier)
                    - link "978-1-000-46858-8" [ref=f18e6268] [cursor=pointer]:
                      - /url: https://en.wikipedia.org/wiki/Special:BookSources/978-1-000-46858-8
                    - text: ". Partition may have 'killed' Hindustani, but it had a marked effect on the debates regarding the position of English and provincial languages in the Constitution. The Hindi protagonists became even more insistent on establishing Hindi as the sole national language and imposing it on the non-Hindi-speaking regions to enhance 'national unity'. In addition, these leaders even began to argue that the Devanagari form of numerals should be used instead of the international form. This was firmly opposed by members from South India. To solve the continuing dispute among the Assembly members, (K. M.) Munshi and N. Gopalaswami Ayyangar, a Tamil member of the Assembly, drew up detailed language provisions. These, in the words of the latter, represented a 'compromise between opinions not easily reconcilable' (Constituent Assembly Debates 1X 1966: 1319). The provisions were proposed to the Congress on 2nd September 1949 and engendered a heated discussion. It was eventually decided that they would be proposed in the Assembly by Munshi, Ayyangar, and Bhimrao Ambedkar (the Chairman of the Drafting Committee) in their personal capacities, not as an official proposal on behalf of the Drafting Committee."
