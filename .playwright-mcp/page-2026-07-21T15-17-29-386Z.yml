            - region [ref=f18e3547]:
              - heading "Sports" [level=3] [ref=f18e3549]
              - note [ref=f18e3550]:
                - text: "Main article:"
                - link "Sport in India" [ref=f18e3551] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Sport_in_India
              - paragraph [ref=f18e3552]:
