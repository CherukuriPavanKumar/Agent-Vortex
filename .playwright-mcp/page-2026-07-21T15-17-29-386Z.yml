                    - /url: "#CITEREFPingree2003"
                  - text: ", p. 45 Quote: \"Geometry, and its branch trigonometry, was the mathematics Indian astronomers used most frequently. Greek mathematicians used the full chord and never imagined the half chord that we use today. Half chord was first used by Aryabhata which made trigonometry much more simple. In fact, the Indian astronomers in the third or fourth century, using a pre-Ptolemaic Greek table of chords, produced tables of sines and versines, from which it was trivial to derive cosines. This new system of trigonometry, produced in India, was transmitted to the Arabs in the late eighth century and by them, in an expanded form, to the Latin West and the Byzantine East in the twelfth century.\""
