            - region [ref=f18e2263]:
              - heading "Industries" [level=3] [ref=f18e2265]
              - note [ref=f18e2266]:
                - text: "Main articles:"
                - link "Industry in India" [ref=f18e2267] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Industry_in_India
                - text: and
                - link "Energy in India" [ref=f18e2268] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Energy_in_India
              - note [ref=f18e2269]:
                - text: "See also:"
                - link "Energy policy of India" [ref=f18e2270] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Energy_policy_of_India
              - paragraph [ref=f18e2271]:
                - text: The
                - link "Indian automotive industry" [ref=f18e2272] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Automotive_industry_in_India
                - text: ", the world's second-fastest growing, increased domestic sales by 26% during 2009–2010,"
                - superscript [ref=f18e2273]:
                  - link "[283]" [ref=f18e2274] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEBusiness_Line_2010-305"
                - text: and exports by 36% during 2008–2009.
                - superscript [ref=f18e2275]:
                  - link "[284]" [ref=f18e2276] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEExpress_India_2009-306"
                - text: In 2022, India became the world's third-largest vehicle market after China and the United States, surpassing Japan.
                - superscript [ref=f18e2277]:
                  - link "[285]" [ref=f18e2278] [cursor=pointer]:
                    - /url: "#cite_note-307"
                - text: At the end of 2011, the
                - link "Indian IT industry" [ref=f18e2279] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Information_technology_in_India
                - text: employed 2.8 million professionals, generated revenues close to US$100 billion equalling 7.5% of Indian GDP, and contributed 26% of India's merchandise exports.
                - superscript [ref=f18e2280]:
                  - link "[286]" [ref=f18e2281] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTENasscom_2011–2012-308"
              - paragraph [ref=f18e2282]:
                - text: The
                - link "pharmaceutical industry in India" [ref=f18e2283] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Pharmaceutical_industry_in_India
                - text: includes 3,000 pharmaceutical companies and 10,500 manufacturing units; India is the world's third-largest pharmaceutical producer, largest producer of generic medicines, and supplies up to 50–60% of global vaccines demand, contributing up to US$24.44 billion in exports. India's local pharmaceutical market is estimated up to US$42 billion.
                - superscript [ref=f18e2284]:
                  - link "[287]" [ref=f18e2285] [cursor=pointer]:
                    - /url: "#cite_note-Phamra1-309"
                - superscript [ref=f18e2286]:
                  - link "[288]" [ref=f18e2287] [cursor=pointer]:
                    - /url: "#cite_note-Pharma2-310"
                - text: India is among the top 12 biotech destinations in the world.
                - superscript [ref=f18e2288]:
                  - link "[289]" [ref=f18e2289] [cursor=pointer]:
                    - /url: "#cite_note-311"
                - superscript [ref=f18e2290]:
                  - link "[290]" [ref=f18e2291] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEYep2011-312"
                - text: The Indian biotech industry grew by 15.1% in 2012–2013, increasing its revenues from ₹204.4 billion (
                - link "Indian rupees" [ref=f18e2292] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Indian_rupee
                - text: ) to ₹235.24 billion (US$3.94 billion at June 2013 exchange rates).
                - superscript [ref=f18e2293]:
                  - link "[291]" [ref=f18e2294] [cursor=pointer]:
                    - /url: "#cite_note-313"
              - paragraph [ref=f18e2295]:
                - text: India's capacity to generate electrical power is 300 gigawatts, of which 42 gigawatts is renewable.
                - superscript [ref=f18e2296]:
                  - link "[292]" [ref=f18e2297] [cursor=pointer]:
                    - /url: "#cite_note-Par-314"
                - link "The country's usage of coal" [ref=f18e2298] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Coal_in_India
                - text: is a major cause of
                - link "India's greenhouse gas emissions" [ref=f18e2299] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Climate_change_in_India#Greenhouse_gas_emissions
                - text: ", but"
                - link "its renewable energy" [ref=f18e2300] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Renewable_energy_in_India
                - text: is growing.
                - superscript [ref=f18e2301]:
                  - link "[293]" [ref=f18e2302] [cursor=pointer]:
                    - /url: "#cite_note-315"
                - text: India emits about 7% of global greenhouse gas emissions. This equates to about 2.5 tons of
                - link "carbon dioxide" [ref=f18e2303] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Carbon_dioxide
                - text: per person per year, which is half the world average.
                - superscript [ref=f18e2304]:
                  - link "[294]" [ref=f18e2305] [cursor=pointer]:
                    - /url: "#cite_note-USAID2018-316"
                - superscript [ref=f18e2306]:
                  - link "[295]" [ref=f18e2307] [cursor=pointer]:
                    - /url: "#cite_note-UNEP2019-317"
                - text: Increasing
                - link "access to electricity" [ref=f18e2308] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Electrification
                - text: and
                - link "clean cooking" [ref=f18e2309] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Clean_cooking
                - text: with
                - link "liquefied petroleum gas" [ref=f18e2310] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Liquefied_petroleum_gas
                - text: have been priorities for energy in India.
                - superscript [ref=f18e2311]:
                  - link "[296]" [ref=f18e2312] [cursor=pointer]:
                    - /url: "#cite_note-318"
