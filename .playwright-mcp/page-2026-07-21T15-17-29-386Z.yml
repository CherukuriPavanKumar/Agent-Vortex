                  - link [ref=f18e2874] [cursor=pointer]:
                    - /url: https://en.wikipedia.org/wiki/File:Hindu_Bride,_Ahmedabad,_Gujarat.jpg
                    - img "A Hindu bride in Ahmedabad, Gujarat" [ref=f18e2875]
                  - generic [ref=f18e2876]:
                    - text: A Hindu bride in
                    - link "Ahmedabad" [ref=f18e2877] [cursor=pointer]:
                      - /url: https://en.wikipedia.org/wiki/Ahmedabad
                    - text: ", Gujarat"
            - region [ref=f18e2878]:
              - heading "Visual art" [level=3] [ref=f18e2880]
              - note [ref=f18e2881]:
                - text: "Main article:"
                - link "Indian art" [ref=f18e2882] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Indian_art
              - paragraph [ref=f18e2883]:
                - text: India has a very ancient tradition of art, which has exchanged many influences with the rest of
                - link "Eurasia" [ref=f18e2884] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Eurasia
                - text: ", especially in the first millennium. During this period"
                - link "Buddhist art" [ref=f18e2885] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Buddhist_art
                - text: spread with Indian religions to
                - link "Central" [ref=f18e2886] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Central_Asia
                - text: ","
                - link "East" [ref=f18e2887] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/East_Asia
                - text: and
                - link "Southeast Asia" [ref=f18e2888] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Southeast_Asia
                - text: ", the last also greatly influenced by Hindu art."
                - superscript [ref=f18e2889]:
                  - link "[358]" [ref=f18e2890] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTERowland1970185–198,_252,_385–466-382"
                - text: Thousands of
                - link "seals from the Indus Valley civilisation" [ref=f18e2891] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Indus_Valley_civilisation#Seals
                - text: of the third millennium BCE have been found, usually carved with animals, but also some with human figures. The
                - link "Pashupati seal" [ref=f18e2892] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Pashupati_seal
                - text: ", excavated in"
                - link "Mohenjo-daro" [ref=f18e2893] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Mohenjo-daro
                - text: ", Pakistan, in 1928–29, is the best known."
                - superscript [ref=f18e2894]:
                  - link "[359]" [ref=f18e2895] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTECraven199714–16-383"
                - superscript [ref=f18e2896]:
                  - link "[360]" [ref=f18e2897] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEHarle199417–18-384"
                - text: Virtually no art survives from a long period following the Indus Valley Civilisation.
                - superscript [ref=f18e2898]:
                  - link "[360]" [ref=f18e2899] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEHarle199417–18-384"
                - superscript [ref=f18e2900]:
                  - link "[361]" [ref=f18e2901] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTERowland197046–47-385"
                - text: Almost all surviving ancient Indian art thereafter is in various forms of religious
                - link "sculpture" [ref=f18e2902] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Indian_sculpture
                - text: in durable materials, or coins. There was probably originally far more in wood, which is lost. In north India
                - link "Mauryan art" [ref=f18e2903] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Mauryan_art
                - text: is the first imperial movement.
                - superscript [ref=f18e2904]:
                  - link "[362]" [ref=f18e2905] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTECraven199735–46-386"
                - superscript [ref=f18e2906]:
                  - link "[363]" [ref=f18e2907] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTERowland197067–70-387"
                - superscript [ref=f18e2908]:
                  - link "[364]" [ref=f18e2909] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEHarle199422–24-388"
              - paragraph [ref=f18e2910]:
                - text: Over the following centuries a distinctly Indian style of sculpting the human figure developed, with less interest in articulating precise anatomy than
                - link "ancient Greek sculpture" [ref=f18e2911] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Ancient_Greek_sculpture
                - text: but showing smoothly flowing forms expressing prana ("breath" or life-force).
                - superscript [ref=f18e2912]:
                  - link "[365]" [ref=f18e2913] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTECraven199722,_88-389"
                - superscript [ref=f18e2914]:
                  - link "[366]" [ref=f18e2915] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTERowland197035,_99–100-390"
                - text: This is often complicated by the need to give figures multiple arms or heads, or represent different genders on the left and right of figures, as with the
                - link "Ardhanarishvara" [ref=f18e2916] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Ardhanarishvara
                - text: form of Shiva and
                - link "Parvati" [ref=f18e2917] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Parvati
                - text: .
                - superscript [ref=f18e2918]:
                  - link "[367]" [ref=f18e2919] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTECraven199718–19-391"
                - superscript [ref=f18e2920]:
                  - link "[368]" [ref=f18e2921] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEBlurton1993151-392"
              - paragraph [ref=f18e2922]:
                - text: Most of the earliest large sculpture is Buddhist, either excavated from Buddhist
                - link "stupas" [ref=f18e2923] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Stupa
                - text: such as
                - link "Sanchi" [ref=f18e2924] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Sanchi
                - text: ","
                - link "Sarnath" [ref=f18e2925] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Sarnath
                - text: and
                - link "Amaravati" [ref=f18e2926] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Amaravati_Stupa
                - text: ","
                - superscript [ref=f18e2927]:
                  - link "[369]" [ref=f18e2928] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEHarle199432–38-393"
                - text: or is rock cut
                - link "reliefs" [ref=f18e2929] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Relief
                - text: at sites such as
                - link "Ajanta" [ref=f18e2930] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Ajanta_Caves
                - text: ","
                - link "Karla" [ref=f18e2931] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Karla_Caves
                - text: and
                - link "Ellora" [ref=f18e2932] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Ellora
                - text: . Hindu and Jain sites appear rather later.
                - superscript [ref=f18e2933]:
                  - link "[370]" [ref=f18e2934] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEHarle199443–55-394"
                - superscript [ref=f18e2935]:
                  - link "[371]" [ref=f18e2936] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTERowland1970113–119-395"
                - text: In spite of this complex mixture of religious traditions, generally, the prevailing artistic style at any time and place has been shared by the major religious groups, and sculptors probably usually served all communities.
                - superscript [ref=f18e2937]:
                  - link "[372]" [ref=f18e2938] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEBlurton199310–11-396"
                - link "Gupta art" [ref=f18e2939] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Gupta_art
                - text: ", at its peak c."
                - generic [ref=f18e2940]: 300 CE
                - text: – c.
                - generic [ref=f18e2941]: 500 CE
                - text: ", is often regarded as a classical period whose influence lingered for many centuries after; it saw a new dominance of Hindu sculpture, as at the"
                - link "Elephanta Caves" [ref=f18e2942] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Elephanta_Caves
                - text: .
                - superscript [ref=f18e2943]:
                  - link "[373]" [ref=f18e2944] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTECraven1997111–121-397"
                - superscript [ref=f18e2945]:
                  - link "[374]" [ref=f18e2946] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEMichell200044–70-398"
                - text: Across the north, this became rather stiff and formulaic after c.
                - generic [ref=f18e2947]: 800 CE
                - text: ", though rich with finely carved detail in the surrounds of statues."
                - superscript [ref=f18e2948]:
                  - link "[375]" [ref=f18e2949] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEHarle1994212–216-399"
                - text: But in the South, under the
                - link "Pallava" [ref=f18e2950] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Pallava_dynasty
                - text: and
                - link "Chola dynasties" [ref=f18e2951] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Chola_dynasty
                - text: ", sculpture in both stone and bronze had a"
                - link "sustained period of great achievement" [ref=f18e2952] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Chola_art_and_architecture#Sculpture_and_bronzes
                - text: ; the large bronzes with Shiva as
                - link "Nataraja" [ref=f18e2953] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Nataraja
                - text: have become an iconic symbol of India.
                - superscript [ref=f18e2954]:
                  - link "[376]" [ref=f18e2955] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTECraven1997152–160-400"
                - superscript [ref=f18e2956]:
                  - link "[377]" [ref=f18e2957] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEBlurton1993225–227-401"
              - paragraph [ref=f18e2958]:
                - text: Ancient paintings have only survived at a few sites, of which the crowded scenes of court life in the
                - link "Ajanta Caves" [ref=f18e2959] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Ajanta_Caves
                - text: are some of the most important.
                - superscript [ref=f18e2960]:
                  - link "[378]" [ref=f18e2961] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEHarle1994356–361-402"
                - superscript [ref=f18e2962]:
                  - link "[379]" [ref=f18e2963] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTERowland1970242–251-403"
                - text: Painted manuscripts of religious texts survive from Eastern India from 10th century onwards, most of the earliest being Buddhist and later Jain. These significantly influenced later artistic styles.
                - superscript [ref=f18e2964]:
                  - link "[380]" [ref=f18e2965] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEHarle1994361–370-404"
                - text: The Persian-derived
                - link "Deccan painting" [ref=f18e2966] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Deccan_painting
                - text: ", starting just before the"
                - link "Mughal miniature" [ref=f18e2967] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Mughal_miniature
                - text: ", between them give the first large body of secular painting, with an emphasis on portraits, and the recording of princely pleasures and wars."
                - superscript [ref=f18e2968]:
                  - link "[381]" [ref=f18e2969] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTECraven1997202–208-405"
                - superscript [ref=f18e2970]:
                  - link "[382]" [ref=f18e2971] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEHarle1994372–382,_400–406-406"
                - text: The style spread to Hindu courts, especially
                - link "among the Rajputs" [ref=f18e2972] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Rajput_painting
                - text: ", and developed a variety of styles, with the smaller courts often the most innovative, with figures such as"
                - link "Nihâl Chand" [ref=f18e2973] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Nihâl_Chand
                - text: and
                - link "Nainsukh" [ref=f18e2974] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Nainsukh
                - text: .
                - superscript [ref=f18e2975]:
                  - link "[383]" [ref=f18e2976] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTECraven1997222–243-407"
                - superscript [ref=f18e2977]:
                  - link "[384]" [ref=f18e2978] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEHarle1994384–397,_407–420-408"
                - text: As a market developed among European residents, it was supplied by
                - link "Company painting" [ref=f18e2979] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Company_painting
                - text: by Indian artists with considerable Western influence.
                - superscript [ref=f18e2980]:
                  - link "[385]" [ref=f18e2981] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTECraven1997243-409"
                - superscript [ref=f18e2982]:
                  - link "[386]" [ref=f18e2983] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEMichell2000210-410"
                - text: In the 19th century, cheap
                - link "Kalighat paintings" [ref=f18e2984] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Kalighat_painting
                - text: of gods and everyday life, done on paper, were urban
                - link "folk art" [ref=f18e2985] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Folk_art
                - text: from
                - link "Calcutta" [ref=f18e2986] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Calcutta
                - text: ", which later saw the"
                - link "Bengal School of Art" [ref=f18e2987] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Bengal_School_of_Art
                - text: ", reflecting the art colleges founded by the British, the first movement in"
                - link "modern Indian painting" [ref=f18e2988] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Modern_Indian_painting
                - text: .
                - superscript [ref=f18e2989]:
                  - link "[387]" [ref=f18e2990] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEMichell2000210–211-411"
                - superscript [ref=f18e2991]:
                  - link "[388]" [ref=f18e2992] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEBlurton1993211-412"
              - list [ref=f18e2993]:
                - listitem [ref=f18e2994]:
                  - link [ref=f18e2997] [cursor=pointer]:
                    - /url: https://en.wikipedia.org/wiki/File:Bhutesvara_Yakshis_Mathura_reliefs_2nd_century_CE_front.jpg
                    - img "Bhutesvara Yakshis, Buddhist reliefs from Mathura, 2nd century CE" [ref=f18e2998]
                  - generic [ref=f18e2999]:
                    - link "Bhutesvara Yakshis" [ref=f18e3000] [cursor=pointer]:
                      - /url: https://en.wikipedia.org/wiki/Bhutesvara_Yakshis
                    - text: ", Buddhist reliefs from"
                    - link "Mathura" [ref=f18e3001] [cursor=pointer]:
                      - /url: https://en.wikipedia.org/wiki/Mathura
                    - text: ", 2nd century CE"
                - listitem [ref=f18e3002]:
