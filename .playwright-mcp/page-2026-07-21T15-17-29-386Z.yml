                      - /url: https://en.wikipedia.org/wiki/Gupta_art
                    - link "terracotta" [ref=f18e3009] [cursor=pointer]:
                      - /url: https://en.wikipedia.org/wiki/Terracotta
                    - text: relief,
                    - generic [ref=f18e3010]:
                      - link "Krishna" [ref=f18e3011] [cursor=pointer]:
                        - /url: https://en.wikipedia.org/wiki/Krishna
                      - text: Killing the
                      - link "Horse Demon Keshi" [ref=f18e3012] [cursor=pointer]:
                        - /url: https://en.wikipedia.org/wiki/Keshi_(demon)
                    - text: ", 5th century"
                - listitem [ref=f18e3013]:
                  - link [ref=f18e3016] [cursor=pointer]:
                    - /url: https://en.wikipedia.org/wiki/File:Unknown,_Kangra,_India_-_Krishna_Fluting_to_the_Milkmaids_-_Google_Art_Project.jpg
                    - img "Krishna Fluting to the Milkmaids, Kangra painting, 1775–1785" [ref=f18e3017]
                  - generic [ref=f18e3018]:
                    - text: Krishna Fluting to the Milkmaids,
                    - link "Kangra painting" [ref=f18e3019] [cursor=pointer]:
                      - /url: https://en.wikipedia.org/wiki/Kangra_painting
                    - text: ", 1775–1785"
                - listitem [ref=f18e3020]:
                  - link [ref=f18e3023] [cursor=pointer]:
                    - /url: https://en.wikipedia.org/wiki/File:Shiva_as_Lord_of_the_Dance_(Nataraja).jpg
                    - img "Chola bronze of Shiva as Nataraja (\"Lord of Dance\"), Tamil Nadu, 10th or 11th century" [ref=f18e3024]
                  - generic [ref=f18e3025]:
                    - link "Chola bronze" [ref=f18e3026] [cursor=pointer]:
                      - /url: https://en.wikipedia.org/wiki/Chola_art_and_architecture#Sculpture_and_bronzes
                    - text: of
                    - link "Shiva" [ref=f18e3027] [cursor=pointer]:
                      - /url: https://en.wikipedia.org/wiki/Shiva
                    - text: as
                    - link "Nataraja" [ref=f18e3028] [cursor=pointer]:
                      - /url: https://en.wikipedia.org/wiki/Nataraja
                    - text: ("Lord of Dance"),
                    - link "Tamil Nadu" [ref=f18e3029] [cursor=pointer]:
                      - /url: https://en.wikipedia.org/wiki/Tamil_Nadu
                    - text: ", 10th or 11th century"
            - region [ref=f18e3030]:
              - heading "Mathematics" [level=3] [ref=f18e3032]
              - note [ref=f18e3033]:
                - text: "Main articles:"
                - link "Indian mathematics" [ref=f18e3034] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Indian_mathematics
                - text: and
                - link "Kerala school of astronomy and mathematics" [ref=f18e3035] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Kerala_school_of_astronomy_and_mathematics
              - paragraph [ref=f18e3036]:
                - text: Significant mathematics began in India in the first millennium BCE. The
                - link "Śulba Sūtras" [ref=f18e3038] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Shulba_Sutras
                - text: (literally, "Aphorisms of the Chords" in
                - link "Vedic Sanskrit" [ref=f18e3039] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Vedic_Sanskrit
                - text: ) (c. 700–400 BCE) contain the earliest extant verbal expression of the
                - link "Pythagorean theorem" [ref=f18e3040] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Pythagorean_theorem
                - text: (although very likely it had been known to the
                - link "Old Babylonians" [ref=f18e3041] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/First_Babylonian_dynasty
                - text: .)
                - superscript [ref=f18e3042]:
                  - link "[389]" [ref=f18e3043] [cursor=pointer]:
                    - /url: "#cite_note-hayashi2005-p363-413"
                - superscript [ref=f18e3044]:
                  - link "[y]" [ref=f18e3045] [cursor=pointer]:
                    - /url: "#cite_note-416"
                - text: All mathematical works were orally transmitted until approximately 500 BCE; thereafter, they were transmitted both orally and in manuscript form. The oldest extant mathematical document produced on the Indian subcontinent is the birch bark
                - link "Bakhshali manuscript" [ref=f18e3046] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Bakhshali_manuscript
                - text: from the 7th century CE.
                - superscript [ref=f18e3047]:
                  - link "[392]" [ref=f18e3048] [cursor=pointer]:
                    - /url: "#cite_note-hayashi95-417"
                - superscript [ref=f18e3049]:
                  - link "[393]" [ref=f18e3050] [cursor=pointer]:
                    - /url: "#cite_note-plofker-brit6-418"
              - paragraph [ref=f18e3051]:
                - text: In the classical period of Indian mathematics (400 CE to 1200 CE), important contributions were made by
                - link "Aryabhata" [ref=f18e3052] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Aryabhata
                - text: ","
                - link "Brahmagupta" [ref=f18e3053] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Brahmagupta
                - text: ","
                - link "Bhaskara II" [ref=f18e3054] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Bhaskara_II
                - text: ","
                - link "Varāhamihira" [ref=f18e3055] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Varāhamihira
                - text: ", and"
                - link "Madhava" [ref=f18e3056] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Madhava_of_Sangamagrama
                - text: . The
                - link "decimal number system" [ref=f18e3057] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Decimal
                - text: in use today
                - superscript [ref=f18e3058]:
                  - link "[394]" [ref=f18e3059] [cursor=pointer]:
                    - /url: "#cite_note-irfah346-419"
                - text: was first recorded in Indian mathematics.
                - superscript [ref=f18e3060]:
                  - link "[395]" [ref=f18e3061] [cursor=pointer]:
                    - /url: "#cite_note-420"
                - text: Indian mathematicians made early contributions to the study of the concept of
                - link "zero" [ref=f18e3062] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/0_(number)
                - text: as a number,
                - superscript [ref=f18e3063]:
                  - link "[396]" [ref=f18e3064] [cursor=pointer]:
                    - /url: "#cite_note-bourbaki46-421"
                - link "negative numbers" [ref=f18e3065] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Negative_numbers
                - text: ","
                - superscript [ref=f18e3066]:
                  - link "[397]" [ref=f18e3067] [cursor=pointer]:
                    - /url: "#cite_note-bourbaki49-422"
                - link "arithmetic" [ref=f18e3068] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Arithmetic
                - text: ", and"
                - link "algebra" [ref=f18e3069] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Algebra
                - text: .
                - superscript [ref=f18e3070]:
                  - link "[398]" [ref=f18e3071] [cursor=pointer]:
                    - /url: "#cite_note-concise-britannica-423"
                - link "Trigonometry" [ref=f18e3072] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Trigonometry
                - superscript [ref=f18e3073]:
                  - link "[399]" [ref=f18e3074] [cursor=pointer]:
                    - /url: "#cite_note-424"
                - text: was further advanced in India, and the modern definitions of
                - link "sine" [ref=f18e3075] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Sine
                - text: and
                - link "cosine" [ref=f18e3076] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Cosine
                - text: were developed there.
                - superscript [ref=f18e3077]:
                  - link "[400]" [ref=f18e3078] [cursor=pointer]:
                    - /url: "#cite_note-425"
                - text: These mathematical concepts were transmitted to the Middle East, China, and Europe.
                - superscript [ref=f18e3079]:
                  - link "[398]" [ref=f18e3080] [cursor=pointer]:
                    - /url: "#cite_note-concise-britannica-423"
                - text: A later landmark in Indian mathematics was the development of the
                - link "series" [ref=f18e3081] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Series_(mathematics)
                - text: expansions for
                - link "trigonometric functions" [ref=f18e3082] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Trigonometric_function
                - text: (sine, cosine, and
                - link "arc tangent" [ref=f18e3083] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Arc_tangent
                - text: ) by mathematicians of the
                - link "Kerala school" [ref=f18e3084] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Kerala_school_of_astronomy_and_mathematics
                - text: in the 15th century CE. Their work, completed two centuries before the invention of
                - link "calculus" [ref=f18e3085] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Calculus
                - text: in Europe, provided the first example of a
                - link "power series" [ref=f18e3086] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Power_series
                - text: .
                - superscript [ref=f18e3087]:
                  - link "[z]" [ref=f18e3088] [cursor=pointer]:
                    - /url: "#cite_note-426"
                - superscript [ref=f18e3089]:
                  - link "[401]" [ref=f18e3090] [cursor=pointer]:
                    - /url: "#cite_note-427"
                - text: In the modern era
                - link "Srinivasa Ramanujan" [ref=f18e3091] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Srinivasa_Ramanujan
                - text: made fundamental contributions to
                - link "number theory" [ref=f18e3092] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Number_theory
                - text: .
                - superscript [ref=f18e3093]:
