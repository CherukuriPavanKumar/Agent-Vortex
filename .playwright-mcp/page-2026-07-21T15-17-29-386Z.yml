              - paragraph [ref=f18e3286]:
                - text: The best-known classical dance is Bharatnatyam, which began in the temple dances of
                - link "Tamil" [ref=f18e3287] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Tamil_people
                - link "devadasis" [ref=f18e3288] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Devadasi
                - text: .
                - superscript [ref=f18e3289]:
                  - link "[406]" [ref=f18e3290] [cursor=pointer]:
                    - /url: "#cite_note-vatsyayan-lord-432"
                - text: Identified with "prostitutes and courtesans", their dancing was formally banned in 1947.
                - superscript [ref=f18e3291]:
                  - link "[ad]" [ref=f18e3292] [cursor=pointer]:
                    - /url: "#cite_note-437"
                - text: Concurrently, the dance was rehabilitated as a "pure" art form, with
                - link "Rukmini Devi Arundale" [ref=f18e3293] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Rukmini_Devi_Arundale
                - text: as a prominent figure. A devdasi who went on to attain national and international prominence was
                - link "Thanjavur Balasaraswati" [ref=f18e3294] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Balasaraswati
                - text: .
                - superscript [ref=f18e3295]:
                  - link "[406]" [ref=f18e3296] [cursor=pointer]:
                    - /url: "#cite_note-vatsyayan-lord-432"
                - text: Some sources consider the dance-dramas
                - link "Chhau" [ref=f18e3297] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Chhau_dance
                - text: of
                - link "Jharkhand" [ref=f18e3298] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Jharkhand
                - text: ","
                - link "West Bengal" [ref=f18e3299] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/West_Bengal
                - text: ", and"
                - link "Odisha" [ref=f18e3300] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Odisha
                - text: and
                - link "Yakshagana" [ref=f18e3301] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Yakshagana
                - text: of
                - link "Karnataka" [ref=f18e3302] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Karnataka
                - text: to also belong to the classical tradition.
                - superscript [ref=f18e3303]:
                  - link "[408]" [ref=f18e3304] [cursor=pointer]:
                    - /url: "#cite_note-burch-2013-438"
              - paragraph [ref=f18e3305]:
                - text: Local dance traditions vary widely across India. In addition to the dance-dramas Chhau and Yakshagana, they include dance-dramas
                - link "Raslila" [ref=f18e3306] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Raslila
                - text: of western
                - link "Uttar Pradesh" [ref=f18e3307] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Uttar_Pradesh
                - text: and
                - link "Terukkuttu" [ref=f18e3308] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Terukkuttu
                - text: of Tamil Nadu; calendrical and festival dances such as the
                - link "Bhangra" [ref=f18e3309] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Bhangra_(dance)
                - text: of Punjab, especially at
                - link "Vaisakhi" [ref=f18e3310] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Vaisakhi
                - text: ", the onset of spring, and"
                - link "Garba" [ref=f18e3311] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Garba_(dance)
                - text: of
                - link "Gujarat" [ref=f18e3312] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Gujarat
                - text: during
                - link "Navratri" [ref=f18e3313] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Navratri
                - text: ; and tribal or
                - link "Adivasi" [ref=f18e3314] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Adivasi
                - text: dances, such as those of the
                - link "Santal" [ref=f18e3315] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Santal
                - text: and
                - link "Toda people" [ref=f18e3316] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Toda_people
                - text: ", the latter, for example, in honour of the god"
                - link "Ön" [ref=f18e3317] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Toda_people#Religion
                - text: who brought buffalo to earth.
                - superscript [ref=f18e3318]:
                  - link "[406]" [ref=f18e3319] [cursor=pointer]:
                    - /url: "#cite_note-vatsyayan-lord-432"
              - paragraph [ref=f18e3320]:
                - text: Among 20th-century directions is the
                - link "modern dance" [ref=f18e3321] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Modern_dance
                - text: of
                - link "Uday Shankar" [ref=f18e3322] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Uday_Shankar
                - text: in which classical styles were employed but not adhered to rigidly. Examples are dance-dramas based on the ancient Indian
                - link "animal fables" [ref=f18e3323] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Animal_fable
                - text: ","
                - link "Panchatantra" [ref=f18e3325] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Panchatantra
                - text: ", and Nehru's mid-century meditation on Indian history,"
                - link "The Discovery of India" [ref=f18e3327] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/The_Discovery_of_India
                - text: .
                - superscript [ref=f18e3328]:
                  - link "[406]" [ref=f18e3329] [cursor=pointer]:
                    - /url: "#cite_note-vatsyayan-lord-432"
                - text: Dance has been an essential aspect of Indian films from the first
                - link "talkies" [ref=f18e3330] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Talkies
                - text: of the 1930s. The individual and group dances of
                - link "Bollywood" [ref=f18e3331] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Bollywood
                - text: ", for example, show a broad range of influences, including classical, local, and Western popular dance."
                - superscript [ref=f18e3332]:
                  - link "[406]" [ref=f18e3333] [cursor=pointer]:
                    - /url: "#cite_note-vatsyayan-lord-432"
                - text: Towards the end of the 20th century, innovations in
                - link "British South Asian" [ref=f18e3334] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/British_South_Asian
                - text: music and dance, such as
                - link "Post-Bhangra" [ref=f18e3335] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Music_of_the_United_Kingdom_(1990s)#Post-Bhangra
                - text: ", fed back into dance in India."
                - superscript [ref=f18e3336]:
                  - link "[406]" [ref=f18e3337] [cursor=pointer]:
                    - /url: "#cite_note-vatsyayan-lord-432"
