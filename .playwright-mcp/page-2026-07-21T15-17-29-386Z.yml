                    - generic "ctx_ver=Z39.88-2004&rft_val_fmt=info%3Aofi%2Ffmt%3Akev%3Amtx%3Abook&rft.genre=bookitem&rft.atitle=Caste&rft.btitle=The+Columbia+Encyclopedia&rft.place=New+York%2C+NY&rft.pub=Columbia+University+Press&rft.date=2007&rft.isbn=978-0-231-14446-9&rft_id=http%3A%2F%2Fwww.encyclopedia.com%2Ftopic%2Fcaste.aspx%233&rfr_id=info%3Asid%2Fen.wikipedia.org%3AIndia"
                    - text: "Quote: \"caste [Port., casta=basket], ranked groups based on heredity within rigid systems of social stratification, especially those that constitute Hindu India. Some scholars, in fact, deny that true caste systems are found outside India. The caste is a closed group whose members are severely restricted in their choice of occupation and degree of social participation. Marriage outside the caste is prohibited. Social status is determined by the caste of one's birth and may only rarely be transcended.\""
