                    - text: .
                  - generic "ctx_ver=Z39.88-2004&rft_val_fmt=info%3Aofi%2Ffmt%3Akev%3Amtx%3Abook&rft.genre=book&rft.btitle=A+Moral+Technology%3A+Electrification+as+Political+Ritual+in+New+Delhi&rft.pages=127&rft.pub=Cornell+University+Press&rft.date=2017&rft.isbn=978-1-5017-0791-9&rft.aulast=Coleman&rft.aufirst=Leo&rft_id=https%3A%2F%2Fbooks.google.com%2Fbooks%3Fid%3D6YDTDgAAQBAJ%26pg%3DPT127&rfr_id=info%3Asid%2Fen.wikipedia.org%3AIndia"
                  - text: "Quote: Rakhi and its local performances in Kishan Garhi were part of a festival in which connections between out-marrying sisters and village-resident brothers were affirmed. In the \"traditional\" form of this rite, according to Marriott, sisters exchanged with their brothers to ensure their ability to have recourse—at a crisis, or during childbearing—to their natal village and their relatives there even after leaving for their husband's home. For their part, brothers engaging in these exchanges affirmed the otherwise hard-to-discern moral solidarity of the natal family, even after their sister's marriage."
