                    - text: ", Kolkata"
            - region [ref=f18e2684]:
              - heading "Education" [level=3] [ref=f18e2686]
              - note [ref=f18e2687]:
                - text: "Main article:"
                - link "Education in India" [ref=f18e2688] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Education_in_India
              - note [ref=f18e2689]:
                - text: "See also:"
                - link "Literacy in India" [ref=f18e2690] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Literacy_in_India
                - text: and
                - link "History of education in the Indian subcontinent" [ref=f18e2691] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/History_of_education_in_the_Indian_subcontinent
              - paragraph [ref=f18e2692]:
                - text: "The literacy rate in 2011 was 74.04%: 65.46% among females and 82.14% among males."
                - superscript [ref=f18e2693]:
                  - link "[330]" [ref=f18e2694] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEProvisional_Population_Totals_Paper_1_of_2011_India163-353"
                - text: The rural-urban literacy gap, which was 21.2 percentage points in 2001, dropped to 16.1 percentage points in 2011. The improvement in the rural literacy rate is twice that of urban areas.
                - superscript [ref=f18e2695]:
                  - link "[313]" [ref=f18e2696] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEChandramouli2011-335"
                - text: In 2011
                - link "Kerala" [ref=f18e2697] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Kerala
                - text: had the highest literary rate, with 93.91% literacy, and
                - link "Bihar" [ref=f18e2698] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Bihar
                - text: the lowest, with 63.82%.
                - superscript [ref=f18e2699]:
                  - link "[330]" [ref=f18e2700] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEProvisional_Population_Totals_Paper_1_of_2011_India163-353"
                - text: In 1981 the respective literacy rates for total population, men and women were 41%, 53% and 29%. In 1951, the rates were 18%, 27% and 9%. In 1921, the rates 7%, 12% and 2%. In 1891, they were 5%, 9% and 1%.
                - superscript [ref=f18e2701]:
                  - link "[331]" [ref=f18e2702] [cursor=pointer]:
                    - /url: "#cite_note-354"
                - superscript [ref=f18e2703]:
                  - link "[332]" [ref=f18e2704] [cursor=pointer]:
                    - /url: "#cite_note-355"
                - text: According to Latika Chaudhary, in 1911 there were under three primary schools for every ten villages. Statistically, more caste and religious diversity reduced private spending. Primary schools taught literacy, so local diversity limited its growth.
                - superscript [ref=f18e2705]:
                  - link "[333]" [ref=f18e2706] [cursor=pointer]:
                    - /url: "#cite_note-356"
              - paragraph [ref=f18e2707]:
                - text: The education system of India is the world's second-largest.
                - superscript [ref=f18e2708]:
                  - link "[334]" [ref=f18e2709] [cursor=pointer]:
                    - /url: "#cite_note-357"
                - text: India has over 900 universities, 40,000 colleges
                - superscript [ref=f18e2710]:
                  - link "[335]" [ref=f18e2711] [cursor=pointer]:
                    - /url: "#cite_note-highered1-358"
                - text: and 1.5 million schools.
                - superscript [ref=f18e2712]:
                  - link "[336]" [ref=f18e2713] [cursor=pointer]:
                    - /url: "#cite_note-359"
                - text: In India's higher education system, a significant number of seats are reserved under
                - link "affirmative action" [ref=f18e2714] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Reservation_in_India
                - text: policies for the historically disadvantaged. In recent decades India's improved education system is often cited as one of the main contributors to
                - link "its economic development" [ref=f18e2715] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Economic_development_in_India
                - text: .
                - superscript [ref=f18e2716]:
                  - link "[337]" [ref=f18e2717] [cursor=pointer]:
                    - /url: "#cite_note-Sify-360"
                - superscript [ref=f18e2718]:
                  - link "[338]" [ref=f18e2719] [cursor=pointer]:
                    - /url: "#cite_note-361"
              - list [ref=f18e2720]:
                - listitem [ref=f18e2721]:
                  - link [ref=f18e2724] [cursor=pointer]:
                    - /url: https://en.wikipedia.org/wiki/File:47_Raika_School_-_eating_together_(3384824242).jpg
                    - img "Children await school lunch in Rayka (also Raika), a village in Gujarat. The salutation Jai Bhim on the blackboard honours the jurist, social reformer, and Dalit leader B. R. Ambedkar." [ref=f18e2725]
