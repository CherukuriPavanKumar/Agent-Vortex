            - region [ref=f18e2758]:
              - heading "Health" [level=3] [ref=f18e2760]
              - note [ref=f18e2761]:
                - text: "Main article:"
                - link "Health in India" [ref=f18e2762] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Health_in_India
              - figure [ref=f18e2763]:
                - link [ref=f18e2764] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/File:Female_health_workers_in_India_(34332433890).jpg
                - generic [ref=f18e2766]:
                  - text: Immunisation health workers in 2006. Eight years later, and three years after India's last case of polio, the WHO declared India to be polio-free.
                  - superscript [ref=f18e2767]:
                    - link "[341]" [ref=f18e2768] [cursor=pointer]:
                      - /url: "#cite_note-who-chan-14-feb-2014-364"
              - paragraph [ref=f18e2769]:
                - text: India bears a disproportionately large burden of the world's
                - link "tuberculosis" [ref=f18e2770] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Tuberculosis_in_India
                - text: rates, with
                - link "World Health Organization" [ref=f18e2771] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/World_Health_Organization
                - text: (WHO) statistics for 2022 estimating 2.8 million new infections annually, accounting for 26% of the global total.
                - superscript [ref=f18e2772]:
                  - link "[342]" [ref=f18e2773] [cursor=pointer]:
                    - /url: "#cite_note-365"
                - text: It is estimated that approximately 40% of the population of India carry
                - link "tuberculosis" [ref=f18e2774] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Latent_tuberculosis
                - text: infection.
                - superscript [ref=f18e2775]:
                  - link "[343]" [ref=f18e2776] [cursor=pointer]:
                    - /url: "#cite_note-366"
              - paragraph [ref=f18e2777]:
                - text: In 2018
                - link "chronic obstructive pulmonary disease" [ref=f18e2778] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Chronic_obstructive_pulmonary_disease
                - text: was the leading cause of death after
                - link "heart disease" [ref=f18e2779] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Heart_disease_in_India
                - text: . The 10
                - link "most polluted cities in the world" [ref=f18e2780] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/List_of_most-polluted_cities_by_particulate_matter_concentration
                - text: are all in India with more than 140 million people breathing air 10 times or more over the WHO safe limit.
                - superscript [ref=f18e2781]:
                  - text: "["
                  - link "citation needed" [ref=f18e2783] [cursor=pointer]:
                    - /url: https://en.wikipedia.org/wiki/Wikipedia:Citation_needed
                  - text: "]"
                - text: As of 2026, air quality reports show that not a single Indian city meets the WHO's safety guidelines.
                - superscript [ref=f18e2784]:
                  - link "[344]" [ref=f18e2785] [cursor=pointer]:
                    - /url: "#cite_note-367"
                - text: In cities like Delhi and Mumbai, breathing the air is equivalent to smoking 30 cigarettes a day.
                - superscript [ref=f18e2786]:
                  - text: "["
                  - link "citation needed" [ref=f18e2788] [cursor=pointer]:
                    - /url: https://en.wikipedia.org/wiki/Wikipedia:Citation_needed
                  - text: "]"
                - text: In 2017, air pollution killed 1.24 million Indians.
                - superscript [ref=f18e2789]:
                  - link "[345]" [ref=f18e2790] [cursor=pointer]:
                    - /url: "#cite_note-368"
          - region [ref=f18e2791]:
            - heading "Culture" [level=2] [ref=f18e2793]
            - note [ref=f18e2794]:
              - text: "Main article:"
              - link "Culture of India" [ref=f18e2795] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Culture_of_India
            - region [ref=f18e2796]:
              - heading "Society" [level=3] [ref=f18e2798]
              - note [ref=f18e2799]:
                - text: "Main articles:"
                - link "Caste system in India" [ref=f18e2800] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Caste_system_in_India
                - text: and
                - link "Gender inequality in India" [ref=f18e2801] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Gender_inequality_in_India
              - paragraph [ref=f18e2802]:
                - text: Although sometimes applied to other cultures and religions, caste is a uniquely Indian, and Hindu, social institution.
                - superscript [ref=f18e2803]:
                  - link "[x]" [ref=f18e2804] [cursor=pointer]:
                    - /url: "#cite_note-370"
                - text: All Hindus fall broadly into four castes, or
                - link "varnas" [ref=f18e2806] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Varna_(Hinduism)
                - text: ":"
                - link "Brahmin" [ref=f18e2807] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Brahmin
                - text: ", or priests, at the top; below them"
                - link "Kshatriya" [ref=f18e2808] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Kshatriya
                - text: ", or warriors; further below,"
                - link "Vaishya" [ref=f18e2809] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Vaishya
                - text: ", or merchants and farmers; and at the bottom,"
                - link "Shudra" [ref=f18e2810] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Shudra
                - text: ", or the service class. Outside the caste system, and therefore of traditional Hinduism, lie people formerly called \"outcastes\" or \"untouchables,\" and now"
                - link "scheduled caste" [ref=f18e2811] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Scheduled_caste
                - text: (a term used in India's constitution) or
                - link "Dalit" [ref=f18e2812] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Dalit
                - text: ", a later self-description of pride, meaning \"broken\" or \"downtrodden\". Each caste is further divided into sub-castes, or"
                - link "jatis" [ref=f18e2813] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Jāti
                - text: ", many of which are tied to occupations. The custom of"
                - link "endogamy" [ref=f18e2814] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Endogamy
                - text: ", or marrying within one's subcaste, however, makes caste a hereditary label, not of one occupational choice, and has caused the caste system, therefore, to become entrenched."
                - superscript [ref=f18e2815]:
                  - link "[347]" [ref=f18e2816] [cursor=pointer]:
                    - /url: "#cite_note-atrey1-371"
                - text: The
                - link "Constituent Assembly of India" [ref=f18e2817] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Constituent_Assembly_of_India
                - text: abolished untouchability in 1947,
                - superscript [ref=f18e2818]:
                  - link "[348]" [ref=f18e2819] [cursor=pointer]:
                    - /url: "#cite_note-nyt-india-constit-assmb-caste-372"
                - text: the
                - link "Republic of India" [ref=f18e2820] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Republic_of_India
                - text: did more formally in 1950, and India has since enacted other anti-discriminatory laws and social welfare initiatives related to caste. Still, caste-based inequality, discrimination, segregation, and
                - link "violence" [ref=f18e2821] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Caste-related_violence_in_India
                - text: persist.
                - superscript [ref=f18e2822]:
                  - link "[349]" [ref=f18e2823] [cursor=pointer]:
                    - /url: "#cite_note-373"
                - superscript [ref=f18e2824]:
                  - link "[350]" [ref=f18e2825] [cursor=pointer]:
                    - /url: "#cite_note-374"
              - paragraph [ref=f18e2826]:
                - text: Multi-generational
                - link "patrilineal" [ref=f18e2827] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Patrilineal
                - link "joint families" [ref=f18e2828] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Joint_family
                - text: have been the norm in India, though
                - link "nuclear families" [ref=f18e2829] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Nuclear_family
                - text: are becoming common in urban areas.
                - superscript [ref=f18e2830]:
                  - link "[351]" [ref=f18e2831] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEMakar2007-375"
                - text: A very large majority of Indians have
                - link "their marriages arranged" [ref=f18e2832] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Arranged_marriage_in_the_Indian_subcontinent
                - text: by their parents or family elders.
                - superscript [ref=f18e2833]:
                  - link "[352]" [ref=f18e2834] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEMedora2003-376"
                - text: Marriage is thought to be for life;
                - superscript [ref=f18e2835]:
                  - link "[352]" [ref=f18e2836] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEMedora2003-376"
                - text: and the divorce rate is extremely low;
                - superscript [ref=f18e2837]:
                  - link "[353]" [ref=f18e2838] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTEJonesRamdas2005111-377"
                - text: less than one in a thousand marriages end in divorce.
                - superscript [ref=f18e2839]:
                  - link "[354]" [ref=f18e2840] [cursor=pointer]:
                    - /url: "#cite_note-378"
                - text: Many women marry before reaching 18, which is their legal marriageable age;
                - link "child marriages" [ref=f18e2841] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Child_marriage
                - text: are not uncommon, especially in rural areas.
                - superscript [ref=f18e2842]:
                  - link "[355]" [ref=f18e2843] [cursor=pointer]:
                    - /url: "#cite_note-FOOTNOTECullen-Dupont200996-379"
                - text: In large parts of Hindu northern India, moreover, a form of territorial
                - link "exogamy" [ref=f18e2844] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Exogamy
                - text: is observed in which a bride marries out of her natal village and her parents do not visit her in her married home; the annual rite
                - link "raksha bandhan" [ref=f18e2845] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Raksha_bandhan
                - text: ", during which married women return to their"
                - link "natal" [ref=f18e2846] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Birth
                - text: homes, has served both to affirm bonds with their natal families and offer a recourse in times of marital stress.
                - superscript [ref=f18e2847]:
                  - link "[356]" [ref=f18e2848] [cursor=pointer]:
                    - /url: "#cite_note-Agarwal1994-380"
                - superscript [ref=f18e2849]:
                  - link "[357]" [ref=f18e2850] [cursor=pointer]:
                    - /url: "#cite_note-Coleman2017-381"
              - list [ref=f18e2851]:
                - listitem [ref=f18e2852]:
                  - link [ref=f18e2855] [cursor=pointer]:
                    - /url: https://en.wikipedia.org/wiki/File:Closeup_at_Gussadi_dance_performer.jpg
                    - img "A Gond tribe member during the Dandari festival in Jainoor, Telangana. The Gond religion predates the Hindu synthesis of the mid-first-millennium BCE." [ref=f18e2856]
                  - generic [ref=f18e2857]:
