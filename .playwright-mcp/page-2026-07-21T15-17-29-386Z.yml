                  - text: ", p. 12: \"India has two natural zones of thorn forest, one in the rain shadow area of the Deccan Plateau east of the Western Ghats, and the other in the western part of the Indo-Gangetic plain. Growth is limited only by moisture availability in these areas, so with irrigation the fertile alluvial soil of Punjab and Haryana has been turned into India's prime agricultural area. Much of the thorn forest covering the plains probably had savannah-like features now no longer visible.\""
