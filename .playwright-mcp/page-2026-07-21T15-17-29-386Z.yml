                    - text: (ed.). A History of India. The Blackwell History of the World Series (2nd ed.). Wiley-Blackwell. One of these is the idea of India as 'the world's largest democracy', but a democracy forged less by the creation of representative institutions and expanding electorate under British rule than by the endeavours of India's founding fathers – Gandhi, Nehru, Patel and Ambedkar – and the labours of the Constituent Assembly between 1946 and 1949, embodied in the Indian constitution of 1950. This democratic order, reinforced by the regular holding of nationwide elections and polling for the state assemblies, has, it can be argued, consistently underpinned a fundamentally democratic state structure – despite the anomaly of the Emergency and the apparent durability of the Gandhi-Nehru dynasty.
