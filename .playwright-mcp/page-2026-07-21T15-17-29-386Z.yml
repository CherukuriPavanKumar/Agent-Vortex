                    - text: . The ensuing cycle of escalation culminated in the 1962 Sino-Indian border war in which Mao Zedong's troops overran almost the entire state of Arunachal Pradesh in the eastern sector before unilaterally withdrawing, as if to underline the insult; most of the war's several thousand casualties were Indian. The PLA's decisive victories in the 1962 war not only humiliated the Indian Army, they also entrenched a status quo in Ladakh that was highly unfavourable for India, in which China controls almost all of the disputed territory. A nationalistic press and commentariat have kept 1962 vivid in India's popular consciousness.
