                - generic [ref=f18e6798]:
                  - link "Ifrah 2000" [ref=f18e6799] [cursor=pointer]:
                    - /url: "#CITEREFIfrah2000"
                  - text: ", p. 346: \"The measure of the genius of Indian civilisation, to which we owe our modern (number) system, is all the greater in that it was the only one in all history to have achieved this triumph. Some cultures succeeded, earlier than the Indian, in discovering one or at best two of the characteristics of this intellectual feat. But none of them managed to bring together into a complete and coherent system the necessary and sufficient conditions for a number-system with the same potential as our own.\""
