                      - /url: https://en.wikipedia.org/wiki/Special:BookSources/978-1-317-31657-2
                    - text: . With the ascent of the Mughal Empire in sixteenth-century India, Turkic, Persian and Afghan traditions of dress, 'architecture and cuisine' were adopted by non-Muslim indigenous elites in South Asia. In this manner, Central Asian cooking merged with older traditions within the subcontinent, to create such signature dishes as biryani (a fusion of the Persian pilau and the spice-laden dishes of Hindustan), and the Kashmiri meat stew of Rogan Josh. It not only generated new dishes and entire cuisines, but also fostered novel modes of eating. Such newer trends included the consumption of Persian condiments, which relied heavily on almonds, pastries and quince jams, alongside Indian achars made from sweet limes, green vegetables and curds as side relishes during Mughlai meals.
