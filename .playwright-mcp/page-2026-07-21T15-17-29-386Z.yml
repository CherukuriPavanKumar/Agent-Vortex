                  - link "Bourbaki 1998" [ref=f18e6814] [cursor=pointer]:
                    - /url: "#CITEREFBourbaki1998"
                  - text: ", p. 49: Modern arithmetic was known during medieval times as \"Modus Indorum\" or method of the Indians."
                  - link "Leonardo of Pisa" [ref=f18e6815] [cursor=pointer]:
                    - /url: https://en.wikipedia.org/wiki/Leonardo_of_Pisa
                  - text: wrote that compared to method of the Indians all other methods is a mistake. This method of the Indians is none other than our very simple arithmetic of addition, subtraction, multiplication and division. Rules for these four simple procedures was first written down by
                  - link "Brahmagupta" [ref=f18e6816] [cursor=pointer]:
                    - /url: https://en.wikipedia.org/wiki/Brahmagupta
                  - text: during the 7th century AD. "On this point, the Hindus are already conscious of the interpretation that negative numbers must have in certain cases (a debt in a commercial problem, for instance). In the following centuries, as there is a diffusion into the West (by intermediary of the Arabs) of the methods and results of Greek and Hindu mathematics, one becomes more used to the handling of these numbers, and one begins to have other "representation" for them which are geometric or dynamic."
