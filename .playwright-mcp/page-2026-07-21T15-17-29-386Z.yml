                - generic [ref=f18e6439]:
                  - generic [ref=f18e6440]:
                    - text: "Headrick, Daniel R. (1988). The Tentacles of Progress: Technology Transfer in the Age of Imperialism, 1850–1940. New York: Oxford University Press. p. 317."
                    - link "ISBN" [ref=f18e6441] [cursor=pointer]:
                      - /url: https://en.wikipedia.org/wiki/ISBN_(identifier)
                    - link "0-19-505115-7" [ref=f18e6442] [cursor=pointer]:
                      - /url: https://en.wikipedia.org/wiki/Special:BookSources/0-19-505115-7
                    - text: ". The first engineering college was an outgrowth of the Ganges Canal. Named after the lieutenant governor of the North-Western Provinces who founded it in 1847, the Thomason Engineering College at Roorkee trained employees for the irrigation branch of the Public Works Department. It offered different curricula for different types of students: an engineering class for domiciled Europeans and a few Indians, an upper subordinates class to train British noncommissioned officers as construction foremen, and a lower subordinates class to train Indian surveyors. By the mid-1880s, the school has a hundred students, substantial buildings, and a reputation as an important center for the study of hydraulic engineering."
