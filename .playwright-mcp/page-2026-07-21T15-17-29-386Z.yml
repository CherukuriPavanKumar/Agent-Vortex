                        - /url: https://books.google.com/books?id=YMUola6pDnkC&pg=PA246
                      - text: ". In Schaefer, Richard T. (ed.). Encyclopedia of Race, Ethnicity, and Society. Thousand Oaks: SAGE. pp. 246–250."
                      - link "ISBN" [ref=f18e6519] [cursor=pointer]:
