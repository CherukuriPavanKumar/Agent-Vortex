                  - text: A panoramic view of the Garhwal and Kumaon Himalayas. Peaks rising above their surroundings are, among others,
                  - link "Trisul" [ref=f18e1479] [cursor=pointer]:
                    - /url: https://en.wikipedia.org/wiki/Trisul
                  - text: ","
                  - link "Nanda Devi" [ref=f18e1480] [cursor=pointer]:
                    - /url: https://en.wikipedia.org/wiki/Nanda_Devi
                  - text: ", the highest peak entirely within India's borders, and"
                  - link "Nanda Kot" [ref=f18e1481] [cursor=pointer]:
                    - /url: https://en.wikipedia.org/wiki/Nanda_Kot
                  - text: . The
                  - link "Tibetan Plateau" [ref=f18e1482] [cursor=pointer]:
                    - /url: https://en.wikipedia.org/wiki/Tibetan_Plateau
                  - text: lies behind these mountains, as does the part of the
                  - link "Indus-Yarlung suture zone" [ref=f18e1483] [cursor=pointer]:
                    - /url: https://en.wikipedia.org/wiki/Indus-Yarlung_suture_zone
                  - text: ", the contour along which the"
                  - link "Indian Plate" [ref=f18e1484] [cursor=pointer]:
                    - /url: https://en.wikipedia.org/wiki/Indian_Plate
                  - text: has welded to the
                  - link "Eurasian plate" [ref=f18e1485] [cursor=pointer]:
                    - /url: https://en.wikipedia.org/wiki/Eurasian_plate
                  - text: .
                  - link "Mount Kailash" [ref=f18e1486] [cursor=pointer]:
                    - /url: https://en.wikipedia.org/wiki/Mount_Kailash
                  - text: and
                  - link "Lake Manasarovar" [ref=f18e1487] [cursor=pointer]:
                    - /url: https://en.wikipedia.org/wiki/Lake_Manasarovar
                  - text: in the
                  - link "Tibet Trans-Himalaya" [ref=f18e1488] [cursor=pointer]:
                    - /url: https://en.wikipedia.org/wiki/Transhimalaya
                  - text: —sacred in Hindu and Buddhist mythology—lie immediately behind to the right. The
                  - link "Indus" [ref=f18e1489] [cursor=pointer]:
                    - /url: https://en.wikipedia.org/wiki/Indus
                  - text: and
                  - link "Yarlung Tsangpo" [ref=f18e1490] [cursor=pointer]:
                    - /url: https://en.wikipedia.org/wiki/Yarlung_Tsangpo
                  - text: (the upper
                  - link "Brahmaputra" [ref=f18e1491] [cursor=pointer]:
