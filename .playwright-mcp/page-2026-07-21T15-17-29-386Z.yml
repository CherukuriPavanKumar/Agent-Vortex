                  - link "Mattern 2019" [ref=f18e4647] [cursor=pointer]:
                    - /url: "#CITEREFMattern2019"
                  - text: ", pp. 146–147 All non-African human populations share a common ancestry in the recent past, about 80,000 to 50,000 years ago. Some time within this period, a group of modern humans migrated from Africa, traversed southern Asia, and crossed the sea to the ancient continent of Sahul (now Australia, Tasmania, and Papua New Guinea), picking up Neanderthal and Denisovan genes along the way; branches reached Europe somewhat later, and Americas last. This was not the first migration of anatomically modern humans out of Africa. ... But for the most part, earlier populations of humans around Eurasia sputtered out, returned to Africa, or were replaced by humans from the last migration out of Africa.}}"
